/* ── NOTIFICACIONES ───────────────────────────────────── */
function Notificaciones(){
  const [notifs,setNotifs]=useState(NOTIFS.map((n,i)=>({id:i,type:n.type,titulo:n.title,mensaje:n.desc,fecha:n.time,leida:false})));
  const [loading,setLoading]=useState(false);
  const colors={warn:'var(--amber)',info:'var(--blue)',danger:'var(--red)',success:'var(--green)'};
  const bgs={warn:'var(--amber-dim)',info:'var(--blue-dim)',danger:'var(--red-dim)',success:'var(--green-dim)'};
  const labels={warn:'Aviso',info:'Info',danger:'Alerta',success:'Éxito'};

  const {perfil,refreshNotif}=useContext(PerfilCtx);
  useEffect(()=>{
    if(!perfil?.id_usuario) return;
    let ok=true;
    (async()=>{
      setLoading(true);
      const {data}=await sb.from('notificaciones')
        .select('*').eq('id_usuario',perfil.id_usuario)
        .order('fecha',{ascending:false}).limit(30);
      if(ok){if(data) setNotifs(data);setLoading(false);}
    })();
    return()=>{ok=false;};
  },[perfil?.id_usuario]);

  async function marcarLeida(id,dbId){
    setNotifs(n=>n.map(x=>x.id===id||x.id_notif===id?{...x,leida:true}:x));
    if(dbId) await sb.from('notificaciones').update({leida:true,fecha_lectura:new Date().toISOString()}).eq('id_notif',dbId);
    if(refreshNotif) refreshNotif();
  }
  async function marcarTodas(){
    const ids=notifs.filter(n=>!n.leida).map(n=>n.id_notif).filter(Boolean);
    setNotifs(n=>n.map(x=>({...x,leida:true})));
    if(ids.length) await sb.from('notificaciones').update({leida:true}).in('id_notif',ids);
    if(refreshNotif) refreshNotif();
  }
  const visible=notifs.filter(n=>!n.leida);
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:14.5}}>Notificaciones {loading&&<span style={{fontSize:11,color:'var(--text-muted)',fontWeight:400}}>Cargando…</span>}</div>
        {visible.length>0&&<button className="btn btn-ghost btn-sm" onClick={marcarTodas}>Marcar todo leído</button>}
      </div>
      {visible.length===0&&<div className="card card-pad" style={{textAlign:'center',padding:48,color:'var(--text-muted)'}}><div style={{fontSize:28,marginBottom:10}}>✓</div><div style={{fontWeight:600}}>Sin notificaciones pendientes</div></div>}
      {visible.map((n,i)=>{
        const type=n.tipo||n.type;
        return(
          <div key={n.id_notif||i} className="card" style={{marginBottom:8,padding:'14px 16px',display:'flex',gap:12,alignItems:'flex-start'}}>
            <div style={{width:34,height:34,borderRadius:9,background:bgs[type]||bgs.info,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{color:colors[type]||colors.info,width:15,height:15}}>{ic.bell}</span>
            </div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:2}}>
                <span style={{fontWeight:600,fontSize:13}}>{n.titulo||n.title}</span>
                <span className="chip" style={{background:bgs[type]||bgs.info,color:colors[type]||colors.info,borderColor:'transparent',fontSize:10,padding:'1px 7px'}}>{labels[type]||type}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text-mid)'}}>{n.mensaje||n.desc}</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:5}}>{n.fecha||n.time}</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>marcarLeida(n.id_notif||i,n.id_notif)}>Descartar</button>
          </div>
        );
      })}
    </div>
  );
}

/* ── COLA DE CONSTANCIAS (Serv. Escolares) ────────────── */
function ColaConstancias(){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=async()=>{
    setLoading(true);
    const {data}=await sb.from('solicitudes_constancia')
      .select('id_solicitud,fecha_sol,estado,urgente,tipos_constancia(nombre),alumnos(matricula,usuarios(nombres,apellido_pat))')
      .order('urgente',{ascending:false})
      .order('fecha_sol',{ascending:false})
      .limit(100);
    setItems(data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const act=async(id,st)=>{
    const {error}=await sb.from('solicitudes_constancia').update({estado:st,fecha_proc:new Date().toISOString()}).eq('id_solicitud',id);
    if(error){window.toast('Error: '+error.message,'err');return;}
    window.toast(st==='lista'?'Constancia aprobada':'Solicitud rechazada',st==='lista'?'ok':'warn');
    load();
  };

  const fmtDate=d=>d?new Date(d).toLocaleDateString('es-MX',{day:'2-digit',month:'short'}):'—';
  const pending=items.filter(i=>i.estado==='pendiente'||i.estado==='en_proceso');
  const done=items.filter(i=>i.estado!=='pendiente'&&i.estado!=='en_proceso');

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Pendientes',v:pending.length,c:'var(--amber)'},{l:'Aprobadas',v:items.filter(i=>i.estado==='lista'||i.estado==='entregada').length,c:'var(--green)'},{l:'Rechazadas',v:items.filter(i=>i.estado==='rechazada').length,c:'var(--red)'},{l:'Total',v:items.length,c:'var(--blue)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:26,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{marginBottom:12}}><button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button></div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando solicitudes…</div>:(<>
        {items.length===0&&<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay solicitudes de constancias registradas.</div>}
        {pending.length>0&&<>
          <div className="section-title" style={{marginBottom:10}}>{ic.alert} Solicitudes pendientes</div>
          {pending.map(item=>{
            const nombre=item.alumnos?.usuarios?item.alumnos.usuarios.apellido_pat+', '+item.alumnos.usuarios.nombres:'—';
            const mat=item.alumnos?.matricula||'—';
            return(
              <div key={item.id_solicitud} className="card" style={{marginBottom:8,padding:'14px 16px',display:'flex',alignItems:'center',gap:14,borderLeft:'3px solid '+(item.urgente?'var(--red)':'var(--amber)')}}>
                {item.urgente&&<span className="chip chip-red" style={{fontSize:10,flexShrink:0}}>Urgente</span>}
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:13}}>{nombre}</div>
                  <div style={{fontSize:12,color:'var(--text-muted)'}}>{item.tipos_constancia?.nombre||'—'} · Mat. {mat} · {fmtDate(item.fecha_sol)}</div>
                </div>
                <div style={{display:'flex',gap:6}}>
                  <button className="btn btn-primary btn-sm" onClick={()=>act(item.id_solicitud,'lista')}>Aprobar</button>
                  <button className="btn btn-danger btn-sm" onClick={()=>act(item.id_solicitud,'rechazada')}>Rechazar</button>
                </div>
              </div>
            );
          })}
        </>}
        {done.length>0&&<>
          <div className="section-title" style={{margin:'16px 0 10px'}}>{ic.check} Procesadas</div>
          <div className="card"><table>
            <thead><tr><th>Matrícula</th><th>Alumno</th><th>Tipo</th><th>Fecha</th><th>Estado</th></tr></thead>
            <tbody>{done.map(item=>{
              const nombre=item.alumnos?.usuarios?item.alumnos.usuarios.apellido_pat+', '+item.alumnos.usuarios.nombres:'—';
              const ok=item.estado==='lista'||item.estado==='entregada';
              return(
                <tr key={item.id_solicitud}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{item.alumnos?.matricula||'—'}</td>
                  <td style={{fontWeight:500}}>{nombre}</td>
                  <td>{item.tipos_constancia?.nombre||'—'}</td>
                  <td>{fmtDate(item.fecha_sol)}</td>
                  <td><span className={'chip '+(ok?'chip-green':'chip-red')} style={{fontSize:10}}>{ok?'Aprobada':'Rechazada'}</span></td>
                </tr>
              );
            })}</tbody>
          </table></div>
        </>}
      </>)}
    </div>
  );
}

/* ── CONTROL INSCRIPCIONES (Serv. Escolares) ──────────── */
function InscripcionesCtrl(){
  const [periodos,setPeriodos]=useState([]);
  const [stats,setStats]=useState({total:0,activas:0,acreditadas:0,bajas:0,alumnos_distintos:0,alumnos_total:0});
  const [insc,setInsc]=useState([]);
  const [loading,setLoading]=useState(true);

  const fmtFecha=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}):'—';

  const load=async()=>{
    setLoading(true);
    const [pRes,iRes,aRes]=await Promise.all([
      sb.from('periodos').select('*').order('fecha_inicio',{ascending:false}).limit(6),
      sb.from('inscripciones').select('id_inscripcion,fecha_insc,estado,alumnos(matricula,usuarios(nombres,apellido_pat)),grupos(clave_grupo,materias(nombre),periodos(clave))').order('fecha_insc',{ascending:false}).limit(50),
      sb.from('alumnos').select('id_alumno',{count:'exact',head:true}),
    ]);
    setPeriodos(pRes.data||[]);
    const all=iRes.data||[];
    setInsc(all);
    const activo=(pRes.data||[]).find(p=>p.estado==='inscripcion'||p.estado==='en_curso');
    const enPer=activo?all.filter(x=>x.grupos?.periodos?.clave===activo.clave):all;
    const alumDistintos=new Set(enPer.map(x=>x.alumnos?.matricula).filter(Boolean)).size;
    setStats({
      total:enPer.length,
      activas:enPer.filter(x=>x.estado==='en_curso').length,
      acreditadas:enPer.filter(x=>x.estado==='acreditada').length,
      bajas:enPer.filter(x=>x.estado==='baja'||x.estado==='reprobada').length,
      alumnos_distintos:alumDistintos,
      alumnos_total:aRes.count||0,
    });
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const cambiarEstadoPeriodo=async(idPer,nuevo)=>{
    const {error}=await sb.from('periodos').update({estado:nuevo}).eq('id_periodo',idPer);
    if(error){window.toast('Error: '+error.message,'error');return;}
    window.toast('Período actualizado a '+nuevo,'ok');
    load();
  };

  const accionPorEstado=(p)=>{
    if(p.estado==='programado') return {label:'Abrir inscripciones',next:'inscripcion',color:'btn-primary'};
    if(p.estado==='inscripcion') return {label:'Cerrar inscripciones',next:'en_curso',color:'btn-ghost'};
    if(p.estado==='en_curso')    return {label:'Finalizar período',next:'cerrado',color:'btn-danger'};
    return null;
  };

  const chipPer=p=>({inscripcion:'chip-green',en_curso:'chip-blue',programado:'chip-amber',cerrado:'chip-red'}[p]||'chip');

  return(
    <div className="page-enter">
      <div className="grid-2" style={{marginBottom:14}}>
        <div className="card card-pad">
          <div className="section-title">{ic.cal} Períodos de inscripción</div>
          {loading?<div style={{padding:14,color:'var(--text-muted)',fontSize:12}}>Cargando…</div>:periodos.length===0?<div style={{padding:14,color:'var(--text-muted)',fontSize:12}}>Sin períodos.</div>:periodos.map(p=>{
            const acc=accionPorEstado(p);
            return (
              <div key={p.id_periodo} className="stat-row">
                <div>
                  <div style={{fontWeight:500,fontSize:13}}>{p.clave}</div>
                  <div style={{fontSize:11.5,color:'var(--text-muted)'}}>Insc. {fmtFecha(p.insc_inicio)} – {fmtFecha(p.insc_fin)}</div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span className={'chip '+chipPer(p.estado)} style={{fontSize:10}}>{p.estado}</span>
                  {acc&&<button className={'btn btn-sm '+acc.color} onClick={()=>cambiarEstadoPeriodo(p.id_periodo,acc.next)}>{acc.label}</button>}
                </div>
              </div>
            );
          })}
        </div>
        <div className="card card-pad">
          <div className="section-title">{ic.users} Estadística del período activo</div>
          {[
            {l:'Inscripciones totales',v:stats.total},
            {l:'En curso',v:stats.activas},
            {l:'Acreditadas',v:stats.acreditadas},
            {l:'Bajas / reprobadas',v:stats.bajas},
            {l:'Alumnos inscritos',v:stats.alumnos_distintos+' / '+stats.alumnos_total},
          ].map((s,i)=>(
            <div key={i} className="stat-row"><div className="stat-row-label">{s.l}</div><div className="stat-row-val">{s.v}</div></div>
          ))}
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div className="section-title" style={{margin:0}}>{ic.list} Últimas inscripciones</div>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
      </div>
      <div className="card"><table>
        <thead><tr><th>Matrícula</th><th>Alumno</th><th>Grupo</th><th>Materia</th><th>Periodo</th><th>Fecha</th><th>Estado</th></tr></thead>
        <tbody>{insc.slice(0,20).map(e=>(
          <tr key={e.id_inscripcion}>
            <td style={{fontFamily:'monospace',fontSize:11}}>{e.alumnos?.matricula||'—'}</td>
            <td style={{fontWeight:500}}>{e.alumnos?.usuarios?(e.alumnos.usuarios.nombres+' '+e.alumnos.usuarios.apellido_pat):'—'}</td>
            <td style={{fontSize:11.5,fontFamily:'monospace'}}>{e.grupos?.clave_grupo||'—'}</td>
            <td>{e.grupos?.materias?.nombre||'—'}</td>
            <td>{e.grupos?.periodos?.clave||'—'}</td>
            <td style={{fontSize:11.5}}>{fmtFecha(e.fecha_insc)}</td>
            <td><span className={'chip '+(e.estado==='en_curso'?'chip-blue':e.estado==='acreditada'?'chip-green':e.estado==='baja'?'chip-red':'chip-amber')} style={{fontSize:10}}>{e.estado}</span></td>
          </tr>
        ))}</tbody>
      </table></div>
    </div>
  );
}

/* ── BAJAS (Serv. Escolares) ──────────────────────────── */
function Bajas(){
  const [bajas,setBajas]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=async()=>{
    setLoading(true);
    const {data}=await sb.from('bajas')
      .select('id_baja,tipo,motivo,fecha_sol,fecha_efectiva,estado,docs_completos,alumnos(matricula,semestre_actual,usuarios(nombres,apellido_pat))')
      .order('id_baja',{ascending:false}).limit(100);
    setBajas(data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const aprobar=async(id)=>{
    const {error}=await sb.from('bajas').update({estado:'aprobada',fecha_efectiva:new Date().toISOString().slice(0,10)}).eq('id_baja',id);
    if(error){window.toast('Error: '+error.message,'err');return;}
    window.toast('Baja aprobada','ok');
    load();
  };

  const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short'}):'—';
  const activas=bajas.filter(b=>b.estado==='pendiente');
  const temporales=bajas.filter(b=>b.tipo==='temporal');
  const definitivas=bajas.filter(b=>b.tipo==='definitiva');
  const aprobadas=bajas.filter(b=>b.estado==='aprobada');

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Solicitudes activas',v:activas.length,c:'var(--amber)'},{l:'Bajas temporales',v:temporales.length,c:'var(--blue)'},{l:'Bajas definitivas',v:definitivas.length,c:'var(--red)'},{l:'Aprobadas',v:aprobadas.length,c:'var(--green)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:26,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Exportación disponible en versión de escritorio','warn')}>Exportar reporte</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando bajas…</div>:(
        bajas.length===0
        ?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay solicitudes de baja registradas.</div>
        :<div className="card"><table>
          <thead><tr><th>Matrícula</th><th>Alumno</th><th>Tipo</th><th>Motivo</th><th>Sem.</th><th>Docs</th><th>Fecha</th><th>Estado</th><th></th></tr></thead>
          <tbody>{bajas.map((b,i)=>(
            <tr key={i}>
              <td style={{fontFamily:'monospace',fontSize:11}}>{b.alumnos?.matricula||'—'}</td>
              <td style={{fontWeight:500}}>{b.alumnos?.usuarios?b.alumnos.usuarios.apellido_pat+', '+b.alumnos.usuarios.nombres:'—'}</td>
              <td><span className={'chip '+(b.tipo==='temporal'?'chip-amber':'chip-red')} style={{fontSize:10,textTransform:'capitalize'}}>{b.tipo}</span></td>
              <td style={{fontSize:12,color:'var(--text-muted)',maxWidth:180}}>{b.motivo}</td>
              <td>{b.alumnos?.semestre_actual||'—'}°</td>
              <td>{b.docs_completos?<span style={{color:'var(--green)'}}>{ic.check}</span>:<span style={{color:'var(--red)',fontSize:11}}>Pend.</span>}</td>
              <td style={{fontSize:11.5}}>{fmtDate(b.fecha_sol)}</td>
              <td><span className={'chip '+(b.estado==='aprobada'?'chip-green':b.estado==='rechazada'?'chip-red':'chip-amber')} style={{fontSize:10,textTransform:'capitalize'}}>{b.estado}</span></td>
              <td>{b.estado==='pendiente'&&<button className="btn btn-primary btn-sm" onClick={()=>aprobar(b.id_baja)}>Aprobar</button>}</td>
            </tr>
          ))}</tbody>
        </table></div>
      )}
    </div>
  );
}

/* ── EXPEDIENTES (Serv. Escolares) ────────────────────── */
function Expedientes(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [sel,setSel]=useState(null);

  const load=async()=>{
    setLoading(true);
    const {data}=await sb.from('alumnos')
      .select('id_alumno,matricula,semestre_actual,promedio_gral,estatus,carreras(clave),usuarios(nombres,apellido_pat),documentos_alumno(tipo,estado)')
      .order('id_alumno').limit(300);
    setRows(data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const filtered=rows.filter(a=>{
    if(!search)return true;
    const nom=(a.usuarios?.nombres||'')+' '+(a.usuarios?.apellido_pat||'');
    return nom.toLowerCase().includes(search.toLowerCase())||a.matricula.includes(search);
  });

  const docTypes=['CURP','Acta de nacimiento','Cert. de bachillerato','Fotografía','Comprobante domicilio','IMSS vigencia','Carta de aceptación','Historial médico'];

  return(
    <div className="page-enter">
      {!sel?(
        <>
          <div style={{display:'flex',gap:10,marginBottom:14}}>
            <div style={{position:'relative',flex:1,maxWidth:300}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',pointerEvents:'none',width:14,height:14}}>{ic.search}</span>
              <input className="input" style={{paddingLeft:30}} placeholder="Buscar por nombre o matrícula…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
          </div>
          {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando expedientes…</div>:(
          <div className="card"><table>
            <thead><tr><th>Matrícula</th><th>Nombre</th><th>Carrera</th><th>Sem.</th><th>Promedio</th><th>Docs verif.</th><th></th></tr></thead>
            <tbody>{filtered.map((a,i)=>{
              const nom=a.usuarios?a.usuarios.apellido_pat+', '+a.usuarios.nombres:'—';
              const docs=a.documentos_alumno||[];
              const verif=docs.filter(d=>d.estado==='verificado').length;
              const prom=parseFloat(a.promedio_gral||0);
              return(
                <tr key={i}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{a.matricula}</td>
                  <td style={{fontWeight:500}}>{nom}</td>
                  <td><span className="chip chip-blue" style={{fontSize:10}}>{a.carreras?.clave||'—'}</span></td>
                  <td>{a.semestre_actual||'—'}°</td>
                  <td><span className={'grade-badge '+(prom>=9?'grade-a':prom>=7?'grade-b':prom>=6?'grade-c':'grade-f')}>{prom.toFixed(2)}</span></td>
                  <td>{verif>=4?<span className="chip chip-green" style={{fontSize:10}}>Completo ({verif})</span>:<span className="chip chip-amber" style={{fontSize:10}}>{verif} doc{verif!==1?'s':''}</span>}</td>
                  <td><button className="btn btn-ghost btn-sm" onClick={()=>setSel(a)}>Ver expediente</button></td>
                </tr>
              );
            })}</tbody>
          </table></div>)}
        </>
      ):(
        <>
          <button className="btn btn-ghost btn-sm" style={{marginBottom:14}} onClick={()=>setSel(null)}>← Regresar</button>
          <div className="card card-pad">
            <div style={{display:'flex',gap:14,marginBottom:18}}>
              <div className="avatar" style={{width:52,height:52,fontSize:18,background:'var(--blue)'}}>{sel.usuarios?.apellido_pat?.[0]||'?'}</div>
              <div>
                <div style={{fontWeight:700,fontSize:16}}>{sel.usuarios?sel.usuarios.apellido_pat+', '+sel.usuarios.nombres:'—'}</div>
                <div style={{fontSize:12.5,color:'var(--text-muted)',marginTop:2}}>{sel.matricula} · {sel.carreras?.clave||'—'} · {sel.semestre_actual||'?'}° Semestre · Promedio: {parseFloat(sel.promedio_gral||0).toFixed(2)}</div>
              </div>
              <div style={{marginLeft:'auto',display:'flex',gap:8}}>
                <button className="btn btn-primary btn-sm" onClick={()=>window.toast('Preparando expediente para impresión…','info')}>Imprimir expediente</button>
              </div>
            </div>
            <div className="section-title">Documentos en expediente</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
              {docTypes.map((d,i)=>{
                const docs=sel.documentos_alumno||[];
                const found=docs.find(x=>x.tipo.toLowerCase().includes(d.toLowerCase().split(' ')[0])||d.toLowerCase().includes(x.tipo.toLowerCase()));
                const verif=found?.estado==='verificado';
                const pend=found&&!verif;
                return(
                  <div key={i} className="doc-item" style={{flexDirection:'column',alignItems:'flex-start',gap:6}}>
                    <div style={{fontSize:20}}>{verif?'✅':found?'📄':'📋'}</div>
                    <div style={{fontWeight:500,fontSize:12}}>{d}</div>
                    <span className={'chip '+(verif?'chip-green':pend?'chip-amber':'chip-red')} style={{fontSize:10}}>{verif?'Verificado':pend?'Pendiente':'No entregado'}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ── RETÍCULA ADMIN (Coordinador) ─────────────────────── */
function ReticulaAdmin(){
  const [planes,setPlanes]=useState([]);
  const [planSel,setPlanSel]=useState('');
  const [materias,setMaterias]=useState([]);
  const [loading,setLoading]=useState(true);

  const loadPlanes=async()=>{
    setLoading(true);
    const {data}=await sb.from('planes_estudio').select('id_plan,clave_plan,nombre,activo,carreras(clave,nombre)').order('id_plan');
    setPlanes(data||[]);
    if((data||[]).length>0&&!planSel) setPlanSel(String(data[0].id_plan));
    setLoading(false);
  };
  useEffect(()=>{loadPlanes();},[]);

  const loadMaterias=async(idPlan)=>{
    if(!idPlan){setMaterias([]);return;}
    const {data}=await sb.from('materias').select('id_materia,clave,nombre,creditos,semestre_sug,tipo,activa,horas_teoria,horas_practica').eq('id_plan',parseInt(idPlan)).order('semestre_sug').order('clave');
    setMaterias(data||[]);
  };
  useEffect(()=>{if(planSel)loadMaterias(planSel);},[planSel]);

  const plan=planes.find(p=>String(p.id_plan)===planSel);
  const porSemestre=materias.reduce((acc,m)=>{const s=m.semestre_sug||0;(acc[s]=acc[s]||[]).push(m);return acc;},{});
  const totalCred=materias.reduce((s,m)=>s+(m.creditos||0),0);
  const semestres=Object.keys(porSemestre).sort((a,b)=>parseInt(a)-parseInt(b));
  const tipoChip=t=>({obligatoria:'chip-blue',optativa:'chip-amber',especialidad:'chip-green',residencia:'chip-red'}[t]||'chip');

  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,gap:14,flexWrap:'wrap'}}>
        <div>
          <div style={{fontWeight:600,fontSize:14.5}}>Administrar Retícula</div>
          {plan?(
            <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>
              {plan.carreras?.clave||''} {plan.carreras?.nombre||''} · Plan {plan.clave} · {materias.length} materias · {totalCred} créditos
            </div>
          ):<div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Selecciona un plan</div>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <select className="input" style={{minWidth:240}} value={planSel} onChange={e=>setPlanSel(e.target.value)}>
            {planes.map(p=><option key={p.id_plan} value={p.id_plan}>{(p.carreras?.clave||'?')+' — Plan '+p.clave_plan+(p.activo?' (activo)':'')}</option>)}
          </select>
          <button className="btn btn-ghost btn-sm" onClick={()=>{loadPlanes();if(planSel)loadMaterias(planSel);}}>↺ Actualizar</button>
        </div>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando planes…</div>:
       planes.length===0?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay planes de estudio registrados.</div>:
       semestres.length===0?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Este plan no tiene materias.</div>:
       semestres.map(sem=>{
         const ms=porSemestre[sem];
         const credSem=ms.reduce((s,m)=>s+(m.creditos||0),0);
         return (
           <div key={sem} style={{marginBottom:14}}>
             <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
               <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Semestre {sem||'sin asignar'} — {ms.length} materias · {credSem} créditos</div>
             </div>
             <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:8}}>
               {ms.map(m=>(
                 <div key={m.id_materia} className="card card-pad" style={{padding:12,opacity:m.activa===false?0.55:1}}>
                   <div style={{fontWeight:600,fontSize:12,marginBottom:4,lineHeight:1.3}}>{m.nombre}</div>
                   <div style={{fontSize:10.5,color:'var(--text-muted)',fontFamily:'monospace',marginBottom:6}}>{m.clave}</div>
                   <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                     <span className="chip chip-blue" style={{fontSize:10}}>{m.creditos} cr.</span>
                     <span className={'chip '+tipoChip(m.tipo)} style={{fontSize:10}}>{m.tipo}</span>
                     {(m.horas_teoria||m.horas_practica)?<span className="chip" style={{fontSize:10}}>{m.horas_teoria||0}T/{m.horas_practica||0}P</span>:null}
                   </div>
                 </div>
               ))}
             </div>
           </div>
         );
       })}
    </div>
  );
}

/* ── EQUIVALENCIAS (Coordinador) ──────────────────────── */
function Equivalencias(){
  const {perfil}=useContext(PerfilCtx);
  const [solicitudes,setSolicitudes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [saving,setSaving]=useState(false);
  const [materias,setMaterias]=useState([]);
  const [alumnos,setAlumnos]=useState([]);
  const blank={id_alumno:'',institucion_origen:'',materia_origen:'',id_materia_destino:'',creditos:'',calificacion:'',doc_url:'',observaciones:''};
  const [form,setForm]=useState(blank);

  const load=async()=>{
    setLoading(true);
    const [eRes,mRes,aRes]=await Promise.all([
      sb.from('equivalencias').select('id_equiv,institucion_origen,materia_origen,creditos,calificacion,estado,doc_url,observaciones,fecha_sol,fecha_resol,alumnos(matricula,usuarios(nombres,apellido_pat)),materias(clave,nombre)').order('fecha_sol',{ascending:false}),
      sb.from('materias').select('id_materia,clave,nombre,creditos').eq('activa',true).order('clave'),
      sb.from('alumnos').select('id_alumno,matricula,usuarios(nombres,apellido_pat)').order('matricula'),
    ]);
    setSolicitudes(eRes.data||[]);
    setMaterias(mRes.data||[]);
    setAlumnos(aRes.data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const resolver=async(id,nuevo)=>{
    const patch={estado:nuevo,fecha_resol:new Date().toISOString()};
    if(perfil?.id_usuario) patch.procesada_por=perfil.id_usuario;
    const {error}=await sb.from('equivalencias').update(patch).eq('id_equiv',id);
    if(error){window.toast('Error: '+error.message,'error');return;}
    window.toast('Equivalencia '+(nuevo==='aprobada'?'aprobada':'rechazada'),nuevo==='aprobada'?'ok':'warn');
    load();
  };

  const saveNew=async()=>{
    if(!form.id_alumno||!form.institucion_origen||!form.materia_origen||!form.id_materia_destino){
      window.toast('Faltan campos obligatorios','warn');return;
    }
    setSaving(true);
    const ins={
      id_alumno:parseInt(form.id_alumno),
      institucion_origen:form.institucion_origen,
      materia_origen:form.materia_origen,
      id_materia_destino:parseInt(form.id_materia_destino),
      creditos:form.creditos?parseInt(form.creditos):null,
      calificacion:form.calificacion?parseFloat(form.calificacion):null,
      doc_url:form.doc_url||null,
      observaciones:form.observaciones||null,
      estado:'pendiente',
    };
    const {error}=await sb.from('equivalencias').insert(ins);
    setSaving(false);
    if(error){window.toast('Error: '+error.message,'error');return;}
    window.toast('Solicitud registrada','ok');
    setShowNew(false);setForm(blank);load();
  };

  const pend=solicitudes.filter(s=>s.estado==='pendiente').length;
  const apro=solicitudes.filter(s=>s.estado==='aprobada').length;
  const rech=solicitudes.filter(s=>s.estado==='rechazada').length;

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Pendientes',v:pend,c:'var(--amber)'},{l:'Aprobadas',v:apro,c:'var(--green)'},{l:'Rechazadas',v:rech,c:'var(--red)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:26,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className="btn btn-primary btn-sm" onClick={()=>{setForm(blank);setShowNew(true);}}>{ic.plus} Nueva solicitud</button>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
      </div>
      {showNew&&(
        <Modal title="Registrar equivalencia" onClose={()=>setShowNew(false)} wide>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Alumno *</label>
              <select className="input" value={form.id_alumno} onChange={e=>setForm(f=>({...f,id_alumno:e.target.value}))}>
                <option value="">— Seleccionar —</option>
                {alumnos.map(a=><option key={a.id_alumno} value={a.id_alumno}>{a.matricula} — {a.usuarios?.nombres} {a.usuarios?.apellido_pat}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Institución origen *</label>
              <input className="input" value={form.institucion_origen} onChange={e=>setForm(f=>({...f,institucion_origen:e.target.value}))} placeholder="IPN — UPIICSA"/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Materia origen *</label>
              <input className="input" value={form.materia_origen} onChange={e=>setForm(f=>({...f,materia_origen:e.target.value}))} placeholder="Fundamentos de BD"/>
            </div>
            <div className="form-group">
              <label className="form-label">Materia destino *</label>
              <select className="input" value={form.id_materia_destino} onChange={e=>{const m=materias.find(x=>String(x.id_materia)===e.target.value);setForm(f=>({...f,id_materia_destino:e.target.value,creditos:f.creditos||(m?.creditos||'')}));}}>
                <option value="">— Seleccionar —</option>
                {materias.map(m=><option key={m.id_materia} value={m.id_materia}>{m.clave} — {m.nombre}</option>)}
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Créditos</label>
              <input className="input" type="number" min="1" max="20" value={form.creditos} onChange={e=>setForm(f=>({...f,creditos:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Calificación</label>
              <input className="input" type="number" step="0.1" min="0" max="10" value={form.calificacion} onChange={e=>setForm(f=>({...f,calificacion:e.target.value}))}/>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">URL documento</label>
            <input className="input" value={form.doc_url} onChange={e=>setForm(f=>({...f,doc_url:e.target.value}))} placeholder="https://…"/>
          </div>
          <div className="form-group">
            <label className="form-label">Observaciones</label>
            <textarea className="input" rows="2" value={form.observaciones} onChange={e=>setForm(f=>({...f,observaciones:e.target.value}))}/>
          </div>
          <div className="modal-footer">
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowNew(false)}>Cancelar</button>
            <button className="btn btn-primary btn-sm" onClick={saveNew} disabled={saving}>{saving?'Guardando…':'Registrar'}</button>
          </div>
        </Modal>
      )}
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando equivalencias…</div>:
       solicitudes.length===0?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay solicitudes registradas.</div>:
       solicitudes.map(s=>{
         const u=s.alumnos?.usuarios;
         const nombre=u?(u.apellido_pat+', '+u.nombres):'—';
         const destLabel=s.materias?(s.materias.nombre+' ('+s.materias.clave+')'):'—';
         return (
           <div key={s.id_equiv} className="card" style={{marginBottom:8,padding:'14px 16px'}}>
             <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
               <div style={{flex:1}}>
                 <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                   <div style={{fontWeight:600,fontSize:13}}>{nombre}</div>
                   <span style={{fontFamily:'monospace',fontSize:11,color:'var(--text-muted)'}}>{s.alumnos?.matricula||'—'}</span>
                   {!s.doc_url&&<span className="chip chip-red" style={{fontSize:10}}>Sin documentación</span>}
                 </div>
                 <div style={{fontSize:12.5,color:'var(--text-mid)',marginBottom:6}}>Proviene de: <strong>{s.institucion_origen}</strong></div>
                 <div style={{display:'flex',gap:12,alignItems:'center',fontSize:12.5,flexWrap:'wrap'}}>
                   <span style={{padding:'6px 10px',background:'var(--bg)',borderRadius:6,border:'1px solid var(--border)'}}>{s.materia_origen}</span>
                   <span style={{color:'var(--text-muted)'}}>→</span>
                   <span style={{padding:'6px 10px',background:'var(--blue-dim)',borderRadius:6,border:'1px solid oklch(.80 .08 245)',color:'var(--blue)',fontWeight:500}}>{destLabel}</span>
                   {s.creditos&&<span className="chip chip-blue" style={{fontSize:10}}>{s.creditos} cr.</span>}
                   {s.calificacion!==null&&s.calificacion!==undefined&&<span className="chip" style={{fontSize:10}}>Calif: {s.calificacion}</span>}
                 </div>
                 {s.observaciones&&<div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:6}}>{s.observaciones}</div>}
               </div>
               <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                 <span className={'chip '+(s.estado==='aprobada'?'chip-green':s.estado==='rechazada'?'chip-red':'chip-amber')} style={{fontSize:10}}>{s.estado}</span>
                 {s.estado==='pendiente'&&<>
                   <button className="btn btn-primary btn-sm" onClick={()=>resolver(s.id_equiv,'aprobada')}>Aprobar</button>
                   <button className="btn btn-danger btn-sm" onClick={()=>resolver(s.id_equiv,'rechazada')}>Rechazar</button>
                 </>}
               </div>
             </div>
           </div>
         );
       })}
    </div>
  );
}

/* ── CARGA DE CRÉDITOS (Coordinador) ──────────────────── */
function CargaCreditos(){
  const {perfil}=useContext(PerfilCtx);
  const [search,setSearch]=useState('');
  const [sel,setSel]=useState(null);
  const [alumnos,setAlumnos]=useState([]);
  const [extras,setExtras]=useState([]);
  const [historial,setHistorial]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({actividad:'',creditos:'',fecha:new Date().toISOString().slice(0,10),observaciones:''});
  const [saving,setSaving]=useState(false);

  const plantilla=[
    {actividad:'Actividades culturales',creditos:2},
    {actividad:'Deporte de alto rendimiento',creditos:3},
    {actividad:'Servicio comunitario',creditos:2},
    {actividad:'Participación en congreso',creditos:1},
    {actividad:'Publicación de artículo',creditos:3},
    {actividad:'Proyecto de investigación',creditos:4},
  ];

  const load=async()=>{
    setLoading(true);
    const [aRes,eRes]=await Promise.all([
      sb.from('alumnos').select('id_alumno,matricula,semestre_actual,carreras(clave,nombre),usuarios(nombres,apellido_pat,apellido_mat)').order('matricula'),
      sb.from('creditos_extra').select('id_alumno,creditos'),
    ]);
    const totales={};
    (eRes.data||[]).forEach(r=>{totales[r.id_alumno]=(totales[r.id_alumno]||0)+(r.creditos||0);});
    setAlumnos((aRes.data||[]).map(a=>({...a,extras_total:totales[a.id_alumno]||0})));
    setExtras(eRes.data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const cargarHistorial=async(idAlumno)=>{
    const {data}=await sb.from('creditos_extra').select('id_credito,actividad,creditos,fecha,observaciones').eq('id_alumno',idAlumno).order('fecha',{ascending:false});
    setHistorial(data||[]);
  };

  const elegirAlumno=async(a)=>{
    setSel(a);setForm({actividad:'',creditos:'',fecha:new Date().toISOString().slice(0,10),observaciones:''});
    await cargarHistorial(a.id_alumno);
  };

  const asignar=async(actividad,creditos,obs)=>{
    if(!sel) return;
    if(!actividad||!creditos){window.toast('Actividad y créditos son obligatorios','warn');return;}
    setSaving(true);
    const ins={id_alumno:sel.id_alumno,actividad,creditos:parseInt(creditos),fecha:form.fecha||new Date().toISOString().slice(0,10),observaciones:obs||null};
    if(perfil?.id_usuario) ins.asignado_por=perfil.id_usuario;
    const {error}=await sb.from('creditos_extra').insert(ins);
    setSaving(false);
    if(error){window.toast('Error: '+error.message,'error');return;}
    window.toast('Créditos asignados','ok');
    setForm({actividad:'',creditos:'',fecha:new Date().toISOString().slice(0,10),observaciones:''});
    await cargarHistorial(sel.id_alumno);
    await load();
    const nuevo=alumnos.find(x=>x.id_alumno===sel.id_alumno);
    if(nuevo) setSel({...nuevo,extras_total:(nuevo.extras_total||0)+parseInt(creditos)});
  };

  const borrar=async(idCredito)=>{
    if(!confirm('¿Eliminar este registro de créditos?')) return;
    const {error}=await sb.from('creditos_extra').delete().eq('id_credito',idCredito);
    if(error){window.toast('Error: '+error.message,'error');return;}
    window.toast('Registro eliminado','ok');
    if(sel) await cargarHistorial(sel.id_alumno);
    await load();
  };

  const filtered=alumnos.filter(a=>{
    const nom=a.usuarios?(a.usuarios.nombres+' '+a.usuarios.apellido_pat):'';
    return nom.toLowerCase().includes(search.toLowerCase())||a.matricula?.includes(search);
  });

  if(!sel) return(
    <div className="page-enter">
      <div style={{marginBottom:14,fontSize:13,color:'var(--text-muted)',padding:'10px 14px',background:'var(--blue-dim)',borderRadius:8,border:'1px solid oklch(.80 .08 245)'}}>
        Como coordinador puedes asignar créditos adicionales por actividades extracurriculares, congresos, publicaciones y más.
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <div style={{position:'relative',flex:1,maxWidth:300}}>
          <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',pointerEvents:'none',width:14,height:14}}>{ic.search}</span>
          <input className="input" style={{paddingLeft:30}} placeholder="Buscar alumno…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando alumnos…</div>:
       filtered.length===0?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Sin coincidencias.</div>:
      <div className="card"><table>
        <thead><tr><th>Matrícula</th><th>Alumno</th><th>Carrera</th><th>Sem.</th><th>Créditos extra</th><th></th></tr></thead>
        <tbody>{filtered.map(a=>(
          <tr key={a.id_alumno}>
            <td style={{fontFamily:'monospace',fontSize:11}}>{a.matricula}</td>
            <td style={{fontWeight:500}}>{a.usuarios?(a.usuarios.apellido_pat+', '+a.usuarios.nombres):'—'}</td>
            <td><span className="chip chip-blue" style={{fontSize:10}}>{a.carreras?.clave||'—'}</span></td>
            <td>{a.semestre_actual||'—'}°</td>
            <td style={{fontWeight:600}}>{a.extras_total||0}</td>
            <td><button className="btn btn-primary btn-sm" onClick={()=>elegirAlumno(a)}>Cargar créditos</button></td>
          </tr>
        ))}</tbody>
      </table></div>}
    </div>
  );

  return(
    <div className="page-enter">
      <button className="btn btn-ghost btn-sm" style={{marginBottom:14}} onClick={()=>{setSel(null);setHistorial([]);}}>← Regresar</button>
      <div className="card card-pad">
        <div style={{fontWeight:600,fontSize:14.5,marginBottom:4}}>{sel.usuarios?(sel.usuarios.apellido_pat+', '+sel.usuarios.nombres):'—'}</div>
        <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:16}}>{sel.matricula} · {sel.carreras?.clave||'—'} · {sel.semestre_actual||'?'}° Sem · Créditos extra acumulados: <strong>{sel.extras_total||0}</strong></div>
        <div className="section-title">Selecciona actividad extracurricular</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {plantilla.map((e,i)=>(
            <div key={i} className="card card-pad" style={{padding:12,cursor:saving?'wait':'pointer',border:'1.5px solid var(--border)',transition:'var(--t)',opacity:saving?0.5:1}}
                 onClick={()=>!saving&&asignar(e.actividad,e.creditos,null)}>
              <div style={{fontWeight:500,fontSize:12.5,marginBottom:4}}>{e.actividad}</div>
              <span className="chip chip-green" style={{fontSize:10}}>+{e.creditos} créditos</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:14}}>
          <label className="form-label">O carga manualmente</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <input type="number" className="input" placeholder="Núm. créditos" style={{maxWidth:140}} min={1} max={10} value={form.creditos} onChange={e=>setForm(f=>({...f,creditos:e.target.value}))}/>
            <input className="input" placeholder="Descripción de la actividad" style={{flex:1,minWidth:200}} value={form.actividad} onChange={e=>setForm(f=>({...f,actividad:e.target.value}))}/>
            <input type="date" className="input" style={{maxWidth:160}} value={form.fecha} onChange={e=>setForm(f=>({...f,fecha:e.target.value}))}/>
            <button className="btn btn-primary" onClick={()=>asignar(form.actividad,form.creditos,form.observaciones)} disabled={saving}>Asignar</button>
          </div>
        </div>
        {historial.length>0&&(
          <div style={{marginTop:18}}>
            <div className="section-title">Historial de créditos extra</div>
            <table>
              <thead><tr><th>Fecha</th><th>Actividad</th><th>Créditos</th><th>Observaciones</th><th></th></tr></thead>
              <tbody>{historial.map(h=>(
                <tr key={h.id_credito}>
                  <td style={{fontSize:11.5}}>{h.fecha}</td>
                  <td>{h.actividad}</td>
                  <td><span className="chip chip-green" style={{fontSize:10}}>+{h.creditos}</span></td>
                  <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{h.observaciones||'—'}</td>
                  <td><button className="btn btn-danger btn-sm" onClick={()=>borrar(h.id_credito)}>Eliminar</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── SERVICIO SOCIAL (Vinculación) ────────────────────── */
function ServicioSocial(){
  const [servicios,setServicios]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.from('servicio_social')
      .select('id_servicio,fecha_inicio,fecha_fin,horas_total,horas_acumul,estado,url_constancia,alumnos(matricula,carreras(clave),usuarios(nombres,apellido_pat)),empresas(nombre,sector)')
      .order('id_servicio',{ascending:false}).limit(100)
      .then(({data,error})=>{
        if(!error) setServicios(data||[]);
        setLoading(false);
      });
  },[]);

  async function actualizar(id,updates){
    const {error}=await sb.from('servicio_social').update(updates).eq('id_servicio',id);
    if(error) window.toast('Error: '+error.message,'error');
    else{
      setServicios(prev=>prev.map(s=>s.id_servicio===id?{...s,...updates}:s));
      window.toast('Registro actualizado','ok');
    }
  }

  const liberados=servicios.filter(s=>s.estado==='liberado').length;
  const activos=servicios.filter(s=>s.estado==='activo').length;
  const pendientes=servicios.filter(s=>s.estado==='pendiente').length;
  const promedioHoras=servicios.length>0?Math.round(servicios.reduce((acc,s)=>acc+(s.horas_acumul||0),0)/servicios.length):0;

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Liberados',v:liberados,c:'var(--green)'},{l:'En curso',v:activos,c:'var(--blue)'},{l:'Pendientes',v:pendientes,c:'var(--amber)'},{l:'Hrs promedio',v:promedioHoras,c:'var(--purple)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:26,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Generando formato de carta de liberación…','info')}>Formato de liberación</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Exportación disponible en versión de escritorio','warn')}>Exportar reporte</button>
      </div>
      {loading?<div style={{textAlign:'center',padding:20,color:'var(--text-muted)'}}>Cargando…</div>:
      servicios.length===0?<div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>No hay registros de servicio social.</div>:
      <div className="card"><table>
        <thead><tr><th>Matrícula</th><th>Alumno</th><th>Institución</th><th>Período</th><th>Horas</th><th>Estado</th><th></th></tr></thead>
        <tbody>{servicios.map((s)=>{
          const al=s.alumnos;
          const nombre=al?((al.usuarios?.nombres||'')+' '+(al.usuarios?.apellido_pat||'')).trim():'—';
          const pct=s.horas_total>0?Math.round((s.horas_acumul||0)/s.horas_total*100):0;
          const estadoChip=s.estado==='liberado'?'chip-green':s.estado==='activo'?'chip-blue':'chip-amber';
          const estadoLabel=s.estado==='liberado'?'Liberado':s.estado==='activo'?'En curso':s.estado==='cancelado'?'Cancelado':'Pendiente';
          return(
            <tr key={s.id_servicio}>
              <td style={{fontFamily:'monospace',fontSize:11}}>{al?.matricula||'—'}</td>
              <td style={{fontWeight:500}}>{nombre}</td>
              <td>{s.empresas?.nombre||'—'}</td>
              <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{s.fecha_inicio||'—'}{s.fecha_fin?' – '+s.fecha_fin:''}</td>
              <td>
                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                  <div style={{fontSize:12,fontWeight:600}}>{s.horas_acumul||0}/{s.horas_total||480}</div>
                  <div className="progress-bar" style={{width:80}}><div className="progress-fill" style={{width:pct+'%',background:s.estado==='liberado'?'var(--green)':'var(--blue)'}}></div></div>
                </div>
              </td>
              <td><span className={'chip '+estadoChip} style={{fontSize:10}}>{estadoLabel}</span></td>
              <td style={{display:'flex',gap:5}}>
                {s.estado==='activo'&&<button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Ingresa las horas desde el expediente del alumno','info')}>Actualizar</button>}
                {s.estado==='activo'&&(s.horas_acumul||0)>=(s.horas_total||480)&&<button className="btn btn-primary btn-sm" onClick={()=>actualizar(s.id_servicio,{estado:'liberado'})}>Liberar</button>}
                {s.estado==='pendiente'&&<button className="btn btn-primary btn-sm" onClick={()=>actualizar(s.id_servicio,{estado:'activo',fecha_inicio:new Date().toISOString().slice(0,10)})}>Activar</button>}
              </td>
            </tr>
          );
        })}</tbody>
      </table></div>}
    </div>
  );
}

/* ── EMPRESAS CONVENIO (Vinculación) ──────────────────── */
function Empresas(){
  const [empresas,setEmpresas]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const emptyForm={nombre:'',rfc:'',sector:'',contacto_nombre:'',contacto_email:'',contacto_tel:'',convenio_inicio:'',convenio_fin:''};
  const [form,setForm]=useState(emptyForm);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    sb.from('empresas').select('id_empresa,nombre,rfc,sector,contacto_nombre,contacto_email,contacto_tel,convenio_inicio,convenio_fin,estado,activa')
      .eq('activa',true).order('nombre')
      .then(({data,error})=>{
        if(!error) setEmpresas(data||[]);
        setLoading(false);
      });
  },[]);

  async function saveEmpresa(){
    if(!form.nombre.trim()){window.toast('El nombre de la empresa es requerido','warn');return;}
    setSaving(true);
    const {data,error}=await sb.from('empresas').insert({
      nombre:form.nombre.trim(),rfc:form.rfc.trim()||null,sector:form.sector.trim()||null,
      contacto_nombre:form.contacto_nombre.trim()||null,contacto_email:form.contacto_email.trim()||null,
      contacto_tel:form.contacto_tel.trim()||null,
      convenio_inicio:form.convenio_inicio||null,convenio_fin:form.convenio_fin||null,
      estado:'vigente',activa:true
    }).select().single();
    setSaving(false);
    if(error) window.toast('Error: '+error.message,'error');
    else{
      setEmpresas(prev=>[...prev,data]);
      setForm(emptyForm);setShowForm(false);
      window.toast('Empresa registrada','ok');
    }
  }

  const vigentes=empresas.filter(e=>e.estado==='vigente').length;
  const porRenovar=empresas.filter(e=>e.estado==='por_renovar').length;

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Convenios vigentes',v:vigentes,c:'var(--green)'},{l:'Por renovar',v:porRenovar,c:'var(--amber)'},{l:'Total empresas',v:empresas.length,c:'var(--blue)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:26,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowForm(f=>!f)}>{ic.plus} {showForm?'Cancelar':'Agregar empresa'}</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Descargando convenios vigentes…','info')}>Descargar convenios</button>
      </div>
      {showForm&&(
        <div className="card card-pad" style={{marginBottom:16}}>
          <div className="section-title" style={{marginBottom:12}}>Nueva empresa convenio</div>
          <div className="grid-2" style={{gap:10,marginBottom:10}}>
            <div><label className="form-label">Nombre *</label><input className="input" value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}/></div>
            <div><label className="form-label">RFC</label><input className="input" value={form.rfc} onChange={e=>setForm(f=>({...f,rfc:e.target.value}))}/></div>
            <div><label className="form-label">Sector</label><input className="input" value={form.sector} onChange={e=>setForm(f=>({...f,sector:e.target.value}))}/></div>
            <div><label className="form-label">Contacto</label><input className="input" value={form.contacto_nombre} onChange={e=>setForm(f=>({...f,contacto_nombre:e.target.value}))}/></div>
            <div><label className="form-label">Email contacto</label><input className="input" type="email" value={form.contacto_email} onChange={e=>setForm(f=>({...f,contacto_email:e.target.value}))}/></div>
            <div><label className="form-label">Tel. contacto</label><input className="input" value={form.contacto_tel} onChange={e=>setForm(f=>({...f,contacto_tel:e.target.value}))}/></div>
            <div><label className="form-label">Inicio convenio</label><input className="input" type="date" value={form.convenio_inicio} onChange={e=>setForm(f=>({...f,convenio_inicio:e.target.value}))}/></div>
            <div><label className="form-label">Fin convenio</label><input className="input" type="date" value={form.convenio_fin} onChange={e=>setForm(f=>({...f,convenio_fin:e.target.value}))}/></div>
          </div>
          <button className="btn btn-primary btn-sm" onClick={saveEmpresa} disabled={saving}>{saving?'Guardando…':'Guardar empresa'}</button>
        </div>
      )}
      {loading?<div style={{textAlign:'center',padding:20,color:'var(--text-muted)'}}>Cargando…</div>:
      empresas.length===0?<div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>No hay empresas registradas.</div>:
      <div className="card"><table>
        <thead><tr><th>Empresa</th><th>Sector</th><th>Contacto</th><th>Tel.</th><th>Convenio</th><th>Estado</th></tr></thead>
        <tbody>{empresas.map((e)=>{
          const estadoChip=e.estado==='vigente'?'chip-green':e.estado==='por_renovar'?'chip-amber':'chip-red';
          const estadoLabel=e.estado==='vigente'?'Vigente':e.estado==='por_renovar'?'Por renovar':e.estado==='vencido'?'Vencido':'Suspendido';
          return(
            <tr key={e.id_empresa}>
              <td style={{fontWeight:600}}>{e.nombre}</td>
              <td style={{fontSize:12,color:'var(--text-muted)'}}>{e.sector||'—'}</td>
              <td>{e.contacto_nombre||'—'}</td>
              <td style={{fontSize:12}}>{e.contacto_tel||'—'}</td>
              <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{e.convenio_inicio||'—'}{e.convenio_fin?' → '+e.convenio_fin:''}</td>
              <td><span className={'chip '+estadoChip} style={{fontSize:10}}>{estadoLabel}</span></td>
            </tr>
          );
        })}</tbody>
      </table></div>}
    </div>
  );
}

/* ── LOGIN ────────────────────────────────────────────── */
function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  async function handleSubmit(e){
    e.preventDefault();
    setErr(''); setLoading(true);
    try{
      const {data:authData,error:authErr}=await sb.auth.signInWithPassword({email,password:pass});
      if(authErr) throw authErr;
      const {data:perfil,error:pErr}=await sb
        .from('usuarios').select('*,roles(nombre)')
        .eq('email',email).single();
      if(pErr||!perfil){
        await sb.auth.signOut();
        throw new Error('Usuario no encontrado en el sistema escolar. Contacta a tu administrador.');
      }
      // Actualizar último acceso
      await sb.from('usuarios').update({ultimo_acceso:new Date().toISOString()}).eq('email',email);
      onLogin(perfil,authData.session);
    }catch(e){
      setErr(e.message||'Error al iniciar sesión.');
    }finally{setLoading(false);}
  }

  return(
    <div className="login-wrap" style={{minHeight:'100vh',width:'100%',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
      <div className="login-card" style={{display:'flex',borderRadius:16,overflow:'hidden',boxShadow:'0 8px 40px oklch(0 0 0/0.18)',width:'min(860px,100%)',minHeight:480}}>
        {/* Panel izquierdo */}
        <div className="login-left" style={{width:300,background:'var(--navy)',flexShrink:0,padding:'48px 32px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
          <div>
            <div style={{width:44,height:44,background:'var(--blue)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-serif)',color:'#fff',fontSize:22,marginBottom:20}}>T</div>
            <div style={{color:'#fff',fontWeight:700,fontSize:18,lineHeight:1.3,marginBottom:8}}>TECNM<br/>Campus Mazatlán</div>
            <div style={{color:'oklch(0.6 0.03 250)',fontSize:12,lineHeight:1.6}}>Sistema Integral<br/>AMBAR / SII</div>
          </div>
          <div className="login-left-footer" style={{color:'oklch(0.45 0.03 250)',fontSize:11}}>
            <div style={{marginBottom:6}}>Acceso restringido al personal y alumnos autorizados del Instituto.</div>
            <div>© 2025 TECNM · Todos los derechos reservados.</div>
          </div>
        </div>
        {/* Panel derecho */}
        <div className="login-right" style={{flex:1,background:'var(--card)',padding:'48px 40px',display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{marginBottom:32}}>
            <div style={{fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:6}}>Iniciar sesión</div>
            <div style={{fontSize:13,color:'var(--text-muted)'}}>Ingresa con tu correo institucional</div>
          </div>
          <form onSubmit={handleSubmit}>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,fontWeight:600,color:'var(--text-mid)',display:'block',marginBottom:6}}>Correo institucional</label>
              <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="usuario@mazatlan.tecnm.mx"
                style={{width:'100%',padding:'10px 14px',border:'1px solid var(--border)',borderRadius:8,fontSize:14,fontFamily:'var(--font)',color:'var(--text)',background:'var(--bg)',outline:'none',transition:'border-color .2s'}}
                onFocus={e=>e.target.style.borderColor='var(--blue)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}/>
            </div>
            <div style={{marginBottom:24}}>
              <label style={{fontSize:12,fontWeight:600,color:'var(--text-mid)',display:'block',marginBottom:6}}>Contraseña</label>
              <input type="password" required value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
                style={{width:'100%',padding:'10px 14px',border:'1px solid var(--border)',borderRadius:8,fontSize:14,fontFamily:'var(--font)',color:'var(--text)',background:'var(--bg)',outline:'none',transition:'border-color .2s'}}
                onFocus={e=>e.target.style.borderColor='var(--blue)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}/>
            </div>
            {err&&<div style={{marginBottom:16,padding:'10px 14px',background:'var(--red-dim,oklch(0.95 0.05 20))',border:'1px solid var(--red)',borderRadius:8,fontSize:13,color:'var(--red)'}}>{err}</div>}
            <button type="submit" disabled={loading}
              style={{width:'100%',padding:'11px',background:loading?'oklch(0.65 0.12 245)':'var(--blue)',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,fontFamily:'var(--font)',cursor:loading?'not-allowed':'pointer',transition:'background .2s'}}>
              {loading?'Verificando...':'Entrar al sistema'}
            </button>
          </form>
          <div style={{marginTop:24,fontSize:11,color:'var(--text-muted)',textAlign:'center'}}>
            ¿Olvidaste tu contraseña? Contacta a Servicios Escolares.
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── TITLES MAP ───────────────────────────────────────── */
const TITLES={
  dashboard:'Panel Principal',reticula:'Inscripción / Retícula',
  kardex:'Kárdex Académico',asistencias:'Control de Asistencias',
  horario:'Horario de Clases',constancias:'Constancias en Línea',
  adeudos:'Adeudos y Pagos',evalDocente:'Evaluación del Desempeño Docente',
  titulacion:'Proceso de Titulación',notificaciones:'Notificaciones',
  perfil:'Mi Perfil',lista:'Lista y Calificaciones',
  tutorias:'Módulo de Tutorías',instrumentacion:'Instrumentación Didáctica',
  alumnos:'Directorio de Alumnos',docentes:'Plantilla Docente',grupos:'Grupos y Cupos',
  pagos:'Módulo de Pagos',reportes:'Reportes y Estadísticas',
  egresados:'Seguimiento de Egresados',
  cola_constancias:'Cola de Constancias',inscripciones_ctrl:'Control de Inscripciones',
  bajas:'Bajas de Alumnos',expedientes:'Expedientes de Alumnos',
  reticula_admin:'Administrar Retícula',equivalencias:'Equivalencias y Revalidaciones',
  carga_creditos:'Carga de Créditos Extracurriculares',
  servicio_social:'Servicio Social',residencias:'Residencias Profesionales',
  empresas:'Empresas Convenio',
};

/* ── APP ──────────────────────────────────────────────── */
function App(){
  const [authLoading,setAuthLoading]=useState(true);
  const [session,setSession]=useState(null);
  const [perfil,setPerfil]=useState(null);
  const [role,setRole]=useState('alumno');
  const [roleId,setRoleId]=useState(null);
  const [periodo,setPeriodo]=useState(null);
  const [testMode,setTestMode]=useState(false);
  const [view,setView]=useState('dashboard');
  const [key,setKey]=useState(0);
  const [searchOpen,setSearchOpen]=useState(false);
  const [searchQ,setSearchQ]=useState('');
  const [notifCount,setNotifCount]=useState(0);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const searchRef=useRef(null);
  const go=(v)=>{setView(v);setKey(k=>k+1);setSearchOpen(false);setSearchQ('');setSidebarOpen(false);};

  const fetchNotifCount=useCallback(async(idUsuario)=>{
    if(!idUsuario) return;
    const {count}=await sb.from('notificaciones')
      .select('*',{count:'exact',head:true})
      .eq('id_usuario',idUsuario).eq('leida',false);
    setNotifCount(count||0);
  },[]);

  async function fetchRoleId(rolName,idUsuario){
    if(rolName==='alumno'){
      const {data}=await sb.from('alumnos').select('id_alumno').eq('id_usuario',idUsuario).single();
      return data?.id_alumno||null;
    }
    if(rolName==='docente'){
      const {data}=await sb.from('docentes').select('id_docente').eq('id_usuario',idUsuario).single();
      return data?.id_docente||null;
    }
    return null;
  }

  const loadPeriodo=useCallback(async()=>{
    const {data}=await sb.from('periodos').select('*').in('estado',['inscripcion','en_curso']).order('id_periodo',{ascending:false}).limit(1);
    if(data&&data.length>0) setPeriodo(data[0]); else setPeriodo(null);
  },[]);

  const loadPerfil=useCallback(async(user)=>{
    if(!user){setPerfil(null);setRoleId(null);setPeriodo(null);setAuthLoading(false);return;}
    const {data}=await sb.from('usuarios').select('*,roles(nombre)').eq('email',user.email).single();
    if(data){
      setPerfil(data);
      const rolName=data.roles?.nombre||'alumno';
      setRole(rolName);
      const rid=await fetchRoleId(rolName,data.id_usuario);
      setRoleId(rid);
      fetchNotifCount(data.id_usuario);
      loadPeriodo();
    }else{
      await sb.auth.signOut();
      setPerfil(null);setRoleId(null);setSession(null);
    }
    setAuthLoading(false);
  },[fetchNotifCount,loadPeriodo]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session) loadPerfil(session.user); else setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{
      setSession(s);
      if(s) loadPerfil(s.user); else {setPerfil(null);setRoleId(null);setAuthLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[loadPerfil]);

  async function handleLogin(p,s){
    setPerfil(p);setSession(s);
    const rolName=p.roles?.nombre||'alumno';
    setRole(rolName);
    const rid=await fetchRoleId(rolName,p.id_usuario);
    setRoleId(rid);
    loadPeriodo();
  }
  async function handleLogout(){await sb.auth.signOut();setPerfil(null);setSession(null);setRoleId(null);setPeriodo(null);setTestMode(false);}

  if(authLoading) return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:44,height:44,background:'var(--navy)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-serif)',color:'#fff',fontSize:22,margin:'0 auto 16px'}}>T</div>
        <div style={{color:'var(--text-muted)',fontSize:13}}>Verificando sesión…</div>
      </div>
    </div>
  );
  if(!session||!perfil) return <Login onLogin={handleLogin}/>;

  const userDisplay={
    name:`${perfil.nombres} ${perfil.apellido_pat}`,
    role:USERS[role]?.role||perfil.roles?.nombre||role,
    init:(perfil.nombres[0]||'')+(perfil.apellido_pat[0]||''),
  };

  const render=()=>{
    const allowed=ALLOWED_VIEWS[view];
    const v=(allowed&&!allowed.includes(role))?'dashboard':view;
    switch(v){
      case 'dashboard': return <Dashboard role={role}/>;
      case 'reticula': return <Reticula/>;
      case 'kardex': return <Kardex/>;
      case 'asistencias': return <Asistencias role={role}/>;
      case 'horario': return <Horario/>;
      case 'constancias': return <Constancias/>;
      case 'adeudos': return <Adeudos/>;
      case 'evalDocente': return <EvalDocente/>;
      case 'titulacion': return <Titulacion role={role}/>;
      case 'notificaciones': return <Notificaciones/>;
      case 'perfil': return <Perfil/>;
      case 'lista': return <Lista/>;
      case 'tutorias': return <Tutorias/>;
      case 'instrumentacion': return <Instrumentacion/>;
      case 'alumnos': return <Alumnos/>;
      case 'docentes': return <PlantillaDocentes/>;
      case 'grupos': return <Grupos/>;
      case 'pagos': return <Pagos/>;
      case 'reportes': return <Reportes/>;
      case 'egresados': return <Egresados/>;
      case 'cola_constancias': return <ColaConstancias/>;
      case 'inscripciones_ctrl': return <InscripcionesCtrl/>;
      case 'bajas': return <Bajas/>;
      case 'expedientes': return <Expedientes/>;
      case 'reticula_admin': return <ReticulaAdmin/>;
      case 'equivalencias': return <Equivalencias/>;
      case 'carga_creditos': return <CargaCreditos/>;
      case 'servicio_social': return <ServicioSocial/>;
      case 'residencias': return <Residencias/>;
      case 'empresas': return <Empresas/>;
      default: return <Dashboard role={role}/>;
    }
  };

  const navItems=Object.entries(TITLES)
    .filter(([id])=>{const a=ALLOWED_VIEWS[id];return !a||a.includes(role);})
    .map(([id,label])=>({id,label}));
  const searchResults=searchQ.length>1
    ?navItems.filter(n=>n.label.toLowerCase().includes(searchQ.toLowerCase())).slice(0,8)
    :[];

  return(
    <PerfilCtx.Provider value={{perfil,roleId,refreshNotif:()=>fetchNotifCount(perfil?.id_usuario),periodo,testMode,setTestMode}}>
      <React.Fragment>
        <ToastLayer/>
        <button onClick={()=>setTestMode(m=>!m)}
          style={{position:'fixed',bottom:24,right:24,zIndex:9999,padding:'9px 18px',borderRadius:20,border:'2px solid '+(testMode?'var(--amber)':'var(--border)'),background:testMode?'var(--amber-dim)':'var(--card)',color:testMode?'oklch(.45 .14 65)':'var(--text-muted)',fontFamily:'var(--font)',fontSize:12,fontWeight:600,cursor:'pointer',boxShadow:'0 4px 16px oklch(0 0 0/0.18)',transition:'var(--t)'}}
          title="Desactiva restricciones de tiempo para probar módulos con ventana cerrada (inscripción, eval docente, etc.)">
          {testMode?'Modo prueba: ON':'Modo prueba: OFF'}
        </button>
        {searchOpen&&(
          <div className="search-overlay" onClick={e=>{if(e.target===e.currentTarget){setSearchOpen(false);setSearchQ('');}}}>
            <div className="search-box">
              <span style={{color:'var(--text-muted)',flexShrink:0,width:16,height:16}}>{ic.search}</span>
              <input
                ref={searchRef}
                autoFocus
                className="search-box"
                style={{flex:1,border:'none',outline:'none',fontSize:14,fontFamily:'var(--font)',background:'transparent',color:'var(--text)',padding:0}}
                placeholder="Buscar módulo o sección…"
                value={searchQ}
                onChange={e=>setSearchQ(e.target.value)}
                onKeyDown={e=>{
                  if(e.key==='Escape'){setSearchOpen(false);setSearchQ('');}
                  if(e.key==='Enter'&&searchResults.length>0){go(searchResults[0].id);}
                }}
              />
              <button onClick={()=>{setSearchOpen(false);setSearchQ('');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:12}}>Esc</button>
            </div>
            {searchResults.length>0&&(
              <div className="search-results">
                {searchResults.map(r=>(
                  <div key={r.id} className="search-result-item" onClick={()=>go(r.id)}>
                    <span style={{color:'var(--text-muted)',width:16,height:16,flexShrink:0}}>{ic.search}</span>
                    <span style={{fontWeight:500}}>{r.label}</span>
                    <span style={{marginLeft:'auto',fontSize:11,color:'var(--text-muted)'}}>{r.id}</span>
                  </div>
                ))}
              </div>
            )}
            {searchQ.length>1&&searchResults.length===0&&(
              <div className="search-results">
                <div style={{padding:'14px 16px',color:'var(--text-muted)',fontSize:13}}>Sin resultados para "{searchQ}"</div>
              </div>
            )}
          </div>
        )}
        <SidebarConAuth role={role} view={view} setView={go} user={userDisplay} onLogout={handleLogout} notifCount={notifCount} open={sidebarOpen}/>
        {sidebarOpen&&<div className="sidebar-backdrop show" onClick={()=>setSidebarOpen(false)}></div>}
        <div className="main">
          <div className="topbar">
            <button className="menu-btn" title="Menú" onClick={()=>setSidebarOpen(o=>!o)} aria-label="Abrir menú">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
            </button>
            <div className="topbar-title">{TITLES[view]||view}</div>
            <div className="topbar-sub">TECNM Campus Mazatlán · ITMAZ</div>
            <div className="topbar-right">
              <button className="icon-btn" title="Buscar (Ctrl+K)" onClick={()=>{setSearchOpen(true);setSearchQ('');}}>{ic.search}</button>
              <button className="icon-btn" title="Notificaciones" onClick={()=>go('notificaciones')} style={{position:'relative'}}>
                {ic.bell}
                {notifCount>0&&<span style={{position:'absolute',top:2,right:2,width:8,height:8,borderRadius:'50%',background:'var(--red)',border:'2px solid var(--card)'}}></span>}
              </button>
              <div className="avatar" title={userDisplay.name}
                   style={{width:30,height:30,fontSize:11,cursor:'pointer'}} onClick={()=>go('perfil')}>
                {userDisplay.init}
              </div>
            </div>
          </div>
          <div className="content" key={key}>{render()}</div>
        </div>
      </React.Fragment>
    </PerfilCtx.Provider>
  );
}

/* Sidebar con datos reales del usuario y botón logout */
function SidebarConAuth({role,view,setView,user,onLogout,notifCount,open}){
  const nav=NAV[role]||NAV.alumno;
  return(
    <div className={"sidebar"+(open?" open":"")}>
      <div className="sidebar-logo">
        <div className="logo-mark">T</div>
        <div className="logo-name">TECNM Campus</div>
        <div className="logo-sub">Sistema Integral AMBAR</div>
      </div>
      <div style={{margin:'12px 12px 2px'}}>
        <div style={{fontSize:9.5,letterSpacing:'.07em',textTransform:'uppercase',color:'oklch(0.45 0.03 250)',fontWeight:500,marginBottom:6,padding:'0 2px'}}>Rol activo</div>
        <div style={{padding:'6px 10px',background:'var(--navy-light)',borderRadius:7,display:'flex',alignItems:'center',gap:7}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:'var(--blue)',flexShrink:0,display:'block'}}></span>
          <span style={{color:'#fff',fontSize:12,fontWeight:500}}>
            {role==='alumno'?'Alumno':role==='docente'?'Docente':role==='admin'?'Administrador':role==='serv_escolares'?'Servicios Escolares':role==='coordinador'?'Coordinador':'Vinculación'}
          </span>
        </div>
      </div>
      <div className="nav-section">
        <div className="nav-label">Navegación</div>
        {nav.map(item=>(
          <div key={item.id} className={`nav-item${view===item.id?' active':''}`} onClick={()=>setView(item.id)}>
            <span className="nav-icon">{ic[item.icon]}</span>
            {item.label}
            {item.id==='notificaciones'&&notifCount>0&&<span className="nav-badge">{notifCount}</span>}
          </div>
        ))}
      </div>
      <div className="sidebar-footer">
        <div className="user-card" onClick={()=>setView('perfil')}>
          <div className="avatar">{user.init}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="user-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
            <div className="user-role">{user.role}</div>
          </div>
        </div>
        <button onClick={onLogout}
          style={{width:'100%',marginTop:8,padding:'7px',border:'1px solid oklch(0.30 0.04 250)',borderRadius:8,background:'transparent',color:'oklch(0.55 0.03 250)',fontSize:12,fontFamily:'var(--font)',cursor:'pointer',transition:'var(--t)'}}>
          Cerrar sesión
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
