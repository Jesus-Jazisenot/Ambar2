                <div style={{background:'var(--bg)',borderRadius:7,padding:'8px 10px',fontSize:11.5}}><strong>Faltas acumuladas:</strong> {a.faltas}</div>
                <div style={{background:'var(--bg)',borderRadius:7,padding:'8px 10px',fontSize:11.5}}><strong>Mat. reprobadas:</strong> {a.materiasRep}</div>
                <div style={{background:'var(--bg)',borderRadius:7,padding:'8px 10px',fontSize:11.5}}><strong>Próxima reunión:</strong> Por agendar</div>
              </div>
              <label className="form-label">Nota de seguimiento</label>
              <textarea className="input" style={{marginBottom:8,minHeight:70}} placeholder="Escribe observaciones sobre el alumno..." value={notes[a.id]||''} onChange={e=>setNotes(n=>({...n,[a.id]:e.target.value}))}/>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary btn-sm" onClick={()=>window.toast('Reunión de tutoría registrada','ok')}>Registrar reunión</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Notificación enviada al coordinador de tutorías','ok')}>Notificar a tutor</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Alumno canalizado al Departamento de Estudios y Movilidad Estudiantil','ok')}>Canalizar a DEMS</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ── INSTRUMENTACIÓN ──────────────────────────────────── */
function Instrumentacion(){
  const {roleId}=useContext(PerfilCtx);
  const [grupos,setGrupos]=useState([]);
  const [selGrupo,setSelGrupo]=useState('');
  const [instr,setInstr]=useState(null);
  const [unidades,setUnidades]=useState([]);
  const [form,setForm]=useState({competencia:'',metodologia:'',url_recurso:''});
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [tab,setTab]=useState(0);

  useEffect(()=>{
    if(!roleId){setLoading(false);return;}
    sb.from('grupos').select('id_grupo,clave_grupo,materias(nombre,clave),periodos(clave)')
      .eq('id_docente',roleId).in('estado',['abierto','lleno'])
      .then(({data})=>{
        const g=data||[];
        setGrupos(g);
        if(g.length>0) setSelGrupo(String(g[0].id_grupo));
        else setLoading(false);
      });
  },[roleId]);

  useEffect(()=>{
    if(!selGrupo) return;
    setLoading(true);
    sb.from('instrumentaciones').select('*').eq('id_grupo',parseInt(selGrupo)).maybeSingle()
      .then(async({data})=>{
        setInstr(data||null);
        setForm({competencia:data?.competencia||'',metodologia:data?.metodologia||'',url_recurso:data?.url_recurso||''});
        if(data?.id_instr){
          const {data:u}=await sb.from('unidades_instr').select('*').eq('id_instr',data.id_instr).order('numero');
          setUnidades(u||[]);
        } else setUnidades([]);
        setLoading(false);
      });
  },[selGrupo]);

  async function saveInstr(){
    if(!selGrupo) return;
    setSaving(true);
    const payload={competencia:form.competencia,metodologia:form.metodologia,url_recurso:form.url_recurso,publicada:true,fecha_pub:new Date().toISOString()};
    if(instr){
      const {error}=await sb.from('instrumentaciones').update(payload).eq('id_instr',instr.id_instr);
      if(error) window.toast('Error: '+error.message,'error');
      else{setInstr(p=>({...p,...payload}));window.toast('Instrumentación guardada y publicada','ok');}
    } else {
      const {data,error}=await sb.from('instrumentaciones').insert({id_grupo:parseInt(selGrupo),...payload}).select().single();
      if(error) window.toast('Error: '+error.message,'error');
      else{setInstr(data);window.toast('Instrumentación creada y publicada','ok');}
    }
    setSaving(false);
  }

  const grpInfo=grupos.find(g=>String(g.id_grupo)===selGrupo);

  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontWeight:600,fontSize:14.5}}>Instrumentación Didáctica</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>
            {grpInfo?(grpInfo.materias?.clave+' · '+grpInfo.materias?.nombre+' · Período '+(grpInfo.periodos?.clave||'')):'Selecciona un grupo'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {grupos.length>1&&(
            <select className="input" style={{width:'auto',padding:'5px 10px'}} value={selGrupo} onChange={e=>setSelGrupo(e.target.value)}>
              {grupos.map(g=><option key={g.id_grupo} value={String(g.id_grupo)}>{g.clave_grupo}</option>)}
            </select>
          )}
          <button className="btn btn-ghost btn-sm" onClick={()=>{if(form.url_recurso) window.open(form.url_recurso,'_blank'); else window.toast('Agrega un URL de recurso en la pestaña Recursos','warn');}}>Vista previa</button>
          <button className="btn btn-primary btn-sm" onClick={saveInstr} disabled={saving||!selGrupo}>{saving?'Guardando…':'Guardar y publicar'}</button>
        </div>
      </div>
      {loading?<div style={{textAlign:'center',padding:24,color:'var(--text-muted)'}}>Cargando…</div>:(
        grupos.length===0?(
          <div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>No tienes grupos activos asignados en este período.</div>
        ):(
          <>
          <div className="tabs">
            {['Plan del curso','Unidades de aprendizaje','Criterios de evaluación','Recursos'].map((t,i)=>(
              <div key={i} className={'tab'+(tab===i?' active':'')} onClick={()=>setTab(i)}>{t}</div>
            ))}
          </div>
          {tab===0&&(
            <div className="grid-2">
              <div className="card card-pad">
                <div className="section-title">Datos generales</div>
                {grpInfo&&[
                  ['Materia',grpInfo.materias?.nombre||'—'],
                  ['Clave',grpInfo.materias?.clave||'—'],
                  ['Grupo',grpInfo.clave_grupo],
                  ['Período',grpInfo.periodos?.clave||'—'],
                ].map(([l,v],i)=>(
                  <div key={i} className="stat-row"><div className="stat-row-label">{l}</div><div className="stat-row-val" style={{fontSize:12.5}}>{v}</div></div>
                ))}
                {instr&&<div style={{marginTop:10}}><span className={'chip '+(instr.publicada?'chip-green':'chip-amber')} style={{fontSize:10}}>{instr.publicada?'Publicada':'Borrador'}</span></div>}
              </div>
              <div className="card card-pad">
                <div className="section-title">Competencia a desarrollar</div>
                <textarea className="input" value={form.competencia} onChange={e=>setForm(f=>({...f,competencia:e.target.value}))} placeholder="Describe la competencia principal de la materia…" style={{marginBottom:12,minHeight:100}}/>
                <div className="section-title" style={{marginTop:4}}>Metodología</div>
                <textarea className="input" value={form.metodologia} onChange={e=>setForm(f=>({...f,metodologia:e.target.value}))} placeholder="Describe la metodología de enseñanza…" style={{minHeight:70}}/>
              </div>
            </div>
          )}
          {tab===1&&(
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {unidades.length===0?(
                <div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>No hay unidades registradas para esta instrumentación.</div>
              ):unidades.map(u=>(
                <div key={u.id_unidad} className="card card-pad">
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}>
                    <div><div style={{fontWeight:600,fontSize:13}}>Unidad {u.numero}: {u.titulo}</div><div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>{u.horas} horas</div></div>
                    {u.horas&&<span className="chip chip-blue">{u.horas} hrs</span>}
                  </div>
                  {u.temas&&<div style={{fontSize:12.5,color:'var(--text-mid)',marginBottom:8}}><strong>Temas:</strong> {u.temas}</div>}
                  {u.criterios_eval&&<div style={{fontSize:12.5,color:'var(--text-mid)'}}><strong>Evaluación:</strong> {u.criterios_eval}</div>}
                </div>
              ))}
            </div>
          )}
          {tab===2&&(
            <div className="card card-pad">
              <div className="section-title">Distribución de la calificación</div>
              {[['Parcial 1 (Unidades 1-2)','30%'],['Parcial 2 (Unidades 3-4)','30%'],['Proyecto integrador','30%'],['Asistencia y participación','10%']].map(([l,v],i)=>(
                <div key={i} className="stat-row">
                  <div className="stat-row-label">{l}</div>
                  <div className="stat-row-val" style={{color:'var(--blue)'}}>{v}</div>
                </div>
              ))}
              <div style={{marginTop:14,padding:12,background:'var(--amber-dim)',borderRadius:8,fontSize:12.5,color:'oklch(.45 .14 65)'}}>
                Calificación mínima aprobatoria: <strong>6.0</strong>. Asistencia mínima para examen final: 80%.
              </div>
            </div>
          )}
          {tab===3&&(
            <div className="card card-pad">
              <div className="section-title">Recurso o video de la clase</div>
              <div style={{marginBottom:16}}>
                <label className="form-label">URL del recurso (YouTube, Google Drive, etc.)</label>
                <input className="input" type="url" value={form.url_recurso} onChange={e=>setForm(f=>({...f,url_recurso:e.target.value}))} placeholder="https://youtube.com/watch?v=..."/>
                <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:6}}>Este enlace estará visible para tus alumnos como material de apoyo de la clase.</div>
              </div>
              {form.url_recurso&&(
                <div style={{padding:14,background:'var(--blue-dim)',borderRadius:8,display:'flex',alignItems:'center',gap:12}}>

                    <div style={{fontWeight:500,fontSize:13,marginBottom:4}}>Enlace registrado</div>
                    <a href={form.url_recurso} target="_blank" rel="noreferrer" style={{fontSize:12,color:'var(--blue)',wordBreak:'break-all'}}>{form.url_recurso}</a>

          </>
        )
      )}
    </div>
  );
}

/* ── ALUMNOS (admin) ──────────────────────────────────── */
function Alumnos(){
  const [search,setSearch]=useState('');
  const [alumnos,setAlumnos]=useState([]);
  const [carreras,setCarreras]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const today=new Date().toISOString().slice(0,10);
  const blankForm={nombres:'',apellido_pat:'',apellido_mat:'',matricula:'',semestre_actual:1,id_carrera:'',fecha_ingreso:today,email:'',password:''};
  const [form,setForm]=useState(blankForm);
  const [showPass,setShowPass]=useState(false);

  const load=async()=>{
    setLoading(true);
    const [aRes,cRes]=await Promise.all([
      sb.from('alumnos').select('id_alumno,matricula,semestre_actual,promedio_gral,usuarios(nombres,apellido_pat,apellido_mat,email),carreras(clave)').order('id_alumno'),
      sb.from('carreras').select('id_carrera,nombre,clave').order('clave'),
    ]);
    setAlumnos(aRes.data||[]);
    setCarreras(cRes.data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const filtered=alumnos.filter(a=>{
    const nombre=a.usuarios?`${a.usuarios.nombres} ${a.usuarios.apellido_pat}`:'';
    return nombre.toLowerCase().includes(search.toLowerCase())||a.matricula?.includes(search);
  });

  const saveNew=async()=>{
    const n=form.nombres.trim(),ap=form.apellido_pat.trim(),mat=form.matricula.trim(),em=form.email.trim();
    if(!n||!ap||!mat||!em||!form.password||!form.id_carrera){
      setMsg('Todos los campos marcados con * son obligatorios.');return;
    }
    if(!/^\d{5,15}$/.test(mat)){setMsg('Matrícula inválida: solo dígitos, entre 5 y 15 caracteres.');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(em)){setMsg('Email con formato inválido.');return;}
    if(form.password.length<8){setMsg('La contraseña debe tener al menos 8 caracteres.');return;}
    if(!/[0-9]/.test(form.password)){setMsg('La contraseña debe contener al menos un número.');return;}
    setSaving(true);
    try{
      // 1. Crear cuenta Auth vía /api/admin-create-user (el SERVICE_KEY vive solo en Vercel)
      const {data:authData,error:authErr}=await adminApi('/api/admin-create-user',{
        email:form.email,password:form.password,
      });
      if(authErr){setMsg('Error al crear cuenta: '+authErr.message);setSaving(false);return;}
      const uid=authData && authData.uid;
      if(!uid){setMsg('No se obtuvo ID del usuario creado.');setSaving(false);return;}
      const rollback=async(reason)=>{
        try{await adminApi('/api/admin-delete-user',{uid});}catch(_){}
        setMsg(reason);setSaving(false);
      };

      // 2. Rol alumno
      const {data:rolData}=await sb.from('roles').select('id_rol').eq('nombre','alumno').single();
      if(!rolData){await rollback('No se encontró el rol alumno en la BD.');return;}

      // 3. Insertar en usuarios
      const {data:uData,error:uErr}=await sb.from('usuarios').insert({
        nombres:form.nombres,apellido_pat:form.apellido_pat,apellido_mat:form.apellido_mat||null,
        email:form.email,id_rol:rolData.id_rol,supabase_uid:uid,
      }).select().single();
      if(uErr){await rollback('Error en tabla usuarios: '+uErr.message);return;}

      // 4. Obtener id_plan del plan activo de la carrera
      const {data:planData}=await sb.from('planes_estudio').select('id_plan').eq('id_carrera',parseInt(form.id_carrera)).order('id_plan',{ascending:false}).limit(1).single();

      // 5. Insertar en alumnos
      const alumnoInsert={
        id_usuario:uData.id_usuario,
        matricula:form.matricula,
        semestre_actual:parseInt(form.semestre_actual),
        id_carrera:parseInt(form.id_carrera),
        fecha_ingreso:form.fecha_ingreso,
      };
      if(planData?.id_plan) alumnoInsert.id_plan=planData.id_plan;
      const {error:aErr}=await sb.from('alumnos').insert(alumnoInsert);
      if(aErr){
        try{await sb.from('usuarios').delete().eq('id_usuario',uData.id_usuario);}catch(_){}
        await rollback('Error en tabla alumnos: '+aErr.message);return;
      }

      setShowNew(false);setForm(blankForm);setMsg('');
      window.toast('Alumno creado correctamente','ok');
      load();
    }catch(e){setMsg('Error inesperado: '+e.message);}
    setSaving(false);
  };

  return(
    <div className="page-enter">
      {showNew&&(
        <Modal title="Nuevo alumno" onClose={()=>{setShowNew(false);setMsg('');}} wide>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Nombre(s) *</label>
              <input className="input" placeholder="Ana Sofía" value={form.nombres} onChange={e=>setForm(f=>({...f,nombres:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Apellido paterno *</label>
              <input className="input" placeholder="García" value={form.apellido_pat} onChange={e=>setForm(f=>({...f,apellido_pat:e.target.value}))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Apellido materno</label>
              <input className="input" placeholder="Hernández" value={form.apellido_mat} onChange={e=>setForm(f=>({...f,apellido_mat:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Matrícula / N° control *</label>
              <input className="input" placeholder="21310010" value={form.matricula} onChange={e=>setForm(f=>({...f,matricula:e.target.value,email:e.target.value?e.target.value+'@mazatlan.tecnm.mx':f.email}))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Carrera *</label>
              <select className="input" value={form.id_carrera} onChange={e=>setForm(f=>({...f,id_carrera:e.target.value}))}>
                <option value="">— Seleccionar —</option>
                {carreras.map(c=><option key={c.id_carrera} value={c.id_carrera}>{c.clave} — {c.nombre}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Semestre de ingreso</label>
              <input className="input" type="number" min="1" max="9" value={form.semestre_actual} onChange={e=>setForm(f=>({...f,semestre_actual:e.target.value}))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Email institucional *</label>
              <input className="input" type="email" placeholder="se genera con la matricula" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
              {form.matricula&&<span style={{fontSize:10,color:'var(--green)',marginTop:2,display:'block'}}>Generado automaticamente</span>}
            </div>
            <div className="form-group">
              <label className="form-label">Fecha de ingreso *</label>
              <input className="input" type="date" value={form.fecha_ingreso} onChange={e=>setForm(f=>({...f,fecha_ingreso:e.target.value}))}/>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Contraseña inicial * (mínimo 8 caracteres, debe contener un número)</label>
            <div style={{position:'relative'}}>
              <input className="input" style={{paddingRight:70}} type={showPass?'text':'password'} placeholder="Escolar2025!" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
              <button type="button" className="btn btn-ghost btn-sm" style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',padding:'4px 8px',fontSize:11}} onClick={()=>setShowPass(s=>!s)}>{showPass?'Ocultar':'Ver'}</button>
            </div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Comunícale esta contraseña al alumno. Podrá cambiarla desde su perfil al ingresar.</div>
          </div>
          {msg&&<div style={{background:'var(--red-dim)',border:'1px solid var(--red)',borderRadius:8,padding:'9px 13px',color:'var(--red)',fontSize:12,marginBottom:8}}>{msg}</div>}
          <div className="modal-footer">
            <button className="btn btn-ghost btn-sm" onClick={()=>{setShowNew(false);setMsg('');}}>Cancelar</button>
            <button className="btn btn-primary btn-sm" onClick={saveNew} disabled={saving}>{saving?'Creando cuenta…':'Crear alumno'}</button>
          </div>
        </Modal>
      )}
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        <div style={{position:'relative',flex:1,maxWidth:300}}>
          <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',pointerEvents:'none',width:14,height:14}}>{ic.search}</span>
          <input className="input" style={{paddingLeft:30}} placeholder="Buscar alumno…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>{setForm(blankForm);setMsg('');setShowNew(true);}}>{ic.plus} Nuevo alumno</button>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando alumnos…</div>:(
        filtered.length===0
        ?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay alumnos registrados. Usa "Nuevo alumno" para agregar el primero.</div>
        :<div className="card"><table>
          <thead><tr><th>Matrícula</th><th>Nombre</th><th>Carrera</th><th>Semestre</th><th>Promedio</th><th>Estado</th></tr></thead>
          <tbody>{filtered.map((a,i)=>{
            const nombre=a.usuarios?`${a.usuarios.apellido_pat} ${a.usuarios.apellido_mat||''}, ${a.usuarios.nombres}`.trim():'—';
            const prom=parseFloat(a.promedio_gral)||0;
            return(
              <tr key={i}>
                <td style={{fontFamily:'monospace',fontSize:11}}>{a.matricula||'—'}</td>
                <td style={{fontWeight:500}}>{nombre}</td>
                <td><span className="chip chip-blue" style={{fontSize:10}}>{a.carreras?.clave||'—'}</span></td>
                <td>{a.semestre_actual||'—'}°</td>
                <td><span className={`grade-badge ${prom>=9?'grade-a':prom>=7?'grade-b':prom>=6?'grade-c':'grade-f'}`}>{prom>0?prom.toFixed(2):'—'}</span></td>
                <td>{prom>0&&prom<6?<span className="chip chip-red" style={{fontSize:10}}>⚠ Riesgo</span>:<span className="chip chip-green" style={{fontSize:10}}>Regular</span>}</td>
              </tr>
            );
          })}</tbody>
        </table></div>
      )}
    </div>
  );
}

/* ── GRUPOS ───────────────────────────────────────────── */
function Grupos(){
  const [grupos,setGrupos]=useState([]);
  const [materias,setMaterias]=useState([]);
  const [docentes,setDocentes]=useState([]);
  const [salones,setSalones]=useState([]);
  const [periodos,setPeriodos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [editGrupo,setEditGrupo]=useState(null);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');

  const blankForm={id_materia:'',id_docente:'',id_salon:'',id_periodo:'',cupo_max:30,estado:'abierto'};
  const [form,setForm]=useState(blankForm);

  const load=async()=>{
    setLoading(true);
    const [gRes,mRes,dRes,sRes,pRes]=await Promise.all([
      sb.from('grupos').select('id_grupo,clave_grupo,cupo_max,cupo_actual,estado,materias(nombre,clave),docentes(id_docente,usuarios(nombres,apellido_pat)),salones(nombre),periodos(clave)').order('id_grupo'),
      sb.from('materias').select('id_materia,nombre,clave').order('nombre'),
      sb.from('docentes').select('id_docente,usuarios(nombres,apellido_pat)').order('id_docente'),
      sb.from('salones').select('id_salon,nombre').order('nombre'),
      sb.from('periodos').select('id_periodo,clave').order('id_periodo',{ascending:false}),
    ]);
    setGrupos(gRes.data||[]);
    setMaterias(mRes.data||[]);
    setDocentes(dRes.data||[]);
    setSalones(sRes.data||[]);
    setPeriodos(pRes.data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const openNew=()=>{setForm(blankForm);setMsg('');setShowNew(true);};
  const openEdit=g=>{
    setForm({
      id_grupo:g.id_grupo,
      id_materia:g.materias?materias.find(m=>m.nombre===g.materias.nombre)?.id_materia||'':'',
      id_docente:g.docentes?.id_docente||'',
      id_salon:g.salones?salones.find(s=>s.nombre===g.salones.nombre)?.id_salon||'':'',
      id_periodo:g.periodos?periodos.find(p=>p.clave===g.periodos.clave)?.id_periodo||'':'',
      cupo_max:g.cupo_max,
      estado:g.estado,
    });
    setMsg('');
    setEditGrupo(g);
  };

  const saveNew=async()=>{
    if(!form.id_materia||!form.id_docente||!form.id_salon||!form.id_periodo){setMsg('Completa todos los campos.');return;}
    setSaving(true);
    const mat=materias.find(m=>m.id_materia===parseInt(form.id_materia));
    const per=periodos.find(p=>p.id_periodo===parseInt(form.id_periodo));
    const clave_grupo=(mat?.clave||'GRP')+'-'+(per?.clave||'PER')+'-'+Date.now().toString(36).slice(-3).toUpperCase();
    const {error}=await sb.from('grupos').insert({
      clave_grupo,
      id_materia:parseInt(form.id_materia),
      id_docente:parseInt(form.id_docente),
      id_salon:parseInt(form.id_salon),
      id_periodo:parseInt(form.id_periodo),
      cupo_max:parseInt(form.cupo_max),
      cupo_actual:0,
      estado:form.estado,
    });
    setSaving(false);
    if(error){setMsg('Error: '+error.message);}
    else{setShowNew(false);load();}
  };

  const saveEdit=async()=>{
    if(!form.id_materia||!form.id_docente||!form.id_salon||!form.id_periodo){setMsg('Completa todos los campos.');return;}
    setSaving(true);
    const {error}=await sb.from('grupos').update({
      id_materia:parseInt(form.id_materia),
      id_docente:parseInt(form.id_docente),
      id_salon:parseInt(form.id_salon),
      id_periodo:parseInt(form.id_periodo),
      cupo_max:parseInt(form.cupo_max),
      estado:form.estado,
    }).eq('id_grupo',form.id_grupo);
    setSaving(false);
    if(error){setMsg('Error: '+error.message);}
    else{setEditGrupo(null);load();}
  };

  const abiertos=grupos.filter(g=>g.estado==='abierto').length;
  const llenos=grupos.filter(g=>g.estado==='lleno').length;
  const totalInscritos=grupos.reduce((s,g)=>s+(g.cupo_actual||0),0);
  const cuposDisp=grupos.reduce((s,g)=>s+Math.max(0,(g.cupo_max||0)-(g.cupo_actual||0)),0);

  const FormGrupo=({onSave})=>(
    <div>
      <div className="form-row">
        <div className="form-group">
          <label className="form-label">Materia *</label>
          <select className="input" value={form.id_materia} onChange={e=>setForm(f=>({...f,id_materia:e.target.value}))}>
            <option value="">Selecciona…</option>
            {materias.map(m=><option key={m.id_materia} value={m.id_materia}>{m.clave} — {m.nombre}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Docente *</label>
          <select className="input" value={form.id_docente} onChange={e=>setForm(f=>({...f,id_docente:e.target.value}))}>
            <option value="">Selecciona…</option>
            {docentes.map(d=><option key={d.id_docente} value={d.id_docente}>{d.usuarios?.nombres} {d.usuarios?.apellido_pat}</option>)}
          </select>
        </div>
      </div>
      <div className="form-row">
        <div className="form-group">
          <label className="form-label">Salón *</label>
          <select className="input" value={form.id_salon} onChange={e=>setForm(f=>({...f,id_salon:e.target.value}))}>
            <option value="">Selecciona…</option>
            {salones.map(s=><option key={s.id_salon} value={s.id_salon}>{s.nombre}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Periodo *</label>
          <select className="input" value={form.id_periodo} onChange={e=>setForm(f=>({...f,id_periodo:e.target.value}))}>
            <option value="">Selecciona…</option>
            {periodos.map(p=><option key={p.id_periodo} value={p.id_periodo}>{p.clave}</option>)}
          </select>
        </div>
      </div>
      <div className="form-row">
        <div className="form-group">
          <label className="form-label">Cupo máximo</label>
          <input className="input" type="number" min="1" max="60" value={form.cupo_max} onChange={e=>setForm(f=>({...f,cupo_max:e.target.value}))}/>
        </div>
        <div className="form-group">
          <label className="form-label">Estado</label>
          <select className="input" value={form.estado} onChange={e=>setForm(f=>({...f,estado:e.target.value}))}>
            <option value="abierto">Abierto</option>
            <option value="lleno">Lleno</option>
            <option value="cerrado">Cerrado</option>
          </select>
        </div>
      </div>
      {msg&&<div style={{color:'var(--red)',fontSize:12,marginBottom:8}}>{msg}</div>}
      <div className="modal-footer">
        <button className="btn btn-ghost btn-sm" onClick={()=>{setShowNew(false);setEditGrupo(null);}}>Cancelar</button>
        <button className="btn btn-primary btn-sm" onClick={onSave} disabled={saving}>{saving?'Guardando…':'Guardar'}</button>
      </div>
    </div>
  );

  return(
    <div className="page-enter">
      {showNew&&(
        <Modal title="Nuevo grupo" onClose={()=>setShowNew(false)} wide>
          <FormGrupo onSave={saveNew}/>
        </Modal>
      )}
      {editGrupo&&(
        <Modal title="Editar grupo" onClose={()=>setEditGrupo(null)} wide>
          <FormGrupo onSave={saveEdit}/>
        </Modal>
      )}
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Grupos abiertos',v:abiertos,c:'var(--blue)'},{l:'Grupos llenos',v:llenos,c:'var(--red)'},{l:'Total inscritos',v:totalInscritos,c:'var(--green)'},{l:'Cupos disponibles',v:cuposDisp,c:'var(--amber)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:26,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <button className="btn btn-primary btn-sm" onClick={openNew}>{ic.plus} Nuevo grupo</button>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando grupos…</div>:(
      <div className="card"><table>
        <thead><tr><th>ID</th><th>Materia</th><th>Docente</th><th>Salón</th><th>Período</th><th>Cupo</th><th>Estado</th><th></th></tr></thead>
        <tbody>{grupos.map((g,i)=>{
          const pct=(g.cupo_actual||0)/(g.cupo_max||1)*100;
          return(
            <tr key={i}>
              <td style={{fontFamily:'monospace',fontSize:11,fontWeight:600}}>{g.id_grupo}</td>
              <td style={{fontWeight:500}}>{g.materias?.nombre||'—'}</td>
              <td style={{fontSize:12}}>{g.docentes?.usuarios?g.docentes.usuarios.nombres+' '+g.docentes.usuarios.apellido_pat:'—'}</td>
              <td>{g.salones?.nombre||'—'}</td>
              <td style={{fontSize:11.5,color:'var(--text-muted)'}}>{g.periodos?.clave||'—'}</td>
              <td>
                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                  <div style={{fontSize:12}}>{g.cupo_actual||0}/{g.cupo_max}</div>
                  <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:pct>=100?'var(--red)':pct>=80?'var(--amber)':'var(--green)'}}></div></div>
                </div>
              </td>
              <td><span className={`chip ${g.estado==='lleno'?'chip-red':g.estado==='cerrado'?'chip-amber':'chip-green'}`} style={{fontSize:10}}>{g.estado==='lleno'?'Lleno':g.estado==='cerrado'?'Cerrado':'Abierto'}</span></td>
              <td><button className="btn btn-ghost btn-sm" onClick={()=>openEdit(g)}>Editar</button></td>
            </tr>
          );
        })}</tbody>
      </table></div>
      )}
    </div>
  );
}

/* ── DOCENTES (admin) ─────────────────────────────────── */
function PlantillaDocentes(){
  const [docentes,setDocentes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showNew,setShowNew]=useState(false);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState('');
  const today=new Date().toISOString().slice(0,10);
  const blankForm={nombres:'',apellido_pat:'',apellido_mat:'',email:'',password:'',num_empleado:'',grado_academico:'licenciatura',tipo_contrato:'contrato',departamento:'',fecha_ingreso:today,cedula_prof:''};
  const [form,setForm]=useState(blankForm);
  const [showPass,setShowPass]=useState(false);

  const load=async()=>{
    setLoading(true);
    const {data}=await sb.from('docentes')
      .select('id_docente,num_empleado,grado_academico,tipo_contrato,departamento,activo,fecha_ingreso,usuarios(nombres,apellido_pat,apellido_mat,email)')
      .order('id_docente');
    setDocentes(data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const saveNew=async()=>{
    const n=form.nombres.trim(),ap=form.apellido_pat.trim(),em=form.email.trim(),emp=form.num_empleado.trim();
    if(!n||!ap||!em||!form.password||!emp||!form.departamento){setMsg('Todos los campos * son obligatorios.');return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(em)){setMsg('Email con formato inválido.');return;}
    if(form.password.length<8){setMsg('Contraseña mínimo 8 caracteres.');return;}
    if(!/[0-9]/.test(form.password)){setMsg('La contraseña debe incluir al menos un número.');return;}
    setSaving(true);
    try{
      const {data:authData,error:authErr}=await adminApi('/api/admin-create-user',{email:em,password:form.password});
      if(authErr){setMsg('Error al crear cuenta: '+authErr.message);setSaving(false);return;}
      const uid=authData && authData.uid;
      if(!uid){setMsg('No se obtuvo ID del usuario creado.');setSaving(false);return;}
      const rollback=async(reason)=>{
        try{await adminApi('/api/admin-delete-user',{uid});}catch(_){}
        setMsg(reason);setSaving(false);
      };
      const {data:rolData}=await sb.from('roles').select('id_rol').eq('nombre','docente').single();
      if(!rolData){await rollback('No se encontró el rol docente en BD.');return;}
      const {data:uData,error:uErr}=await sb.from('usuarios').insert({
        nombres:n,apellido_pat:ap,apellido_mat:form.apellido_mat||null,
        email:em,id_rol:rolData.id_rol,supabase_uid:uid,
      }).select().single();
      if(uErr){await rollback('Error en usuarios: '+uErr.message);return;}
      const {error:dErr}=await sb.from('docentes').insert({
        id_usuario:uData.id_usuario,
        num_empleado:emp,
        grado_academico:form.grado_academico,
        tipo_contrato:form.tipo_contrato,
        departamento:form.departamento,
        fecha_ingreso:form.fecha_ingreso||null,
        cedula_prof:form.cedula_prof||null,
      });
      if(dErr){
        try{await sb.from('usuarios').delete().eq('id_usuario',uData.id_usuario);}catch(_){}
        await rollback('Error en docentes: '+dErr.message);return;
      }
      setShowNew(false);setForm(blankForm);setMsg('');
      window.toast('Docente registrado correctamente','ok');
      load();
    }catch(e){setMsg('Error inesperado: '+e.message);}
    setSaving(false);
  };

  return(
    <div className="page-enter">
      {showNew&&(
        <Modal title="Registrar docente" onClose={()=>{setShowNew(false);setMsg('');}} wide>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Nombre(s) *</label>
              <input className="input" placeholder="Claudia" value={form.nombres} onChange={e=>setForm(f=>({...f,nombres:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Apellido paterno *</label>
              <input className="input" placeholder="López" value={form.apellido_pat} onChange={e=>setForm(f=>({...f,apellido_pat:e.target.value}))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Apellido materno</label>
              <input className="input" placeholder="Ramírez" value={form.apellido_mat} onChange={e=>setForm(f=>({...f,apellido_mat:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">N° de empleado *</label>
              <input className="input" placeholder="EMP-001" value={form.num_empleado} onChange={e=>setForm(f=>({...f,num_empleado:e.target.value.toUpperCase()}))}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Email institucional *</label>
              <input className="input" type="email" placeholder="docente@mazatlan.tecnm.mx" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Contraseña inicial * (≥8, incluye número)</label>
              <div style={{position:'relative'}}>
                <input className="input" style={{paddingRight:70}} type={showPass?'text':'password'} placeholder="Escolar2025!" value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}/>
                <button type="button" className="btn btn-ghost btn-sm" style={{position:'absolute',right:4,top:'50%',transform:'translateY(-50%)',padding:'4px 8px',fontSize:11}} onClick={()=>setShowPass(s=>!s)}>{showPass?'Ocultar':'Ver'}</button>
              </div>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Departamento *</label>
              <input className="input" placeholder="Sistemas Computacionales" value={form.departamento} onChange={e=>setForm(f=>({...f,departamento:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Grado académico</label>
              <select className="input" value={form.grado_academico} onChange={e=>setForm(f=>({...f,grado_academico:e.target.value}))}>
                <option value="licenciatura">Licenciatura</option>
                <option value="maestria">Maestría</option>
                <option value="doctorado">Doctorado</option>
                <option value="especialidad">Especialidad</option>
              </select>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Tipo de contrato</label>
              <select className="input" value={form.tipo_contrato} onChange={e=>setForm(f=>({...f,tipo_contrato:e.target.value}))}>
                <option value="base">Base</option>
                <option value="contrato">Contrato</option>
                <option value="honorarios">Honorarios</option>
                <option value="interino">Interino</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha de ingreso</label>
              <input className="input" type="date" value={form.fecha_ingreso} onChange={e=>setForm(f=>({...f,fecha_ingreso:e.target.value}))}/>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Cédula profesional</label>
            <input className="input" placeholder="12345678" value={form.cedula_prof} onChange={e=>setForm(f=>({...f,cedula_prof:e.target.value.replace(/\D/g,'')}))} maxLength={10}/>
          </div>
          {msg&&<div style={{background:'var(--red-dim)',border:'1px solid var(--red)',borderRadius:8,padding:'9px 13px',color:'var(--red)',fontSize:12,marginBottom:8}}>{msg}</div>}
          <div className="modal-footer">
            <button className="btn btn-ghost btn-sm" onClick={()=>{setShowNew(false);setMsg('');}}>Cancelar</button>
            <button className="btn btn-primary btn-sm" onClick={saveNew} disabled={saving}>{saving?'Registrando…':'Registrar docente'}</button>
          </div>
        </Modal>
      )}
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <button className="btn btn-primary btn-sm" onClick={()=>{setForm(blankForm);setMsg('');setShowNew(true);}}>{ic.plus} Registrar docente</button>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando docentes…</div>:(
        docentes.length===0
        ?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay docentes registrados. Usa "Registrar docente" para agregar el primero.</div>
        :<div className="card"><table>
          <thead><tr><th>N° Empleado</th><th>Nombre</th><th>Email</th><th>Departamento</th><th>Grado</th><th>Contrato</th><th>Estado</th></tr></thead>
          <tbody>{docentes.map((d,i)=>{
            const nom=d.usuarios?d.usuarios.apellido_pat+', '+d.usuarios.nombres:'—';
            const grad={licenciatura:'Lic.',maestria:'Mtro.',doctorado:'Dr.',especialidad:'Esp.'};
            return(
              <tr key={i}>
                <td style={{fontFamily:'monospace',fontSize:11,fontWeight:600}}>{d.num_empleado}</td>
                <td style={{fontWeight:500}}>{nom}</td>
                <td style={{fontSize:12,color:'var(--text-muted)'}}>{d.usuarios?.email||'—'}</td>
                <td style={{fontSize:12}}>{d.departamento||'—'}</td>
                <td><span className="chip chip-blue" style={{fontSize:10}}>{grad[d.grado_academico]||d.grado_academico}</span></td>
                <td style={{fontSize:12,textTransform:'capitalize'}}>{d.tipo_contrato}</td>
                <td>{d.activo!==false?<span className="chip chip-green" style={{fontSize:10}}>Activo</span>:<span className="chip chip-red" style={{fontSize:10}}>Inactivo</span>}</td>
              </tr>
            );
          })}</tbody>
        </table></div>
      )}
    </div>
  );
}

/* ── PAGOS (admin / serv. escolares) ──────────────────── */
function Pagos(){
  const [adeudos,setAdeudos]=useState([]);
  const [conceptos,setConceptos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showRef,setShowRef]=useState(false);
  const [refForm,setRefForm]=useState({matricula:'',id_concepto:'',monto:''});
  const [refSaved,setRefSaved]=useState(false);

  const load=async()=>{
    setLoading(true);
    const [aRes,cRes]=await Promise.all([
      sb.from('adeudos')
        .select('id_adeudo,monto,estado,fecha_venc,fecha_gen,ref_bancaria,conceptos_pago(descripcion),alumnos(matricula,usuarios(nombres,apellido_pat))')
        .order('id_adeudo',{ascending:false}).limit(80),
      sb.from('conceptos_pago').select('id_concepto,descripcion,monto').eq('activo',true).order('descripcion'),
    ]);
    setAdeudos(aRes.data||[]);
    setConceptos(cRes.data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short'}):'—';
  const pagados=adeudos.filter(a=>a.estado==='pagado');
  const pendientes=adeudos.filter(a=>a.estado==='pendiente');
  const vencidos=adeudos.filter(a=>a.estado==='vencido');
  const totalCobrado=pagados.reduce((s,a)=>s+parseFloat(a.monto||0),0);

  const onConceptoChange=e=>{
    const cp=conceptos.find(c=>c.id_concepto===parseInt(e.target.value));
    setRefForm(f=>({...f,id_concepto:e.target.value,monto:cp?cp.monto:''}));
  };

  const saveRef=async()=>{
    if(!refForm.matricula||!refForm.id_concepto||!refForm.monto){window.toast('Completa todos los campos','warn');return;}
    const mat=refForm.matricula.trim();
    if(!/^\d{5,15}$/.test(mat)){window.toast('Matrícula inválida (solo dígitos, 5-15 chars)','warn');return;}
    const {data:al}=await sb.from('alumnos').select('id_alumno').eq('matricula',mat).single();
    if(!al){window.toast('Matrícula no encontrada','err');return;}
    const hoy=new Date().toISOString().slice(0,10);
    const venc=new Date(Date.now()+15*864e5).toISOString().slice(0,10);
    const ref='REF-'+Date.now().toString(36).toUpperCase();
    const {error}=await sb.from('adeudos').insert({
      id_alumno:al.id_alumno,
      id_concepto:parseInt(refForm.id_concepto),
      monto:parseFloat(refForm.monto),
      estado:'pendiente',
      fecha_gen:hoy,
      fecha_venc:venc,
      ref_bancaria:ref,
    });
    if(error){window.toast('Error al guardar: '+error.message,'err');return;}
    setRefSaved(true);
    setTimeout(()=>{setShowRef(false);setRefSaved(false);setRefForm({matricula:'',id_concepto:'',monto:''});load();window.toast('Referencia de pago generada','ok');},1200);
  };

  return(
    <div className="page-enter">
      {showRef&&(
        <Modal title="Generar referencia de pago" onClose={()=>{setShowRef(false);setRefSaved(false);}}>
          {refSaved
            ?<div style={{textAlign:'center',padding:'20px 0'}}>
                <div style={{fontSize:32,marginBottom:8}}>✅</div>
                <div style={{fontWeight:600,fontSize:15}}>Referencia generada</div>
                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>El adeudo fue registrado correctamente.</div>
              </div>
            :<>
              <div className="form-group">
                <label className="form-label">Matrícula del alumno *</label>
                <input className="input" placeholder="21310001" maxLength={15} value={refForm.matricula} onChange={e=>setRefForm(f=>({...f,matricula:e.target.value.replace(/\D/g,'')}))}/>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Concepto de pago *</label>
                  <select className="input" value={refForm.id_concepto} onChange={onConceptoChange}>
                    <option value="">Selecciona…</option>
                    {conceptos.map(c=><option key={c.id_concepto} value={c.id_concepto}>{c.descripcion}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Monto ($) *</label>
                  <input className="input" type="number" min="1" step="0.01" value={refForm.monto} onChange={e=>setRefForm(f=>({...f,monto:e.target.value}))}/>
                </div>
              </div>
              <div className="modal-footer">
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowRef(false)}>Cancelar</button>
                <button className="btn btn-primary btn-sm" onClick={saveRef}>Registrar adeudo</button>
              </div>
            </>
          }
        </Modal>
      )}
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Cobrado',v:'$'+totalCobrado.toLocaleString('es-MX',{minimumFractionDigits:0}),c:'var(--green)'},{l:'Pendientes',v:pendientes.length,c:'var(--amber)'},{l:'Vencidos',v:vencidos.length,c:'var(--red)'},{l:'Total registros',v:adeudos.length,c:'var(--blue)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:24,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowRef(true)}>{ic.plus} Generar referencia</button>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Exportación disponible en versión de escritorio','warn')}>Exportar reporte</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Los recordatorios por email se envían 3 días antes del vencimiento','info')}>Recordatorios email</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando adeudos…</div>:(
        adeudos.length===0
        ?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay registros de adeudos. Usa "Generar referencia" para crear el primero.</div>
        :<div className="card"><table>
          <thead><tr><th>Matrícula</th><th>Alumno</th><th>Concepto</th><th>Monto</th><th>Vencimiento</th><th>Referencia</th><th>Estado</th></tr></thead>
          <tbody>{adeudos.map((p,i)=>{
            const mat=p.alumnos?.matricula||'—';
            const nom=p.alumnos?.usuarios?p.alumnos.usuarios.apellido_pat+', '+p.alumnos.usuarios.nombres:'—';
            const st=p.estado==='pagado'?'chip-green':p.estado==='vencido'?'chip-red':'chip-amber';
            return(
              <tr key={i}>
                <td style={{fontFamily:'monospace',fontSize:11}}>{mat}</td>
                <td style={{fontWeight:500}}>{nom}</td>
                <td>{p.conceptos_pago?.descripcion||'—'}</td>
                <td style={{fontWeight:600}}>{'$'+parseFloat(p.monto||0).toLocaleString('es-MX',{minimumFractionDigits:2})}</td>
                <td style={{fontSize:11.5}}>{fmtDate(p.fecha_venc)}</td>
                <td style={{fontFamily:'monospace',fontSize:10,color:'var(--text-muted)'}}>{p.ref_bancaria||'—'}</td>
                <td><span className={'chip '+st} style={{fontSize:10,textTransform:'capitalize'}}>{p.estado}</span></td>
              </tr>
            );
          })}</tbody>
        </table></div>
      )}
    </div>
  );
}

/* ── REPORTES ─────────────────────────────────────────── */
function Reportes(){
  const [tab,setTab]=useState(0);
  const [loading,setLoading]=useState(true);
  const [datos,setDatos]=useState({
    inscMes:[],carreras:[],reprobSem:[],indicadores:[],calif:[],asistenciasGrp:[],ingresos:[],adeudos:[],totalIngresos:0,totalAdeudo:0,alumnosConAdeudo:0,
  });

  useEffect(()=>{
    let ok=true;
    (async()=>{
      setLoading(true);
      const [insc,carr,kar,karRep,proc,alums,asis,pagos,ade,conceptos]=await Promise.all([
        sb.from('inscripciones').select('fecha_insc'),
        sb.from('alumnos').select('id_alumno,carreras(clave)'),
        sb.from('kardex').select('calificacion,estatus,id_alumno,alumnos(semestre_actual)'),
        sb.from('kardex').select('estatus,alumnos(semestre_actual)'),
        sb.from('procesos_titulacion').select('estado'),
        sb.from('alumnos').select('id_alumno',{count:'exact',head:true}),
        sb.from('asistencias').select('estado,inscripciones(id_grupo,grupos(clave_grupo,materias(nombre)))'),
        sb.from('pagos').select('monto_pagado,adeudos(id_concepto,conceptos_pago(descripcion))'),
        sb.from('adeudos').select('id_alumno,id_concepto,monto,estado'),
        sb.from('conceptos_pago').select('id_concepto,descripcion'),
      ]);

      /* Inscripciones por mes (últimos 9 meses) */
      const bucket={};
      const ahora=new Date();
      const months=[];
      for(let i=8;i>=0;i--){
        const d=new Date(ahora.getFullYear(),ahora.getMonth()-i,1);
        const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        bucket[key]=0;
        months.push({key,label:d.toLocaleDateString('es-MX',{month:'short'})});
      }
      (insc.data||[]).forEach(r=>{
        if(!r.fecha_insc) return;
        const k=r.fecha_insc.slice(0,7);
        if(k in bucket) bucket[k]++;
      });
      const inscMes=months.map(m=>({label:m.label,n:bucket[m.key]||0}));

      /* Distribución por carrera */
      const porCarr={};
      (carr.data||[]).forEach(a=>{const c=a.carreras?.clave||'?';porCarr[c]=(porCarr[c]||0)+1;});
      const totCarr=Object.values(porCarr).reduce((s,v)=>s+v,0)||1;
      const carreras=Object.entries(porCarr).map(([c,n])=>({c,n,pct:Math.round(n*100/totCarr)})).sort((a,b)=>b.n-a.n);

      /* Reprobación por semestre */
      const porSem={};
      (karRep.data||[]).forEach(r=>{
        const s=r.alumnos?.semestre_actual; if(!s) return;
        porSem[s]=porSem[s]||{tot:0,rep:0};
        porSem[s].tot++;
        if(r.estatus==='reprobada') porSem[s].rep++;
      });
      const reprobSem=Object.entries(porSem).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([s,o])=>({s:s+'° sem',v:o.tot?Math.round(o.rep*100/o.tot):0}));

      /* Distribución de calificaciones */
      const buckets=[{r:'10',min:10,max:10.01,c:'var(--green)'},{r:'9-9.9',min:9,max:10,c:'var(--teal)'},{r:'8-8.9',min:8,max:9,c:'var(--blue)'},{r:'7-7.9',min:7,max:8,c:'var(--amber)'},{r:'6-6.9',min:6,max:7,c:'oklch(.55 .15 35)'},{r:'0-5.9',min:0,max:6,c:'var(--red)'}];
      const calif=buckets.map(b=>{
        const n=(kar.data||[]).filter(k=>{const c=parseFloat(k.calificacion);return !isNaN(c)&&c>=b.min&&c<b.max;}).length;
        return {...b,n};
      });

      /* Indicadores */
      const totAlum=alums.count||0;
      const procData=proc.data||[];
      const titulados=procData.filter(p=>p.estado==='titulado').length;
      const promedios=(kar.data||[]).filter(k=>k.calificacion).map(k=>parseFloat(k.calificacion));
      const promInst=promedios.length?(promedios.reduce((s,v)=>s+v,0)/promedios.length):0;
      const indicadores=[
        {l:'Alumnos activos',v:totAlum},
        {l:'Procesos titulación',v:procData.length},
        {l:'Titulados',v:titulados},
        {l:'Promedio institucional',v:promInst?promInst.toFixed(2):'—'},
        {l:'Inscripciones registradas',v:(insc.data||[]).length},
      ];

      /* Asistencias por grupo */
      const porGrupo={};
      (asis.data||[]).forEach(a=>{
        const ins=a.inscripciones; const gr=ins?.grupos; if(!gr) return;
        const key=gr.clave_grupo||'—';
        porGrupo[key]=porGrupo[key]||{materia:gr.materias?.nombre||'—',tot:0,pres:0};
        porGrupo[key].tot++;
        if(a.estado==='P'||a.estado==='J') porGrupo[key].pres++;
      });
      const asistenciasGrp=Object.entries(porGrupo).map(([g,o])=>({g,m:o.materia,pct:o.tot?Math.round(o.pres*100/o.tot):0,tot:o.tot})).sort((a,b)=>b.tot-a.tot).slice(0,8);

      /* Ingresos por concepto */
      const porConc={};
      (pagos.data||[]).forEach(p=>{
        const c=p.adeudos?.conceptos_pago?.descripcion||'Otros';
        porConc[c]=(porConc[c]||0)+parseFloat(p.monto_pagado||0);
      });
      const ingresos=Object.entries(porConc).map(([c,v])=>({c,v})).sort((a,b)=>b.v-a.v);
      const totalIngresos=ingresos.reduce((s,x)=>s+x.v,0);

      /* Adeudos pendientes */
      const concNames={};
      (conceptos.data||[]).forEach(c=>{concNames[c.id_concepto]=c.nombre;});
      const adePorConc={};
      const alumnosAd=new Set();
      let totalAdeudo=0;
      (ade.data||[]).filter(a=>a.estado==='pendiente'||a.estado==='vencido').forEach(r=>{
        const c=concNames[r.id_concepto]||'Otros';
        const neto=parseFloat(r.monto||0);
        adePorConc[c]=(adePorConc[c]||0)+neto;
        totalAdeudo+=neto;
        alumnosAd.add(r.id_alumno);
      });
      const adeudos=Object.entries(adePorConc).map(([c,v])=>({c,v})).sort((a,b)=>b.v-a.v);

      if(ok) setDatos({inscMes,carreras,reprobSem,indicadores,calif,asistenciasGrp,ingresos,adeudos,totalIngresos,totalAdeudo,alumnosConAdeudo:alumnosAd.size});
      if(ok) setLoading(false);
    })();
    return()=>{ok=false;};
  },[]);

  const maxInsc=Math.max(...datos.inscMes.map(x=>x.n),1);
  const maxRep=Math.max(...datos.reprobSem.map(x=>x.v),25);
  const maxCalif=Math.max(...datos.calif.map(x=>x.n),1);

  return(
    <div className="page-enter">
      <div className="tabs">
        {['Estadísticas generales','Rendimiento académico','Asistencias','Financiero'].map((t,i)=>(
          <div key={i} className={'tab'+(tab===i?' active':'')} onClick={()=>setTab(i)}>{t}</div>
        ))}
      </div>
      {loading&&<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Calculando indicadores…</div>}
      {!loading&&tab===0&&(
        <div>
          <div className="grid-2" style={{marginBottom:14}}>
            <div className="card card-pad">
              <div className="section-title">{ic.chart} Tendencia de inscripciones (9 meses)</div>
              <div className="bar-chart" style={{height:100}}>
                {datos.inscMes.map((m,i)=>{
                  const h=Math.round((m.n/maxInsc)*90)||4;
                  const last=i===datos.inscMes.length-1;
                  return (
                    <div key={i} className="bar-col">
                      <div className="bar-val">{m.n}</div>
                      <div className="bar-fill" style={{height:h,background:last?'var(--blue)':'var(--blue-dim)',borderTop:'2px solid '+(last?'var(--blue)':'oklch(.80 .08 245)')}}></div>
                      <div className="bar-label">{m.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="card card-pad">
              <div className="section-title">Distribución por carrera</div>
              {datos.carreras.length===0?<div style={{padding:14,color:'var(--text-muted)',fontSize:12}}>Sin datos.</div>:
               datos.carreras.map((c,i)=>(
                <div key={i} className="stat-row">
                  <div className="stat-row-label">{c.c}</div>
                  <div style={{flex:1,margin:'0 10px'}}><div className="progress-bar"><div className="progress-fill" style={{width:c.pct+'%',background:'var(--blue)'}}></div></div></div>
                  <div className="stat-row-val" style={{fontSize:12}}>{c.n} ({c.pct}%)</div>
                </div>
              ))}
            </div>
          </div>
          <div className="grid-2">
            <div className="card card-pad">
              <div className="section-title">Índice de reprobación por semestre</div>
              {datos.reprobSem.length===0?<div style={{padding:14,color:'var(--text-muted)',fontSize:12}}>Sin datos.</div>:
               datos.reprobSem.map((r,i)=>(
                <div key={i} className="stat-row">
                  <div className="stat-row-label">{r.s}</div>
                  <div style={{flex:1,margin:'0 10px'}}><div className="progress-bar"><div className="progress-fill" style={{width:(r.v/maxRep*100)+'%',background:r.v>15?'var(--red)':r.v>10?'var(--amber)':'var(--green)'}}></div></div></div>
                  <div className="stat-row-val" style={{fontSize:12,color:r.v>15?'var(--red)':'inherit'}}>{r.v}%</div>
                </div>
              ))}
            </div>
            <div className="card card-pad">
              <div className="section-title">Indicadores clave</div>
              {datos.indicadores.map((s,i)=>(
                <div key={i} className="stat-row">
                  <div className="stat-row-label">{s.l}</div>
                  <div className="stat-row-val">{s.v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {!loading&&tab===1&&(
        <div className="card card-pad">
          <div className="section-title">Distribución de calificaciones — Kardex global</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:12,marginTop:8}}>
            {datos.calif.map((g,i)=>(
              <div key={i} style={{textAlign:'center',padding:'16px 10px',border:'1px solid var(--border)',borderRadius:8,background:'var(--card)'}}>
                <div style={{fontFamily:'var(--font-serif)',fontSize:22,color:g.c}}>{g.n}</div>
                <div style={{fontSize:10.5,color:'var(--text-muted)',marginTop:4}}>Calificación {g.r}</div>
                <div style={{marginTop:6}}><div className="progress-bar"><div className="progress-fill" style={{width:(g.n/maxCalif*100)+'%',background:g.c}}></div></div></div>
              </div>
            ))}
          </div>
        </div>
      )}
      {!loading&&tab===2&&(
        <div className="card card-pad">
          <div className="section-title">Resumen de asistencias por grupo</div>
          {datos.asistenciasGrp.length===0?<div style={{padding:14,color:'var(--text-muted)',fontSize:12}}>Aún no hay registros de asistencia.</div>:
           datos.asistenciasGrp.map((r,i)=>(
            <div key={i} className="stat-row">
              <div><div style={{fontWeight:500,fontSize:12.5}}>{r.m}</div><div style={{fontSize:11,color:'var(--text-muted)'}}>{r.g} · {r.tot} sesiones</div></div>
              <div style={{width:140,marginLeft:12}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                  <span style={{color:'var(--text-muted)'}}>Asistencia</span>
                  <span style={{fontWeight:600,color:r.pct>=85?'var(--green)':r.pct>=70?'var(--amber)':'var(--red)'}}>{r.pct}%</span>
                </div>
                <div className="progress-bar"><div className="progress-fill" style={{width:r.pct+'%',background:r.pct>=85?'var(--green)':r.pct>=70?'var(--amber)':'var(--red)'}}></div></div>
              </div>
            </div>
          ))}
        </div>
      )}
      {!loading&&tab===3&&(
        <div className="grid-2">
          <div className="card card-pad">
            <div className="section-title">Ingresos por concepto</div>
            {datos.ingresos.length===0?<div style={{padding:14,color:'var(--text-muted)',fontSize:12}}>Sin pagos registrados.</div>:
             datos.ingresos.map((f,i)=>(
              <div key={i} className="stat-row">
                <div className="stat-row-label">{f.c}</div>
                <div className="stat-row-val" style={{color:'var(--green)'}}>${f.v.toLocaleString('es-MX',{minimumFractionDigits:2})}</div>
              </div>
            ))}
            <div className="stat-row" style={{borderTop:'2px solid var(--border)'}}>
              <div style={{fontWeight:700}}>Total</div>
              <div style={{fontWeight:700,color:'var(--green)',fontFamily:'var(--font-serif)',fontSize:18}}>${datos.totalIngresos.toLocaleString('es-MX',{minimumFractionDigits:2})}</div>
            </div>
          </div>
          <div className="card card-pad">
            <div className="section-title">Adeudos pendientes de cobro</div>
            {datos.adeudos.length===0?<div style={{padding:14,color:'var(--text-muted)',fontSize:12}}>Sin adeudos pendientes.</div>:
             datos.adeudos.map((f,i)=>(
              <div key={i} className="stat-row">
                <div className="stat-row-label">{f.c}</div>
                <div className="stat-row-val" style={{color:'var(--red)'}}>${f.v.toLocaleString('es-MX',{minimumFractionDigits:2})}</div>
              </div>
            ))}
            <div style={{marginTop:14,padding:10,background:'var(--red-dim)',borderRadius:7,fontSize:12,color:'var(--red)'}}>
              <strong>Total en mora:</strong> ${datos.totalAdeudo.toLocaleString('es-MX',{minimumFractionDigits:2})} — {datos.alumnosConAdeudo} alumno(s) con adeudo activo.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── EGRESADOS ────────────────────────────────────────── */
function Egresados(){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=async()=>{
    setLoading(true);
    const {data:rows}=await sb.from('egresados')
      .select('id_egresado,generacion,fecha_egreso,estatus_laboral,empresa_actual,puesto,area,alumnos(matricula,carreras(clave),usuarios(nombres,apellido_pat))')
      .order('id_egresado',{ascending:false}).limit(100);
    setData(rows||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const total=data.length||1;
  const emp=data.filter(d=>d.estatus_laboral==='empleado').length;
  const pos=data.filter(d=>d.estatus_laboral==='posgrado').length;
  const bus=data.filter(d=>d.estatus_laboral==='buscando').length;
  const emp2=data.filter(d=>d.estatus_laboral==='emprendedor').length;

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Empleados',v:Math.round(emp/total*100)+'%',c:'var(--green)'},{l:'Posgrado',v:pos,c:'var(--blue)'},{l:'Emprendedores',v:emp2,c:'var(--amber)'},{l:'En búsqueda',v:bus,c:'var(--text-muted)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:26,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <button className="btn btn-ghost btn-sm" onClick={load}>↺ Actualizar</button>
        <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Exportación disponible en versión de escritorio','warn')}>Exportar reporte</button>
      </div>
      {loading?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>Cargando egresados…</div>:(
        data.length===0
        ?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay egresados registrados en el sistema.</div>
        :<div className="card"><table>
          <thead><tr><th>Matrícula</th><th>Egresado</th><th>Carrera</th><th>Generación</th><th>Estado</th><th>Empresa / Institución</th><th>Puesto</th></tr></thead>
          <tbody>{data.map((e,i)=>{
            const sc={empleado:'chip-green',posgrado:'chip-blue',buscando:'chip-amber',emprendedor:'chip-purple',no_localizado:'chip-red'};
            const sl={empleado:'Empleado',posgrado:'Posgrado',buscando:'En búsqueda',emprendedor:'Emprendedor',no_localizado:'No localizado'};
            const nom=e.alumnos?.usuarios?e.alumnos.usuarios.apellido_pat+', '+e.alumnos.usuarios.nombres:'—';
            return(
              <tr key={i}>
                <td style={{fontFamily:'monospace',fontSize:11}}>{e.alumnos?.matricula||'—'}</td>
                <td style={{fontWeight:500}}>{nom}</td>
                <td><span className="chip chip-blue" style={{fontSize:10}}>{e.alumnos?.carreras?.clave||'—'}</span></td>
                <td style={{fontSize:12,color:'var(--text-muted)'}}>{e.generacion||'—'}</td>
                <td><span className={'chip '+(sc[e.estatus_laboral]||'chip-amber')} style={{fontSize:10}}>{sl[e.estatus_laboral]||e.estatus_laboral||'—'}</span></td>
                <td>{e.empresa_actual||'—'}</td>
                <td style={{color:'var(--text-muted)',fontSize:12}}>{e.puesto||'—'}</td>
              </tr>
            );
          })}</tbody>
        </table></div>
      )}
    </div>
  );
}

/* ── PERFIL ───────────────────────────────────────────── */
function Perfil(){
  const {perfil,roleId}=useContext(PerfilCtx);
  const [tab,setTab]=useState(0);
  const [editing,setEditing]=useState(false);
  const [resumen,setResumen]=useState(null);
  const [datos,setDatos]=useState(null);
  const [docData,setDocData]=useState(null);
  const [loading,setLoading]=useState(true);

  const rol=perfil?.roles?.nombre||'';
  const nombreCompleto=perfil
    ?`${perfil.nombres} ${perfil.apellido_pat}${perfil.apellido_mat?' '+perfil.apellido_mat:''}`
    :'—';
  const initials=perfil
    ?`${(perfil.nombres||'')[0]||''}${(perfil.apellido_pat||'')[0]||''}`.toUpperCase()
    :'??';
  const fmtDate=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-MX'):'—';
  const Row=({label,val,ed})=>(
    <div className="stat-row">
      <div className="stat-row-label">{label}</div>
      {ed&&editing
        ?<input className="input" defaultValue={val||''} style={{maxWidth:220,padding:'4px 8px',fontSize:12}}/>
        :<div className="stat-row-val" style={{fontSize:12.5}}>{val||'—'}</div>}
    </div>
  );

  useEffect(()=>{
    if(!perfil||!roleId){setLoading(false);return;}
    let ok=true;
    (async()=>{
      setLoading(true);
      try{
        if(rol==='alumno'){
          const [r1,r2]=await Promise.all([
            sb.from('v_alumno_resumen').select('*').eq('id_alumno',roleId).single(),
            sb.from('alumnos_datos').select('*').eq('id_alumno',roleId).single(),
          ]);
          if(ok){setResumen(r1.data);setDatos(r2.data);}
        } else if(rol==='docente'){
          const {data}=await sb.from('docentes').select('*').eq('id_docente',roleId).single();
          if(ok) setDocData(data);
        }
      } finally{ if(ok) setLoading(false); }
    })();
    return()=>{ok=false;};
  },[perfil?.id_usuario,roleId,rol]);

  const tabs=rol==='alumno'
    ?['Datos personales','Datos médicos','Datos socioeconómicos','Documentos']
    :['Información profesional'];

  let subtitle=perfil?.email||'';
  if(rol==='alumno'&&resumen) subtitle=`Matrícula: ${resumen.matricula} · ${resumen.clave_carrera} · ${resumen.semestre_actual}to Semestre`;
  else if(rol==='docente'&&docData) subtitle=`Empleado: ${docData.num_empleado} · ${docData.departamento||'Docente'}`;

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:14,marginBottom:20,alignItems:'flex-start'}}>
        <div style={{width:90,height:90,borderRadius:'50%',background:'linear-gradient(135deg,var(--blue),var(--purple))',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:'var(--font-serif)',fontSize:32,flexShrink:0}}>{initials}</div>
        <div style={{flex:1}}>
