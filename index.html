<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECNM — Sistema Escolar Integral (AMBAR/SII)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:oklch(0.16 0.04 250);--navy-mid:oklch(0.21 0.04 250);--navy-light:oklch(0.27 0.04 250);
  --bg:oklch(0.965 0.008 240);--card:oklch(1 0 0);
  --blue:oklch(0.52 0.18 245);--blue-dim:oklch(0.92 0.05 245);
  --amber:oklch(0.72 0.16 65);--amber-dim:oklch(0.95 0.06 65);
  --green:oklch(0.62 0.14 145);--green-dim:oklch(0.94 0.05 145);
  --red:oklch(0.60 0.18 20);--red-dim:oklch(0.95 0.05 20);
  --purple:oklch(0.55 0.16 290);--purple-dim:oklch(0.94 0.04 290);
  --teal:oklch(0.60 0.13 195);--teal-dim:oklch(0.94 0.04 195);
  --text:oklch(0.18 0.02 250);--text-mid:oklch(0.42 0.02 250);--text-muted:oklch(0.62 0.015 250);
  --border:oklch(0.90 0.01 240);
  --shadow:0 1px 4px oklch(0 0 0/.06),0 4px 16px oklch(0 0 0/.05);
  --shadow-lg:0 4px 24px oklch(0 0 0/.10);
  --r:10px;--sidebar:230px;
  --font:'DM Sans',sans-serif;--font-serif:'DM Serif Display',serif;
  --t:0.22s cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex}
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10;overflow-y:auto}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--navy-light)}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);color:#fff;font-size:17px;margin-bottom:8px}
.logo-name{color:#fff;font-weight:600;font-size:13px}.logo-sub{color:oklch(0.65 0.03 250);font-size:10.5px;margin-top:1px}
.role-switcher{margin:12px 12px 2px;background:var(--navy-mid);border-radius:8px;padding:3px;display:flex;gap:2px}
.role-btn{flex:1;padding:5px 3px;border:none;background:transparent;color:oklch(0.65 0.03 250);font-size:10.5px;font-family:var(--font);border-radius:6px;cursor:pointer;transition:var(--t);text-align:center}
.role-btn.active{background:var(--navy-light);color:#fff;font-weight:500}
.nav-section{padding:6px 0}
.nav-label{padding:8px 18px 3px;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:oklch(0.45 0.03 250);font-weight:500}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;margin:1px 7px;border-radius:7px;cursor:pointer;color:oklch(0.65 0.03 250);transition:var(--t);font-size:12.5px;font-weight:400}
.nav-item:hover{background:var(--navy-mid);color:oklch(0.85 0.02 250)}
.nav-item.active{background:var(--blue);color:#fff;font-weight:500}
.nav-icon{width:15px;height:15px;opacity:.75;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--amber);color:var(--navy);font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:16px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--navy-light)}
.user-card{display:flex;align-items:center;gap:9px;padding:9px;border-radius:8px;cursor:pointer;transition:var(--t)}
.user-card:hover{background:var(--navy-mid)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;flex-shrink:0}
.user-name{color:#fff;font-size:12.5px;font-weight:500}.user-role{color:oklch(0.55 0.03 250);font-size:10.5px}
.main{flex:1;min-height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:5;flex-shrink:0}
.topbar-title{font-size:14.5px;font-weight:600}.topbar-sub{font-size:12.5px;color:var(--text-muted);margin-left:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-mid);transition:var(--t)}
.icon-btn:hover{background:var(--bg)}
.content{padding:22px 24px;flex:1}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:pageIn .3s cubic-bezier(0.4,0,0.2,1) forwards}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-pad{padding:18px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px;position:relative;overflow:hidden;transition:var(--t)}
.kpi-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.kpi-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.kpi-value{font-family:var(--font-serif);font-size:30px;color:var(--text);line-height:1;margin-bottom:3px}
.kpi-label{font-size:11.5px;color:var(--text-muted);font-weight:500}
.kpi-delta{font-size:10.5px;color:var(--green);font-weight:500;margin-top:5px}
.kpi-glow{position:absolute;right:-18px;top:-18px;width:72px;height:72px;border-radius:50%;opacity:.08}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.section-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.badge{background:var(--blue-dim);color:var(--blue);font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:9px 13px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.grade-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-weight:600;font-size:11.5px}
.grade-a{background:var(--green-dim);color:var(--green)}.grade-b{background:var(--blue-dim);color:var(--blue)}
.grade-c{background:var(--amber-dim);color:oklch(0.50 0.16 65)}.grade-f{background:var(--red-dim);color:var(--red)}
.progress-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent}
.chip-blue{background:var(--blue-dim);color:var(--blue);border-color:oklch(.80 .08 245)}
.chip-green{background:var(--green-dim);color:var(--green);border-color:oklch(.82 .06 145)}
.chip-amber{background:var(--amber-dim);color:oklch(.50 .16 65);border-color:oklch(.85 .08 65)}
.chip-red{background:var(--red-dim);color:var(--red);border-color:oklch(.82 .08 20)}
.chip-purple{background:var(--purple-dim);color:var(--purple);border-color:oklch(.84 .05 290)}
.chip-teal{background:var(--teal-dim);color:var(--teal);border-color:oklch(.82 .05 195)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:500;font-family:var(--font);cursor:pointer;transition:var(--t);border:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:oklch(.47 .18 245)}
.btn-ghost{background:transparent;color:var(--text-mid);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid oklch(.82 .08 20)}.btn-danger:hover{background:oklch(.90 .07 20)}
.btn-sm{padding:4px 11px;font-size:11.5px}
.input{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-family:var(--font);color:var(--text);background:var(--card);transition:var(--t);outline:none}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px oklch(.52 .18 245/.10)}
select.input{cursor:pointer}
textarea.input{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-label{font-size:11.5px;font-weight:500;color:var(--text-mid);margin-bottom:4px;display:block}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-row-label{font-size:12.5px;color:var(--text-mid)}.stat-row-val{font-size:12.5px;font-weight:600}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:90px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height 1s cubic-bezier(0.4,0,0.2,1);min-height:3px}
.bar-label{font-size:9.5px;color:var(--text-muted);text-align:center}
.bar-val{font-size:9.5px;color:var(--text-mid);font-weight:500}
.activity-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--bg)}
.activity-text{font-size:11.5px;color:var(--text-mid);line-height:1.5}
.activity-text strong{color:var(--text);font-weight:500}
.activity-time{font-size:10.5px;color:var(--text-muted);margin-left:auto;flex-shrink:0;white-space:nowrap}
/* Retícula */
.reticula-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.ret-cell{border-radius:7px;padding:8px 7px;font-size:10.5px;font-weight:500;text-align:center;cursor:pointer;transition:var(--t);border:1.5px solid transparent;line-height:1.3}
.ret-cell.aprobada{background:var(--green-dim);color:var(--green);border-color:oklch(.82 .06 145)}
.ret-cell.en-curso{background:var(--blue-dim);color:var(--blue);border-color:oklch(.80 .08 245)}
.ret-cell.disponible{background:var(--card);color:var(--text-mid);border-color:var(--border)}
.ret-cell.disponible:hover{border-color:var(--blue);background:var(--blue-dim);color:var(--blue)}
.ret-cell.bloqueada{background:var(--bg);color:var(--text-muted);border-color:transparent;cursor:not-allowed;opacity:.6}
.ret-cell.seleccionada{background:var(--blue);color:#fff;border-color:var(--blue)}
.ret-code{font-size:9px;opacity:.7;margin-top:2px}
/* Step tracker */
.steps{display:flex;flex-direction:column;gap:0}
.step{display:flex;gap:14px;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;left:15px;top:32px;bottom:0;width:2px;background:var(--border)}
.step.done::after{background:var(--green)}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:600;border:2px solid var(--border);background:var(--card);position:relative;z-index:1}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.active .step-dot{background:var(--blue);border-color:var(--blue);color:#fff}
.step-body{padding:4px 0 20px}
.step-title{font-size:13px;font-weight:600;margin-bottom:2px}
.step-desc{font-size:12px;color:var(--text-muted)}
/* Stars */
.stars{display:flex;gap:3px}
.star{font-size:20px;cursor:pointer;transition:var(--t);color:var(--border)}
.star.on{color:var(--amber)}
/* Asistencia grid */
.asist-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.asist-cell{width:100%;aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;cursor:pointer;transition:var(--t)}
.asist-p{background:var(--green-dim);color:var(--green)}
.asist-a{background:var(--red-dim);color:var(--red)}
.asist-j{background:var(--amber-dim);color:oklch(.50 .16 65)}
.asist-n{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}
/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:var(--t)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text)}
/* doc chip */
.doc-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);transition:var(--t)}
.doc-item:hover{border-color:var(--blue);background:var(--blue-dim)}
/* constancia */
.const-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);margin-bottom:8px;transition:var(--t)}
.const-item:hover{border-color:oklch(.80 .08 245);box-shadow:var(--shadow)}
/* risk bar */
.risk-bar{height:4px;border-radius:99px}
.section-title svg{width:14px;height:14px;flex-shrink:0}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.count-anim{animation:countUp .6s cubic-bezier(0.4,0,0.2,1) forwards}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:oklch(0 0 0/.45);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .18s ease;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:14px;padding:26px;width:100%;max-width:520px;box-shadow:0 24px 64px oklch(0 0 0/.28);animation:modalIn .22s cubic-bezier(0.4,0,0.2,1);max-height:calc(100vh - 40px);overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-wide{max-width:660px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;line-height:1;padding:2px 6px;border-radius:6px;transition:var(--t)}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.form-group{margin-bottom:14px}
/* Search overlay */
.search-overlay{position:fixed;inset:0;background:oklch(0 0 0/.5);display:flex;flex-direction:column;align-items:center;padding-top:90px;z-index:999;animation:fadeIn .15s ease}
.search-box{background:var(--card);border-radius:12px;padding:12px 16px;width:100%;max-width:560px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px oklch(0 0 0/.2)}
.search-box input{flex:1;border:none;outline:none;font-size:14px;font-family:var(--font);background:transparent;color:var(--text)}
.search-results{background:var(--card);border-radius:12px;margin-top:8px;width:100%;max-width:560px;overflow:hidden;box-shadow:0 8px 32px oklch(0 0 0/.2)}
.search-result-item{padding:11px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid var(--border);transition:var(--t);font-size:13px}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--bg)}
/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:2999;pointer-events:none}
.toast{padding:11px 16px;border-radius:10px;font-size:12.5px;font-family:var(--font);box-shadow:0 4px 24px oklch(0 0 0/.22);animation:toastIn .22s cubic-bezier(0.4,0,0.2,1);pointer-events:auto;display:flex;align-items:center;gap:8px;max-width:320px}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.toast-info{background:var(--navy);color:#fff}
.toast-ok{background:var(--green);color:#fff}
.toast-err{background:var(--red);color:#fff}
.toast-warn{background:oklch(.55 .16 65);color:#fff}
/* ── Responsive (mobile/tablet) ── */
.menu-btn{display:none;width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--card);align-items:center;justify-content:center;cursor:pointer;color:var(--text);padding:0;flex-shrink:0}
.menu-btn:hover{background:var(--bg)}
.menu-btn svg{width:18px;height:18px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:oklch(0 0 0/.45);z-index:150;animation:fadeIn .18s ease}
@media (max-width:900px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;height:100dvh;transform:translateX(-100%);transition:transform .25s cubic-bezier(0.4,0,0.2,1);z-index:200;box-shadow:0 4px 24px oklch(0 0 0/.25)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop.show{display:block}
  .menu-btn{display:inline-flex}
  .main{width:100%}
  .topbar{padding:0 12px;gap:8px;height:50px}
  .topbar-title{font-size:13.5px}
  .topbar-sub{display:none}
  .topbar-right{gap:6px}
  .content{padding:16px 12px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .kpi-card{padding:14px}
  .kpi-value{font-size:24px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr;gap:10px}
  .reticula-grid{grid-template-columns:repeat(3,1fr)}
  .card-pad{padding:14px}
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:520px}
  th,td{padding:8px 10px;font-size:12px}
  .modal{padding:18px;max-height:calc(100vh - 20px)}
  .modal-overlay{padding:10px}
  .tabs{overflow-x:auto;flex-wrap:nowrap;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex-shrink:0}
  .search-overlay{padding-top:20px}
  .search-box,.search-results{max-width:calc(100vw - 20px)}
  .toast-wrap{bottom:16px;right:12px;left:12px}
  .toast{max-width:none}
  .asist-cell{font-size:8.5px}
}
@media (max-width:480px){
  .kpi-grid{grid-template-columns:1fr;gap:10px}
  .reticula-grid{grid-template-columns:repeat(2,1fr)}
  .content{padding:14px 10px}
  .topbar{padding:0 10px}
}
@media (max-width:640px){
  .login-card{flex-direction:column;min-height:0 !important}
  .login-left{width:100% !important;padding:24px 22px !important;flex-direction:row !important;align-items:center;gap:14px;justify-content:flex-start !important}
  .login-left>div:first-child{display:flex;align-items:center;gap:12px}
  .login-left>div:first-child>div:first-child{margin-bottom:0 !important;width:38px !important;height:38px !important;font-size:19px !important}
  .login-left>div:first-child>div:nth-child(2){margin-bottom:0 !important;font-size:15px !important}
  .login-left>div:first-child>div:nth-child(3){display:none}
  .login-left-footer{display:none}
  .login-right{padding:28px 22px !important}
}
</style>
</head>
<body>
<div id="root"></div>

/* ── COMPONENTE MODAL REUTILIZABLE ──────────────────── */
function Modal({title,onClose,children,wide}){
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[onClose]);
  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className={`modal${wide?' modal-wide':''}`}>
        <div className="modal-header">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ── TOAST (notificaciones globales) ─────────────────
   Uso: window.toast('Mensaje')  o  window.toast('Msg','ok'/'err'/'warn')
   Se monta en App. ─────────────────────────────────── */
let _toastSetter=null;
window.toast=(msg,type='info',dur=3200)=>{
  if(!_toastSetter)return;
  const id=Date.now()+Math.random();
  _toastSetter(ts=>[...ts,{id,msg,type}]);
  setTimeout(()=>_toastSetter(ts=>ts.filter(t=>t.id!==id)),dur);
};
function ToastLayer(){
  const [toasts,setToasts]=useState([]);
  useEffect(()=>{_toastSetter=setToasts;return()=>{_toastSetter=null;};},[]);
  if(!toasts.length)return null;
  return(
    <div className="toast-wrap">
      {toasts.map(t=>(
        <div key={t.id} className={`toast toast-${t.type}`}>
          {t.type==='ok'&&'✓ '}{t.type==='err'&&'✗ '}{t.type==='warn'&&'⚠ '}{t.msg}
        </div>
      ))}
    </div>
  );
}

/* Wrapper para llamar a las funciones serverless con el JWT del usuario logueado. */
async function adminApi(path, body){
  const {data:{session}} = await sb.auth.getSession();
  if(!session) return {data:null, error:{message:'No hay sesión activa.'}};
  let r;
  try{
    r = await fetch(path,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+session.access_token,
      },
      body:JSON.stringify(body||{}),
    });
  }catch(e){
    return {data:null, error:{message:'Error de red: '+(e.message||e)}};
  }
  let j={};
  try{ j = await r.json(); }catch(_){ }
  if(!r.ok) return {data:null, error:{message:j.error||('HTTP '+r.status)}};
  return {data:j, error:null};
}

/* ── HOOKS ────────────────────────────────────────────── */
function useCounter(target,dur=1200,delay=0){
  const [v,setV]=useState(0);
  useEffect(()=>{
    const t=setTimeout(()=>{
      const s=performance.now();
      const f=(n)=>{const p=Math.min((n-s)/dur,1),e=1-Math.pow(1-p,3);setV(Math.round(e*target));if(p<1)requestAnimationFrame(f);};
      requestAnimationFrame(f);
    },delay);
    return()=>clearTimeout(t);
  },[target]);
  return v;
}

function relativeTime(iso){
  if(!iso) return '';
  const t=new Date(iso).getTime(); if(!t) return '';
  const diff=Math.floor((Date.now()-t)/1000);
  if(diff<60) return 'hace '+diff+'s';
  if(diff<3600) return 'hace '+Math.floor(diff/60)+' min';
  if(diff<86400) return 'hace '+Math.floor(diff/3600)+' h';
  if(diff<2592000) return 'hace '+Math.floor(diff/86400)+' d';
  return new Date(iso).toLocaleDateString('es-MX',{day:'numeric',month:'short'});
}

/* ── HELPERS DE VENTANA DE TIEMPO ────────────────────── */
function isInscripcionOpen(periodo,testMode){
  if(testMode) return true;
  if(!periodo) return false;
  if(periodo.estado!=='inscripcion') return false;
  const today=new Date(),ini=new Date(periodo.insc_inicio),fin=new Date(periodo.insc_fin);
  return today>=ini&&today<=fin;
}
function isEvalDocenteOpen(periodo,testMode){
  if(testMode) return true;
  if(!periodo) return false;
  if(periodo.estado!=='en_curso') return false;
  const today=new Date(),fin=new Date(periodo.fecha_fin);
  const evalStart=new Date(fin);
  evalStart.setDate(evalStart.getDate()-28);
  return today>=evalStart&&today<=fin;
}

/* ── RETÍCULA ─────────────────────────────────────────── */
function Reticula(){
  const {roleId,periodo,testMode}=useContext(PerfilCtx);
  const [sel,setSel]=useState([]); // array de id_grupo (int)
  const [grupos,setGrupos]=useState([]);
  const [kardexProp,setKardexProp]=useState([]); // materias aprobadas/cursando del alumno
  const [inscritasProp,setInscritasProp]=useState([]); // id_grupo inscritos en periodo actual
  const [inscMsg,setInscMsg]=useState('');
  const [inscLoading,setInscLoading]=useState(false);

  const cargar=async()=>{
    const [gRes,kRes,iRes]=await Promise.all([
      sb.from('v_grupos_disponibles').select('*'),
      roleId?sb.from('kardex').select('id_materia,estatus').eq('id_alumno',roleId):Promise.resolve({data:[]}),
      roleId?sb.from('inscripciones').select('id_grupo,estado').eq('id_alumno',roleId).in('estado',['inscrito','en_curso']):Promise.resolve({data:[]}),
    ]);
    setGrupos(gRes.data||[]);
    setKardexProp(kRes.data||[]);
    setInscritasProp(iRes.data||[]);
  };
  useEffect(()=>{cargar();},[roleId]);

  async function inscribir(){
    if(!roleId){setInscMsg('Inicia sesión como alumno para inscribirte.');return;}
    if(sel.length===0) return;
    setInscLoading(true); setInscMsg('');
    const resultados=await Promise.all(
      sel.map(idGrupo=>sb.rpc('inscribir_alumno',{p_id_alumno:roleId,p_id_grupo:idGrupo}))
    );
    const ok=resultados.filter(({data:r})=>r?.resultado==='OK').length;
    const errores=resultados.filter(({data:r})=>r&&r.resultado!=='OK').map(({data:r})=>r.mensaje).filter(Boolean);
    setInscMsg(`${ok} de ${sel.length} inscripción(es) procesada(s) correctamente.`+(errores.length?' · '+errores[0]:''));
    setSel([]);
    await cargar();
    setInscLoading(false);
  }

  // Calcular estado por id_materia: aprobada/en-curso/disponible/bloqueada(no implementado por simpleza)
  const matStatus={};
  kardexProp.forEach(k=>{
    if(k.estatus==='aprobada'||k.estatus==='acreditada') matStatus[k.id_materia]='aprobada';
    else if(k.estatus==='en_curso') matStatus[k.id_materia]='en-curso';
  });
  const inscritoIds=new Set(inscritasProp.map(i=>i.id_grupo));

  // Agrupar grupos disponibles por semestre_sug
  const porSem={};
  grupos.forEach(g=>{
    const s=g.semestre_sug||0;
    (porSem[s]=porSem[s]||[]).push(g);
  });
  const semestres=Object.keys(porSem).sort((a,b)=>parseInt(a)-parseInt(b));

  const toggle=(g)=>{
    const st=getStatus(g);
    if(st==='aprobada'||st==='en-curso'||st==='bloqueada') return;
    setSel(p=>p.includes(g.id_grupo)?p.filter(x=>x!==g.id_grupo):[...p,g.id_grupo]);
  };
  function getStatus(g){
    if(inscritoIds.has(g.id_grupo)) return 'en-curso';
    if(matStatus[g.id_materia]==='aprobada') return 'aprobada';
    if(matStatus[g.id_materia]==='en-curso') return 'en-curso';
    if(g.cupo_actual>=g.cupo_max) return 'bloqueada';
    return 'disponible';
  }
  const labels={'aprobada':'Aprobada','en-curso':'En curso / Inscrita','disponible':'Disponible','bloqueada':'Sin cupo','seleccionada':'Seleccionada'};

  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontWeight:600,fontSize:14.5}}>Retícula — Inscripción por Paquetes</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{grupos.length} grupos disponibles · Selecciona materias para inscribirte</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {inscMsg&&<span style={{fontSize:12,color:'var(--green)'}}>{inscMsg}</span>}
          {sel.length>0&&<span className="chip chip-blue">{sel.length} seleccionadas</span>}
          <button className="btn btn-primary" disabled={sel.length===0||inscLoading||!isInscripcionOpen(periodo,testMode)} onClick={inscribir} style={{opacity:(sel.length>0&&isInscripcionOpen(periodo,testMode))?1:.5}}>{inscLoading?'Procesando…':'Inscribir seleccionadas'}</button>
        </div>
      </div>
      {!isInscripcionOpen(periodo,testMode)&&(
        <div style={{padding:'11px 16px',background:'var(--amber-dim)',borderRadius:10,marginBottom:14,border:'1px solid var(--amber)',fontSize:12.5,color:'oklch(.45 .14 65)'}}>
          <strong>Período de inscripción cerrado.</strong>{' '}
          {periodo&&periodo.insc_inicio?'Inscripciones del '+periodo.insc_inicio+' al '+periodo.insc_fin+'.':'No hay un período de inscripción activo actualmente.'}
          {' '}Contacta a Servicios Escolares para más información.
        </div>
      )}
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        {Object.entries(labels).map(([k,v])=>(
          <span key={k} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text-muted)'}}>
            <span style={{width:10,height:10,borderRadius:3,background:k==='aprobada'?'var(--green-dim)':k==='en-curso'?'var(--blue-dim)':k==='seleccionada'?'var(--blue)':k==='bloqueada'?'var(--bg)':'var(--card)',border:k==='disponible'?'1.5px solid var(--border)':'none',display:'inline-block'}}></span>{v}
          </span>
        ))}
      </div>
      {grupos.length===0?<div style={{padding:40,textAlign:'center',color:'var(--text-muted)'}}>No hay grupos disponibles para inscripción.</div>:
       semestres.map(s=>(
        <div key={s} style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Semestre {s||'sin asignar'}</div>
          <div className="reticula-grid">
            {porSem[s].map(g=>{
              const baseSt=getStatus(g);
              const st=sel.includes(g.id_grupo)?'seleccionada':baseSt;
              return(
                <div key={g.id_grupo} className={'ret-cell '+st} onClick={()=>toggle(g)} title={labels[baseSt]+' — '+(g.docente_nombre||'')+' '+(g.docente_apellido||'')+' · '+g.cupo_actual+'/'+g.cupo_max}>
                  {g.materia}
                  <div className="ret-code">{g.clave_grupo} · {g.cupo_actual}/{g.cupo_max}</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── INSCRIPCIÓN ──────────────────────────────────────── */
function Inscripcion(){
  const [enrolled,setEnrolled]=useState([2]);
  const toggle=(id)=>{
    const s=SUBJECTS.find(x=>x.id===id);
    if(s.inscritos>=s.cupo&&!enrolled.includes(id)) return;
    setEnrolled(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  };
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div><div style={{fontWeight:600,fontSize:14.5}}>Inscripción por Materia</div><div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Ciclo 2025-A · Cupos en tiempo real</div></div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span className="chip chip-green">{ic.check} {enrolled.length} inscritas</span>
          <button className="btn btn-primary" onClick={()=>window.toast('Inscripción confirmada para el ciclo 2025-A','ok')}>Confirmar inscripción</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {SUBJECTS.map(s=>{
          const pct=(s.inscritos/s.cupo)*100,full=s.inscritos>=s.cupo,isE=enrolled.includes(s.id);
          return(
            <div key={s.id} onClick={()=>toggle(s.id)} style={{background:isE?'var(--green-dim)':full&&!isE?'var(--bg)':'var(--card)',border:`1.5px solid ${isE?'var(--green)':full&&!isE?'var(--border)':'var(--border)'}`,borderRadius:10,padding:14,cursor:full&&!isE?'not-allowed':'pointer',transition:'var(--t)',opacity:full&&!isE?.5:1,position:'relative'}}>
              {isE&&<div style={{position:'absolute',top:10,right:10,color:'var(--green)',width:15,height:15}}>{ic.check}</div>}
              {full&&!isE&&<span className="chip chip-red" style={{position:'absolute',top:10,right:10,fontSize:10}}>LLENO</span>}
              <div style={{fontWeight:600,fontSize:13,marginBottom:3}}>{s.name}</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{s.code} · {s.credits} créditos</div>
              <div style={{fontSize:11,color:'var(--text-mid)',marginBottom:6}}>👤 {s.teacher}</div>
              <div style={{fontSize:11,color:'var(--text-mid)',marginBottom:8}}>🕐 {s.horario}</div>
              <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:full?'var(--red)':pct>70?'var(--amber)':'var(--green)'}}></div></div>
              <div style={{fontSize:10.5,color:'var(--text-muted)',marginTop:3,textAlign:'right'}}>{s.inscritos}/{s.cupo} cupos</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── KÁRDEX ───────────────────────────────────────────── */
function Kardex(){
  const {roleId}=useContext(PerfilCtx);
  const [kardexData,setKardexData]=useState(null);
  const [resumen,setResumen]=useState(null);

  useEffect(()=>{
    if(!roleId) return;
    let ok=true;
    (async()=>{
      const [{data:k},{data:r}]=await Promise.all([
        sb.from('v_kardex_alumno').select('*').eq('id_alumno',roleId).order('semestre_sug'),
        sb.from('v_alumno_resumen').select('*').eq('id_alumno',roleId).single(),
      ]);
      if(!ok) return;
      if(k) setKardexData(k);
      if(r) setResumen(r);
    })();
    return()=>{ok=false;};
  },[roleId]);

  // Agrupar registros de BD por semestre
  const semestresDB = useMemo(()=>{
    if(!kardexData) return null;
    return kardexData.reduce((acc,m)=>{
      const k=m.semestre_sug??0;
      (acc[k]=acc[k]||[]).push(m);
      return acc;
    },{});
  },[kardexData]);

  const aprobadas = kardexData ? kardexData.filter(m=>m.calificacion!=null&&parseFloat(m.calificacion)>=6) : [];
  const credits   = resumen?.creditos_acum ?? aprobadas.reduce((a,m)=>a+(m.creditos||0),0);
  const total     = resumen?.creditos_total ?? 250;
  const avg       = resumen?.promedio_gral ?? (aprobadas.length?( aprobadas.reduce((a,m)=>a+parseFloat(m.calificacion),0)/aprobadas.length).toFixed(2):0);

  // Fallback a datos mock si aún no cargó BD
  const usandoDB = !!semestresDB;

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Promedio general',v:avg,c:'var(--blue)'},{l:'Créditos aprobados',v:`${credits}/${total}`,c:'var(--green)'},{l:'Avance de carrera',v:`${Math.round(credits/total*100)}%`,c:'var(--amber)'},{l:'Materias aprobadas',v:aprobadas.length||KARDEX.flatMap(s=>s.materias).filter(m=>m.cal!==null).length,c:'var(--purple)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:24,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:12,padding:'12px 14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:5,color:'var(--text-mid)'}}><span>Progreso de créditos</span><span>{credits}/{total}</span></div>
        <div className="progress-bar" style={{height:7}}><div className="progress-fill" style={{width:`${Math.min(credits/total*100,100)}%`,background:'var(--green)'}}></div></div>
      </div>
      {usandoDB
        ? Object.entries(semestresDB).sort((a,b)=>a[0]-b[0]).map(([sem,mats],si)=>(
          <div key={si} className="card" style={{marginBottom:10}}>
            <div style={{padding:'12px 14px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontWeight:600,fontSize:13}}>Semestre {sem}</span>
              <span className={`chip ${mats.some(m=>m.calificacion!=null)?'chip-green':'chip-amber'}`}>{mats.some(m=>m.calificacion!=null)?'Concluido':'En curso'}</span>
            </div>
            <table>
              <thead><tr><th>Materia</th><th>Créditos</th><th>Calificación</th><th>Estado</th></tr></thead>
              <tbody>{mats.map((m,mi)=>(
                <tr key={mi}>
                  <td>{m.materia}</td><td>{m.creditos}</td>
                  <td>{m.calificacion!=null?<span className={`grade-badge ${gcClass(m.calificacion)}`}>{m.calificacion}</span>:<span style={{color:'var(--text-muted)'}}>—</span>}</td>
                  <td>{m.calificacion==null?<span className="chip chip-amber" style={{fontSize:10}}>Pendiente</span>:parseFloat(m.calificacion)>=6?<span className="chip chip-green" style={{fontSize:10}}>Aprobada</span>:<span className="chip chip-red" style={{fontSize:10}}>Reprobada</span>}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        ))
        : KARDEX.map((sem,si)=>(
          <div key={si} className="card" style={{marginBottom:10}}>
            <div style={{padding:'12px 14px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontWeight:600,fontSize:13}}>{sem.sem}</span>
              <span className={`chip ${sem.materias[0].cal!==null?'chip-green':'chip-amber'}`}>{sem.materias[0].cal!==null?'Concluido':'En curso'}</span>
            </div>
            <table>
              <thead><tr><th>Materia</th><th>Créditos</th><th>Calificación</th><th>Estado</th></tr></thead>
              <tbody>{sem.materias.map((m,mi)=>(
                <tr key={mi}>
                  <td>{m.name}</td><td>{m.credits}</td>
                  <td>{m.cal!=null?<span className={`grade-badge ${gcClass(m.cal)}`}>{m.cal}</span>:<span style={{color:'var(--text-muted)'}}>—</span>}</td>
                  <td>{m.cal==null?<span className="chip chip-amber" style={{fontSize:10}}>Pendiente</span>:m.cal>=6?<span className="chip chip-green" style={{fontSize:10}}>Aprobada</span>:<span className="chip chip-red" style={{fontSize:10}}>Reprobada</span>}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        ))
      }
    </div>
  );
}

/* ── ASISTENCIAS ──────────────────────────────────────── */
function Asistencias({role}){
  const {roleId}=useContext(PerfilCtx);
  const [loading,setLoading]=useState(true);

  // Alumno state
  const [materias,setMaterias]=useState([]);

  // Docente state
  const [grupos,setGrupos]=useState([]);
  const [selGrupo,setSelGrupo]=useState('');
  const [fecha,setFecha]=useState(new Date().toISOString().slice(0,10));
  const [inscritos,setInscritos]=useState([]);
  const [asistMap,setAsistMap]=useState({});
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    if(!roleId){setLoading(false);return;}
    if(role==='alumno'){
      sb.from('inscripciones')
        .select('id_inscripcion,grupos(clave_grupo,materias(nombre,clave)),asistencias(estado)')
        .eq('id_alumno',roleId).in('estado',['inscrito','en_curso'])
        .then(({data,error})=>{
          if(!error) setMaterias(data||[]);
          setLoading(false);
        });
    } else if(role==='docente'){
      sb.from('grupos').select('id_grupo,clave_grupo,materias(nombre)')
        .eq('id_docente',roleId).in('estado',['abierto','lleno'])
        .then(({data})=>{setGrupos(data||[]);setLoading(false);});
    } else {
      setLoading(false);
    }
  },[role,roleId]);

  useEffect(()=>{
    if(!selGrupo) return;
    sb.from('inscripciones')
      .select('id_inscripcion,id_alumno,alumnos(usuarios(nombres,apellido_pat))')
      .eq('id_grupo',parseInt(selGrupo)).in('estado',['inscrito','en_curso']).order('id_inscripcion')
      .then(({data})=>{
        const insc=data||[];
        setInscritos(insc);
        const m={};
        insc.forEach(i=>{m[i.id_inscripcion]='P';});
        setAsistMap(m);
      });
  },[selGrupo]);

  useEffect(()=>{
    if(!selGrupo||!fecha||inscritos.length===0) return;
    const ids=inscritos.map(i=>i.id_inscripcion);
    sb.from('asistencias').select('id_inscripcion,estado')
      .in('id_inscripcion',ids).eq('fecha_sesion',fecha)
      .then(({data})=>{
        if(!data||data.length===0) return;
        setAsistMap(prev=>{
          const m={...prev};
          data.forEach(a=>{m[a.id_inscripcion]=a.estado;});
          return m;
        });
      });
  },[fecha,inscritos]);

  const cycle=(st)=>st==='P'?'F':st==='F'?'J':st==='J'?'R':'P';
  const toggle=(id)=>setAsistMap(m=>({...m,[id]:cycle(m[id]||'P')}));

  async function saveAsistencias(){
    if(inscritos.length===0){window.toast('Selecciona un grupo con alumnos','warn');return;}
    setSaving(true);
    const rows=inscritos.map(i=>({id_inscripcion:i.id_inscripcion,fecha_sesion:fecha,estado:asistMap[i.id_inscripcion]||'P'}));
    const {error}=await sb.from('asistencias').upsert(rows,{onConflict:'id_inscripcion,fecha_sesion'});
    setSaving(false);
    if(error) window.toast('Error: '+error.message,'error');
    else window.toast('Asistencias guardadas correctamente','ok');
  }

  const colors={P:'asist-p',F:'asist-a',J:'asist-j',R:'asist-j'};

  if(loading) return <div style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}>Cargando…</div>;

  if(role==='alumno'){
    if(materias.length===0) return(
      <div className="page-enter">
        <div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>No tienes materias inscritas actualmente.</div>
      </div>
    );
    const getC=(insc,est)=>(insc.asistencias||[]).filter(a=>a.estado===est).length;
    return(
      <div className="page-enter">
        {materias.map(insc=>{
          const total=(insc.asistencias||[]).length;
          const pres=getC(insc,'P');
          const falt=getC(insc,'F');
          const just=getC(insc,'J');
          const ret=getC(insc,'R');
          const pct=total>0?Math.round(pres/total*100):0;
          return(
            <div key={insc.id_inscripcion} className="card card-pad" style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{insc.grupos?.materias?.nombre||insc.grupos?.clave_grupo||'—'}</div>
                  <div style={{fontSize:11,color:'var(--text-muted)'}}>{insc.grupos?.clave_grupo}</div>
                </div>
                <span className={'chip '+(pct>=85?'chip-green':pct>=70?'chip-amber':'chip-red')}>{pct}%</span>
              </div>
              <div className="progress-bar" style={{height:5,marginBottom:6}}>
                <div className="progress-fill" style={{width:pct+'%',background:pct>=85?'var(--green)':pct>=70?'var(--amber)':'var(--red)'}}></div>
              </div>
              <div style={{display:'flex',gap:14,fontSize:11,color:'var(--text-muted)'}}>
                <span style={{color:'var(--green)'}}>P:{pres}</span>
                <span style={{color:'var(--red)'}}>F:{falt}</span>
                <span style={{color:'var(--amber)'}}>J:{just}</span>
                <span>R:{ret}</span>
                <span>Total: {total} sesiones · Mínimo: 85%</span>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  // Docente view
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <select className="input" style={{maxWidth:240}} value={selGrupo} onChange={e=>setSelGrupo(e.target.value)}>
          <option value="">— Selecciona grupo —</option>
          {grupos.map(g=><option key={g.id_grupo} value={g.id_grupo}>{g.clave_grupo}{g.materias?' · '+g.materias.nombre:''}</option>)}
        </select>
        <input type="date" className="input" style={{maxWidth:160}} value={fecha} onChange={e=>setFecha(e.target.value)}/>
        {selGrupo&&<span className="chip chip-blue">{inscritos.length} alumnos</span>}
        <button className="btn btn-primary btn-sm" onClick={saveAsistencias} disabled={!selGrupo||saving}>{saving?'Guardando…':'Guardar asistencias'}</button>
      </div>
      {!selGrupo?(
        <div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>Selecciona un grupo para registrar asistencia del día.</div>
      ):(
        <div className="card" style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr>
                <th style={{minWidth:200}}>Alumno</th>
                <th style={{textAlign:'center',minWidth:80}}>Estado</th>
                <th style={{textAlign:'center',fontSize:11,color:'var(--text-muted)'}}>P=Presente · F=Falta · J=Justif. · R=Retardo</th>
              </tr>
            </thead>
            <tbody>
              {inscritos.map(a=>{
                const est=asistMap[a.id_inscripcion]||'P';
                return(
                  <tr key={a.id_inscripcion}>
                    <td style={{fontWeight:500,fontSize:12}}>{(a.alumnos?.usuarios?.nombres||'')+' '+(a.alumnos?.usuarios?.apellido_pat||'')}</td>
                    <td style={{textAlign:'center'}}>
                      <span className={'asist-cell '+colors[est]}
                        style={{display:'inline-flex',padding:'3px 12px',fontSize:12,borderRadius:4,cursor:'pointer',fontWeight:700}}
                        onClick={()=>toggle(a.id_inscripcion)}>{est}</span>
                    </td>
                    <td></td>
                  </tr>
                );
              })}
              {inscritos.length===0&&<tr><td colSpan={3} style={{textAlign:'center',padding:20,color:'var(--text-muted)'}}>No hay alumnos inscritos en este grupo.</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ── HORARIO ──────────────────────────────────────────── */
function Horario(){
  const {roleId}=useContext(PerfilCtx);
  const [blocks,setBlocks]=useState(HORARIO_BLOCKS);
  const [periodo,setPeriodo]=useState('2025-A');
  const PALETTE=['oklch(0.52 0.18 245)','oklch(0.62 0.14 145)','oklch(0.72 0.16 65)','oklch(0.60 0.18 20)','oklch(0.55 0.16 290)','oklch(0.60 0.13 195)'];

  useEffect(()=>{
    if(!roleId) return;
    let ok=true;
    (async()=>{
      const {data}=await sb.from('v_horario_alumno').select('*').eq('id_alumno',roleId);
      if(!ok||!data?.length) return;
      const colorMap={};let ci=0;
      data.forEach(r=>{if(!colorMap[r.clave_materia])colorMap[r.clave_materia]=PALETTE[ci++%PALETTE.length];});
      const toSlot=t=>parseInt(t.split(':')[0])-7;
      const bs=data.map(r=>({
        day:r.dia_semana-1,
        start:toSlot(r.hora_inicio),
        span:toSlot(r.hora_fin)-toSlot(r.hora_inicio),
        name:r.materia,
        room:r.salon,
        color:colorMap[r.clave_materia],
      }));
      if(ok){setBlocks(bs);if(data[0])setPeriodo(data[0].periodo);}
    })();
    return()=>{ok=false;};
  },[roleId]);

  const days=['Lunes','Martes','Miércoles','Jueves','Viernes'];
  const times=['07:00','08:00','09:00','10:00','11:00','12:00','13:00'];
  const getB=(d,t)=>blocks.find(b=>b.day===d&&b.start===t);
  const isOcc=(d,t)=>blocks.some(b=>b.day===d&&t>b.start&&t<b.start+b.span);
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:14.5}}>Horario de clases</div>
        <span className="chip chip-blue">Ciclo {periodo}</span>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'55px repeat(5,1fr)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',background:'var(--card)'}}>
          <div style={{background:'var(--bg)',padding:8,fontSize:10.5,fontWeight:600,textAlign:'center',color:'var(--text-mid)',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)'}}></div>
          {days.map(d=><div key={d} style={{background:'var(--bg)',padding:8,fontSize:10.5,fontWeight:600,textAlign:'center',color:'var(--text-mid)',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)'}}>{d}</div>)}
          {times.map((t,ti)=>(
            <React.Fragment key={ti}>
              <div style={{padding:'7px 5px',fontSize:9.5,color:'var(--text-muted)',textAlign:'center',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)',background:'var(--bg)'}}>{t}</div>
              {days.map((_,di)=>{
                if(isOcc(di,ti)) return null;
                const block=getB(di,ti);
                return(
                  <div key={di} style={{borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)',padding:3,minHeight:42,...(block?{gridRow:`span ${block.span}`,padding:4}:{})}}>
                    {block&&<div style={{borderRadius:6,padding:'5px 7px',fontSize:10,fontWeight:500,height:'100%',display:'flex',flexDirection:'column',gap:2,background:`${block.color}22`,borderLeft:`3px solid ${block.color}`}}>
                      <div style={{fontWeight:600,fontSize:10.5,color:block.color}}>{block.name}</div>
                      <div style={{opacity:.75,color:block.color}}>{block.room}</div>
                    </div>}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── CONSTANCIAS ──────────────────────────────────────── */
function Constancias(){
  const {roleId}=useContext(PerfilCtx);
  const [types,setTypes]=useState([]);
  const [requests,setRequests]=useState([]);
  const [sending,setSending]=useState(null);
  const [urgente,setUrgente]=useState({});

  useEffect(()=>{
    let ok=true;
    (async()=>{
      const [{data:t},{data:s}]=await Promise.all([
        sb.from('tipos_constancia').select('*').eq('activo',true).order('id_tipo'),
        roleId
          ?sb.from('solicitudes_constancia').select('*,tipos_constancia(nombre)').eq('id_alumno',roleId).order('fecha_sol',{ascending:false}).limit(20)
          :{data:[]},
      ]);
      if(!ok) return;
      if(t) setTypes(t);
      if(s) setRequests(s.map(r=>({
        id:r.id_solicitud,name:r.tipos_constancia?.nombre||'Constancia',
        status:r.estado,date:new Date(r.fecha_sol).toLocaleDateString('es-MX',{day:'numeric',month:'short'}),
        url:r.url_pdf,
      })));
    })();
    return()=>{ok=false;};
  },[roleId]);

  async function solicitar(tipo){
    if(!roleId){alert('Inicia sesión como alumno para solicitar constancias.');return;}
    setSending(tipo.id_tipo);
    const {data,error}=await sb.rpc('solicitar_constancia',{
      p_id_alumno:roleId,p_id_tipo:tipo.id_tipo,p_urgente:!!urgente[tipo.id_tipo],
    });
    setSending(null);
    if(error){alert('Error: '+error.message);return;}
    setRequests(r=>[{id:Date.now(),name:tipo.nombre,status:'pendiente',date:'Hoy',url:null},...r]);
  }

  const estadoChip=s=>s==='lista'||s==='lista_descarga'
    ?{cls:'chip-green',label:'Lista para descarga'}
    :s==='proceso'||s==='pendiente'
    ?{cls:'chip-amber',label:'En proceso'}
    :{cls:'chip-blue',label:'Entregada'};

  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:14}}>
        <div style={{flex:1}}>
          <div className="section-title" style={{marginBottom:14}}>{ic.doc} Solicitar constancia</div>
          {types.map(t=>(
            <div key={t.id_tipo} className="const-item">
              <div style={{flex:1}}>
                <div style={{fontWeight:500,fontSize:13}}>{t.nombre}</div>
                <div style={{fontSize:11.5,color:'var(--text-muted)',marginTop:2}}>{t.descripcion}</div>
                <div style={{display:'flex',gap:12,marginTop:4,alignItems:'center'}}>
                  <span style={{fontSize:11,color:'var(--text-mid)'}}>⏱ {t.tiempo_entrega}</span>
                  {t.costo>0&&<span style={{fontSize:11,color:'var(--text-mid)'}}>💳 ${t.costo} MXN</span>}
                  {t.requiere_pago&&(
                    <label style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'var(--text-mid)',cursor:'pointer'}}>
                      <input type="checkbox" checked={!!urgente[t.id_tipo]} onChange={e=>setUrgente(u=>({...u,[t.id_tipo]:e.target.checked}))} style={{cursor:'pointer'}}/>
                      Urgente
                    </label>
                  )}
                </div>
              </div>
              <button className="btn btn-primary btn-sm" onClick={()=>solicitar(t)} disabled={sending===t.id_tipo} style={{flexShrink:0,marginLeft:12}}>
                {sending===t.id_tipo?'Enviando…':'Solicitar'}
              </button>
            </div>
          ))}
          {types.length===0&&<div style={{color:'var(--text-muted)',fontSize:12,padding:'20px 0'}}>Cargando tipos de constancia…</div>}
        </div>
        <div style={{width:260}}>
          <div className="section-title" style={{marginBottom:14}}>{ic.check2} Mis solicitudes</div>
          <div className="card">
            {requests.length===0&&<div style={{padding:24,textAlign:'center',color:'var(--text-muted)',fontSize:12}}>Sin solicitudes</div>}
            {requests.map((r,i)=>{
              const chip=estadoChip(r.status);
              return(
                <div key={r.id} style={{padding:'12px 14px',borderBottom:i<requests.length-1?'1px solid var(--border)':'none'}}>
                  <div style={{fontWeight:500,fontSize:12.5,marginBottom:3}}>{r.name}</div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span className={`chip ${chip.cls}`} style={{fontSize:10}}>{chip.label}</span>
                    <span style={{fontSize:11,color:'var(--text-muted)'}}>{r.date}</span>
                  </div>
                  {r.url&&<a href={r.url} target="_blank" rel="noopener noreferrer" className="btn btn-ghost btn-sm" style={{display:'block',marginTop:8,textAlign:'center',textDecoration:'none'}}>⬇ Descargar PDF</a>}
                </div>
              );
            })}
          </div>
          <div className="card card-pad" style={{marginTop:12}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:8}}>Información importante</div>
            <div style={{fontSize:11.5,color:'var(--text-muted)',lineHeight:1.6}}>
              Las constancias se envían también a tu correo institucional. Para constancias urgentes acude a Servicios Escolares (Edificio A, planta baja) de 7:00 a 14:00 hrs.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ADEUDOS ──────────────────────────────────────────── */
function Adeudos(){

  const [pendientes,setPendientes]=useState([]);
  const [historial,setHistorial]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    if(!roleId){setLoading(false);return;}
    let ok=true;
    (async()=>{
      const {data}=await sb.from('v_estado_cuenta').select('*').eq('id_alumno',roleId);
      if(!ok) return;
      const rows=data||[];
      const fmt=d=>d?new Date(d).toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'}):null;
      setPendientes(rows.filter(r=>r.estado!=='pagado').map(r=>({
        id:r.id_adeudo,concepto:r.concepto,monto:parseFloat(r.monto)||0,

        </div>
      )}
      {total===0&&pendientes.length===0&&(
        <div style={{background:'var(--green-dim)',border:'1.5px solid oklch(.82 .10 145)',borderRadius:10,padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
          <span style={{color:'var(--green)',width:18,height:18}}>{ic.check2}</span>
          <div style={{fontWeight:500,fontSize:13,color:'var(--green)'}}>¡Sin adeudos! Estás al corriente con todos tus pagos.</div>

      )}
      <div className="grid-2" style={{marginBottom:14}}>
        <div>

          {pendientes.length===0&&<div style={{color:'var(--text-muted)',fontSize:12,padding:'16px 0'}}>Sin adeudos pendientes</div>}

            <div key={d.id} className="card card-pad" style={{marginBottom:8,borderLeft:`3px solid ${d.status==='vencido'?'var(--red)':'var(--amber)'}`}}>

/* ── EVALUACIÓN DOCENTE ───────────────────────────────── */
function EvalDocente(){
  const {roleId,periodo,testMode}=useContext(PerfilCtx);
  const [loading,setLoading]=useState(true);
  const [inscritos,setInscritos]=useState([]);
  const [preguntas,setPreguntas]=useState([]);
  const [evaluadas,setEvaluadas]=useState(new Set());
  const [current,setCurrent]=useState(null);
  const [ratings,setRatings]=useState({});
  const [comments,setComments]=useState('');
  const [saving,setSaving]=useState(false);

  useEffect(()=>{
    if(!roleId){setLoading(false);return;}
    async function load(){
      const [inscRes,pqsRes]=await Promise.all([
        sb.from('inscripciones')
          .select('id_inscripcion,grupos(clave_grupo,materias(nombre),docentes(usuarios(nombres,apellido_pat)))')
          .eq('id_alumno',roleId).in('estado',['inscrito','en_curso']),
        sb.from('eval_preguntas').select('id_pregunta,texto,orden').eq('activa',true).order('orden')
      ]);
      const insc=inscRes.data||[];
      setInscritos(insc);
      setPreguntas(pqsRes.data||[]);
      if(insc.length>0){
        const ids=insc.map(i=>i.id_inscripcion);
        const {data:evs}=await sb.from('eval_docente').select('id_inscripcion').in('id_inscripcion',ids);
        setEvaluadas(new Set((evs||[]).map(e=>e.id_inscripcion)));
      }
      setLoading(false);
    }
    load();
  },[roleId]);

  async function saveEval(){
    if(!current) return;
    const complete=preguntas.every(p=>ratings[p.id_pregunta]);
    if(!complete){window.toast('Califica todas las preguntas antes de enviar','warn');return;}
    setSaving(true);
    const {data:evalData,error:err1}=await sb.from('eval_docente')
      .insert({id_inscripcion:current.id_inscripcion,comentarios:comments})
      .select('id_eval').single();
    if(err1){window.toast('Error: '+err1.message,'error');setSaving(false);return;}
    const rows=preguntas.map(p=>({id_eval:evalData.id_eval,id_pregunta:p.id_pregunta,calificacion:ratings[p.id_pregunta]}));
    const {error:err2}=await sb.from('eval_respuestas').insert(rows);
    setSaving(false);
    if(err2) window.toast('Error guardando respuestas: '+err2.message,'error');
    else{
      setEvaluadas(e=>new Set([...e,current.id_inscripcion]));
      setCurrent(null);setRatings({});setComments('');
      window.toast('Evaluación enviada exitosamente','ok');
    }
  }

  const Stars=({q})=>{
    const v=ratings[q]||0;
    return(<div className="stars">{[1,2,3,4,5].map(s=><span key={s} className={'star'+(s<=v?' on':'')} onClick={()=>setRatings(r=>({...r,[q]:s}))}>★</span>)}</div>);
  };

  if(loading) return <div style={{padding:24,textAlign:'center',color:'var(--text-muted)'}}>Cargando…</div>;

  if(!isEvalDocenteOpen(periodo,testMode)) return(
    <div className="page-enter">
      <div style={{marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:14.5}}>Evaluación del Desempeño Docente</div>
        <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Tu evaluación es anónima y confidencial</div>
      </div>
      <div className="card card-pad" style={{textAlign:'center',padding:'40px 24px'}}>
        <div style={{width:48,height:48,background:'var(--amber-dim)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',color:'oklch(.55 .14 65)'}}>{ic.bell}</div>
        <div style={{fontWeight:600,fontSize:15,marginBottom:8}}>Evaluación no disponible</div>
        <div style={{fontSize:13,color:'var(--text-muted)',maxWidth:380,margin:'0 auto'}}>
          {periodo&&periodo.estado==='en_curso'
            ?'La evaluación docente se habilita en las últimas 4 semanas del semestre (a partir del '+(()=>{const d=new Date(periodo.fecha_fin);d.setDate(d.getDate()-28);return d.toLocaleDateString('es-MX');})()+'). '
            :'La evaluación docente solo está disponible durante un período activo (en curso). '}
          Contacta a tu coordinador para más información.
        </div>
        {periodo&&<div style={{marginTop:12,fontSize:12,color:'var(--text-muted)'}}>Período actual: <strong>{periodo.clave}</strong> · Fin: {periodo.fecha_fin}</div>}
      </div>
    </div>
  );

  if(current){
    const complete=preguntas.length>0&&preguntas.every(p=>ratings[p.id_pregunta]);
    const d=current.grupos&&current.grupos.docentes;
    const nombreDoc=d?(d.usuarios?.nombres||'')+' '+(d.usuarios?.apellido_pat||''):'Docente';
    return(
      <div className="page-enter">
        <button className="btn btn-ghost btn-sm" style={{marginBottom:14}} onClick={()=>{setCurrent(null);setRatings({});setComments('');}}>← Regresar</button>
        <div className="card card-pad">
          <div style={{fontWeight:600,fontSize:14.5,marginBottom:2}}>{nombreDoc.trim()}</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:20}}>{current.grupos?.materias?.nombre||current.grupos?.clave_grupo||'—'} · Evaluación anónima</div>
          {preguntas.length===0&&<div style={{color:'var(--text-muted)',marginBottom:16,textAlign:'center'}}>No hay preguntas de evaluación configuradas. Contacta a administración.</div>}
          {preguntas.map(p=>(
            <div key={p.id_pregunta} style={{marginBottom:18,padding:'0 0 18px',borderBottom:'1px solid var(--border)'}}>
              <div style={{fontWeight:500,fontSize:13,marginBottom:10}}>{p.texto}</div>
              <Stars q={p.id_pregunta}/>
              {ratings[p.id_pregunta]&&<div style={{fontSize:11,color:'var(--text-muted)',marginTop:6}}>{['','Deficiente','Regular','Bueno','Muy bueno','Excelente'][ratings[p.id_pregunta]]}</div>}
            </div>
          ))}
          <div style={{marginBottom:16}}>
            <label className="form-label">Comentarios adicionales (opcional)</label>
            <textarea className="input" value={comments} onChange={e=>setComments(e.target.value)} placeholder="Escribe tus comentarios sobre el desempeño del docente..."/>
          </div>
          <button className="btn btn-primary" disabled={!complete||saving} style={{width:'100%',opacity:(complete&&!saving)?1:.5}} onClick={saveEval}>
            {saving?'Guardando…':'Enviar evaluación'}
          </button>
        </div>
      </div>
    );
  }

  return(
    <div className="page-enter">
      <div style={{marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:14.5}}>Evaluación del Desempeño Docente</div>
        <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Tu evaluación es anónima y confidencial</div>
      </div>
      {inscritos.length===0?(
        <div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>No tienes materias inscritas para evaluar en este período.</div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {inscritos.map((insc)=>{
            const ev=evaluadas.has(insc.id_inscripcion);
            const d=insc.grupos&&insc.grupos.docentes;
            const nombreDoc=d?(d.usuarios?.nombres||'Docente')+' '+(d.usuarios?.apellido_pat||''):'Docente';
            const iniciales=nombreDoc.trim().split(' ').filter(Boolean).slice(-2).map(n=>n[0]).join('');
            return(
              <div key={insc.id_inscripcion} className="card card-pad" style={{display:'flex',alignItems:'center',gap:14}}>
                <div className="avatar" style={{background:ev?'var(--green)':'var(--blue)'}}>{iniciales}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:13}}>{nombreDoc.trim()}</div>
                  <div style={{fontSize:12,color:'var(--text-muted)'}}>{insc.grupos?.materias?.nombre||insc.grupos?.clave_grupo||'—'}</div>
                </div>
                {ev?<span className="chip chip-green">{ic.check} Evaluada</span>:
                <button className="btn btn-primary btn-sm" onClick={()=>setCurrent(insc)}>Evaluar</button>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ── TITULACIÓN ───────────────────────────────────────── */
function Titulacion({role}){
  const steps=[
    {title:'Solicitud de acto protocolario',desc:'Llenar formato ITMAZ-AC-FO-023 y entregarlo en Servicios Escolares.',done:true},
    {title:'Verificación de créditos y servicio social',desc:'El sistema valida automáticamente tus créditos y la liberación del servicio social.',done:true},

        titulaciones.length===0?<div className="card card-pad" style={{textAlign:'center',color:'var(--text-muted)'}}>No hay procesos de titulación registrados.</div>:
        <div className="card"><table>
          <thead><tr><th>Matrícula</th><th>Alumno</th><th>Folio</th><th>Promedio</th><th>Modalidad</th><th>Paso</th><th>Estado</th></tr></thead>
          <tbody>{titulaciones.map((t)=>{
            const al=t.alumnos;
            const estadoLabel=t.estado==='autorizado'?'Autorizado':t.estado==='titulado'?'Titulado':t.estado==='cancelado'?'Cancelado':'En proceso';
            const estadoChip=t.estado==='autorizado'?'chip-green':t.estado==='titulado'?'chip-blue':t.estado==='cancelado'?'chip-red':'chip-amber';
            return(
              <tr key={t.id_proceso}>
                <td style={{fontFamily:'monospace',fontSize:11}}>{al?.matricula||'—'}</td>
                <td style={{fontWeight:500}}>{al?((al.usuarios?.nombres||'')+' '+(al.usuarios?.apellido_pat||'')).trim():'—'}</td>
                <td style={{fontSize:11,color:'var(--text-muted)'}}>{t.folio||'—'}</td>
                <td><span className={'grade-badge '+((al?.promedio_gral||0)>=9?'grade-a':'grade-b')}>{al?.promedio_gral||'—'}</span></td>
                <td>{t.modalidades_titulacion?.nombre||'—'}</td>
                <td style={{textAlign:'center'}}>{t.paso_actual||1}/6</td>
                <td><span className={'chip '+estadoChip} style={{fontSize:10}}>{estadoLabel}</span></td>

  return(

      </div>
      <div className="grid-2">

                      <div style={{display:'flex',flexDirection:'column',gap:5,marginTop:6}}>

        <div>

/* ── LISTA + CALIFICACIONES (fusionado) ───────────────── */
function Lista(){
  const {roleId}=useContext(PerfilCtx);
  const [tab,setTab]=useState(0);
  const [search,setSearch]=useState('');
  const [grades,setGrades]=useState(LISTA.map(a=>({...a,final:'',id_inscripcion:null})));
  const [saveMsg,setSaveMsg]=useState('');
  const [grupos,setGrupos]=useState([]);
  const [grupoSel,setGrupoSel]=useState(null);

  const prom=(a)=>{
    const p1=a.p1!=null?parseFloat(a.p1):null;
    const p2=a.p2!=null?parseFloat(a.p2):null;
    if(p1==null&&p2==null) return null;
    const sum=(p1??0)+(p2??0);
    const n=(p1!=null?1:0)+(p2!=null?1:0);
    return(sum/n).toFixed(1);
  };

  useEffect(()=>{
    if(!roleId) return;
    let ok=true;
    (async()=>{
      const {data:g}=await sb.from('grupos')
        .select('id_grupo,clave_grupo,materias(nombre),periodos(clave)')
        .eq('id_docente',roleId).order('id_grupo',{ascending:false}).limit(15);
      if(ok&&g?.length){setGrupos(g);setGrupoSel(g[0].id_grupo);}
    })();
    return()=>{ok=false;};
  },[roleId]);

  useEffect(()=>{
    if(!grupoSel) return;
    let ok=true;
    (async()=>{
      const {data}=await sb.from('v_lista_grupo_docente').select('*').eq('id_grupo',grupoSel);
      if(ok&&data) setGrades(data.map(a=>({
        id:a.id_inscripcion,id_inscripcion:a.id_inscripcion,
        mat:a.matricula,nombre:a.nombre_completo,
        p1:a.cal_p1!=null?parseFloat(a.cal_p1):null,
        p2:a.cal_p2!=null?parseFloat(a.cal_p2):null,
        final:a.cal_final!=null?String(a.cal_final):'',
        estado:a.estado,porc_asistencia:a.porc_asistencia,
      })));
    })();
    return()=>{ok=false;};
  },[grupoSel]);

  async function guardarCalificaciones(){
    if(!roleId) return;
    setSaveMsg('Guardando…');
    const results=await Promise.all(
      grades
        .filter(a=>a.final!==''&&a.final!=null&&a.id_inscripcion)
        .map(a=>sb.rpc('capturar_calificacion_final',{
          p_id_inscripcion:a.id_inscripcion,
          p_calificacion:parseFloat(a.final),
          p_id_docente:roleId,
        }))
    );
    const saved=results.filter(({data:r})=>r?.resultado==='OK').length;
    setSaveMsg(`${saved} calificación(es) guardada(s).`);
  }

  const GradeCell=({val})=>val!=null
    ?<span className={`grade-badge ${gcClass(val)}`}>{val}</span>
    :<span style={{color:'var(--text-muted)'}}>—</span>;

  const complete=grades.filter(a=>a.final!=='').length;
  const filtered=grades.filter(a=>
    (a.nombre||'').toLowerCase().includes(search.toLowerCase())||(a.mat||'').includes(search)
  );
  const grupoInfo=grupos.find(g=>g.id_grupo===grupoSel);
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontWeight:600,fontSize:14.5}}>Lista de Clase</div>
            {grupos.length>0&&(
              <select value={grupoSel||''} onChange={e=>setGrupoSel(Number(e.target.value))}
                style={{fontSize:12.5,padding:'3px 8px',border:'1px solid var(--border)',borderRadius:6,background:'var(--card)',fontFamily:'var(--font)',color:'var(--text)',cursor:'pointer'}}>
                {grupos.map(g=>(
                  <option key={g.id_grupo} value={g.id_grupo}>{g.clave_grupo} – {g.materias?.nombre||''} ({g.periodos?.clave||''})</option>
                ))}
              </select>
            )}
          </div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>
            {grupoInfo?.materias?.nombre||'Grupo'} · {grupoInfo?.periodos?.clave||'—'}
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {saveMsg&&<span className="chip chip-green">{saveMsg}</span>}
          {tab===1&&<button className="btn btn-primary btn-sm" onClick={guardarCalificaciones}>Guardar calificaciones</button>}
          <button className="btn btn-ghost btn-sm" onClick={()=>window.toast('Generando PDF de lista y calificaciones…','info')}>Exportar PDF</button>
        </div>
      </div>
      <div className="tabs">
        {['Vista general','Captura de calificaciones'].map((t,i)=>(
          <div key={i} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>{t}</div>
        ))}
      </div>
      {tab===0&&(
        <>
          <div style={{display:'flex',gap:10,marginBottom:12}}>
            <div style={{position:'relative',flex:1,maxWidth:300}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',pointerEvents:'none',width:14,height:14}}>{ic.search}</span>
              <input className="input" style={{paddingLeft:30}} placeholder="Buscar alumno…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <span className="chip chip-blue">{grades.length} alumnos inscritos</span>
          </div>
          <div className="card"><table>
            <thead><tr><th>Matrícula</th><th>Nombre</th><th>Parcial 1</th><th>Parcial 2</th><th>Promedio</th><th>Estado</th></tr></thead>
            <tbody>{filtered.map(a=>{
              const p=prom(a);
              return(
                <tr key={a.id}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{a.mat}</td>
                  <td style={{fontWeight:500}}>{a.nombre}</td>
                  <td><GradeCell val={a.p1}/></td>
                  <td><GradeCell val={a.p2}/></td>
                  <td><GradeCell val={p!=null?parseFloat(p):null}/></td>
                  <td>{p==null?<span style={{color:'var(--text-muted)',fontSize:12}}>—</span>:parseFloat(p)<6.5?<span className="chip chip-red" style={{fontSize:10}}>⚠ Riesgo</span>:<span className="chip chip-green" style={{fontSize:10}}>Regular</span>}</td>
                </tr>
              );
            })}</tbody>
          </table></div>
        </>
      )}
      {tab===1&&(
        <>
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:5,color:'var(--text-mid)'}}><span>Calificaciones capturadas</span><span>{complete}/{grades.length}</span></div>
            <div className="progress-bar" style={{height:5}}><div className="progress-fill" style={{width:grades.length?`${complete/grades.length*100}%`:'0%',background:'var(--blue)'}}></div></div>
          </div>
          <div className="card"><table>
            <thead><tr><th>Matrícula</th><th>Nombre</th><th>Parcial 1</th><th>Parcial 2</th><th>Calificación Final</th><th>Resultado</th></tr></thead>
            <tbody>{grades.map(a=>{
              const fin=parseFloat(a.final);
              return(
                <tr key={a.id}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{a.mat}</td>
                  <td style={{fontWeight:500}}>{a.nombre}</td>
                  <td><GradeCell val={a.p1}/></td>
                  <td><GradeCell val={a.p2}/></td>
                  <td><input type="number" min="0" max="10" step=".1" value={a.final}
                    onChange={e=>setGrades(g=>g.map(x=>x.id===a.id?{...x,final:e.target.value}:x))}
                    placeholder="—"
                    style={{width:65,textAlign:'center',padding:'5px 7px',border:'1px solid var(--border)',borderRadius:6,fontSize:12.5,fontFamily:'var(--font)',outline:'none',
                      background:a.final!==''&&!isNaN(fin)?gcDim(fin):'var(--card)'}}/></td>
                  <td>{a.final===''?<span style={{color:'var(--text-muted)',fontSize:12}}>—</span>:fin>=6?<span className="chip chip-green" style={{fontSize:10}}>Aprobado</span>:<span className="chip chip-red" style={{fontSize:10}}>Reprobado</span>}</td>
                </tr>
              );
            })}</tbody>
          </table></div>
        </>
      )}
    </div>
  );
}

/* ── TUTORÍAS ─────────────────────────────────────────── */

  const {roleId}=useContext(PerfilCtx);
  const [notes,setNotes]=useState({});
  const [expanded,setExpanded]=useState(null);
  const [alumnos,setAlumnos]=useState([]);

  useEffect(()=>{
    let ok=true;
    (async()=>{
      const {data}=await sb.from('v_alumnos_riesgo').select('*').order('nivel_riesgo');
      if(ok&&data) setAlumnos(data.map(a=>({
        id:a.id_alumno,mat:a.matricula,nombre:a.nombre,

    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Alumnos asignados',v:counts.total,c:'var(--blue)'},{l:'Alto riesgo',v:counts.alto,c:'var(--red)'},{l:'Riesgo medio',v:counts.medio,c:'var(--amber)'},{l:'Sin riesgo',v:counts.bajo,c:'var(--green)'}].map((s,i)=>(

        <div key={a.id} className="card" style={{marginBottom:8,borderLeft:`3px solid ${rColors[a.riesgo]||'var(--border)'}`}}>
          <div style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer'}} onClick={()=>setExpanded(expanded===a.id?null:a.id)}>
            <div className="avatar" style={{background:rColors[a.riesgo]||'var(--blue)'}}>{(a.nombre.split(',')[0]||'?')[0]}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:500,fontSize:13}}>{a.nombre}</div>
              <div style={{fontSize:11.5,color:'var(--text-muted)'}}>Sem. {a.semestre} · Mat. {a.mat}</div>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <div style={{textAlign:'right',fontSize:11,color:'var(--text-muted)'}}>
                <div>Promedio: <strong style={{color:a.promedio>=7?'var(--text)':'var(--red)'}}>{a.promedio}</strong></div>
                <div>Faltas: <strong style={{color:a.faltas>5?'var(--red)':'var(--text)'}}>{a.faltas}</strong></div>
              </div>
              <span className={`chip ${rChips[a.riesgo]||'chip-blue'}`} style={{fontSize:10}}>{a.riesgo==='alto'?'⚠ Alto riesgo':a.riesgo==='medio'?'Riesgo medio':'Regular'}</span>
            </div>
          </div>
          {expanded===a.id&&(
            <div style={{padding:'0 14px 14px',borderTop:'1px solid var(--border)'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,margin:'12px 0'}}>
