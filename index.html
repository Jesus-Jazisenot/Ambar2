<title>TECNM — Sistema Escolar Integral (AMBAR/SII)</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:oklch(0.16 0.04 250);--navy-mid:oklch(0.21 0.04 250);--navy-light:oklch(0.27 0.04 250);
  --bg:oklch(0.965 0.008 240);--card:oklch(1 0 0);
  --blue:oklch(0.52 0.18 245);--blue-dim:oklch(0.92 0.05 245);
  --amber:oklch(0.72 0.16 65);--amber-dim:oklch(0.95 0.06 65);
  --green:oklch(0.62 0.14 145);--green-dim:oklch(0.94 0.05 145);
  --red:oklch(0.60 0.18 20);--red-dim:oklch(0.95 0.05 20);
  --purple:oklch(0.55 0.16 290);--purple-dim:oklch(0.94 0.04 290);
  --teal:oklch(0.60 0.13 195);--teal-dim:oklch(0.94 0.04 195);
  --text:oklch(0.18 0.02 250);--text-mid:oklch(0.42 0.02 250);--text-muted:oklch(0.62 0.015 250);
  --border:oklch(0.90 0.01 240);
  --shadow:0 1px 4px oklch(0 0 0/.06),0 4px 16px oklch(0 0 0/.05);
  --shadow-lg:0 4px 24px oklch(0 0 0/.10);
  --r:10px;--sidebar:230px;
  --font:'DM Sans',sans-serif;--font-serif:'DM Serif Display',serif;
  --t:0.22s cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex}
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:10;overflow-y:auto}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--navy-light)}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-serif);color:#fff;font-size:17px;margin-bottom:8px}
.logo-name{color:#fff;font-weight:600;font-size:13px}.logo-sub{color:oklch(0.65 0.03 250);font-size:10.5px;margin-top:1px}
.role-switcher{margin:12px 12px 2px;background:var(--navy-mid);border-radius:8px;padding:3px;display:flex;gap:2px}
.role-btn{flex:1;padding:5px 3px;border:none;background:transparent;color:oklch(0.65 0.03 250);font-size:10.5px;font-family:var(--font);border-radius:6px;cursor:pointer;transition:var(--t);text-align:center}
.role-btn.active{background:var(--navy-light);color:#fff;font-weight:500}
.nav-section{padding:6px 0}
.nav-label{padding:8px 18px 3px;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:oklch(0.45 0.03 250);font-weight:500}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;margin:1px 7px;border-radius:7px;cursor:pointer;color:oklch(0.65 0.03 250);transition:var(--t);font-size:12.5px;font-weight:400}
.nav-item:hover{background:var(--navy-mid);color:oklch(0.85 0.02 250)}
.nav-item.active{background:var(--blue);color:#fff;font-weight:500}
.nav-icon{width:15px;height:15px;opacity:.75;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--amber);color:var(--navy);font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:16px;text-align:center}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--navy-light)}
.user-card{display:flex;align-items:center;gap:9px;padding:9px;border-radius:8px;cursor:pointer;transition:var(--t)}
.user-card:hover{background:var(--navy-mid)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;flex-shrink:0}
.user-name{color:#fff;font-size:12.5px;font-weight:500}.user-role{color:oklch(0.55 0.03 250);font-size:10.5px}
.main{flex:1;min-height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:5;flex-shrink:0}
.topbar-title{font-size:14.5px;font-weight:600}.topbar-sub{font-size:12.5px;color:var(--text-muted);margin-left:4px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-mid);transition:var(--t)}
.icon-btn:hover{background:var(--bg)}
.content{padding:22px 24px;flex:1}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:pageIn .3s cubic-bezier(0.4,0,0.2,1) forwards}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-pad{padding:18px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:18px;position:relative;overflow:hidden;transition:var(--t)}
.kpi-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.kpi-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.kpi-value{font-family:var(--font-serif);font-size:30px;color:var(--text);line-height:1;margin-bottom:3px}
.kpi-label{font-size:11.5px;color:var(--text-muted);font-weight:500}
.kpi-delta{font-size:10.5px;color:var(--green);font-weight:500;margin-top:5px}
.kpi-glow{position:absolute;right:-18px;top:-18px;width:72px;height:72px;border-radius:50%;opacity:.08}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.section-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.badge{background:var(--blue-dim);color:var(--blue);font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:9px 13px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 13px;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.grade-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-weight:600;font-size:11.5px}
.grade-a{background:var(--green-dim);color:var(--green)}.grade-b{background:var(--blue-dim);color:var(--blue)}
.grade-c{background:var(--amber-dim);color:oklch(0.50 0.16 65)}.grade-f{background:var(--red-dim);color:var(--red)}
.progress-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid transparent}
.chip-blue{background:var(--blue-dim);color:var(--blue);border-color:oklch(.80 .08 245)}
.chip-green{background:var(--green-dim);color:var(--green);border-color:oklch(.82 .06 145)}
.chip-amber{background:var(--amber-dim);color:oklch(.50 .16 65);border-color:oklch(.85 .08 65)}
.chip-red{background:var(--red-dim);color:var(--red);border-color:oklch(.82 .08 20)}
.chip-purple{background:var(--purple-dim);color:var(--purple);border-color:oklch(.84 .05 290)}
.chip-teal{background:var(--teal-dim);color:var(--teal);border-color:oklch(.82 .05 195)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-size:12.5px;font-weight:500;font-family:var(--font);cursor:pointer;transition:var(--t);border:none}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:oklch(.47 .18 245)}
.btn-ghost{background:transparent;color:var(--text-mid);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid oklch(.82 .08 20)}.btn-danger:hover{background:oklch(.90 .07 20)}
.btn-sm{padding:4px 11px;font-size:11.5px}
.input{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:12.5px;font-family:var(--font);color:var(--text);background:var(--card);transition:var(--t);outline:none}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px oklch(.52 .18 245/.10)}
select.input{cursor:pointer}
textarea.input{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-label{font-size:11.5px;font-weight:500;color:var(--text-mid);margin-bottom:4px;display:block}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-row-label{font-size:12.5px;color:var(--text-mid)}.stat-row-val{font-size:12.5px;font-weight:600}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:90px;padding-top:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height 1s cubic-bezier(0.4,0,0.2,1);min-height:3px}
.bar-label{font-size:9.5px;color:var(--text-muted);text-align:center}
.bar-val{font-size:9.5px;color:var(--text-mid);font-weight:500}
.activity-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--bg)}
.activity-text{font-size:11.5px;color:var(--text-mid);line-height:1.5}
.activity-text strong{color:var(--text);font-weight:500}
.activity-time{font-size:10.5px;color:var(--text-muted);margin-left:auto;flex-shrink:0;white-space:nowrap}
/* Retícula */
.reticula-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.ret-cell{border-radius:7px;padding:8px 7px;font-size:10.5px;font-weight:500;text-align:center;cursor:pointer;transition:var(--t);border:1.5px solid transparent;line-height:1.3}
.ret-cell.aprobada{background:var(--green-dim);color:var(--green);border-color:oklch(.82 .06 145)}
.ret-cell.en-curso{background:var(--blue-dim);color:var(--blue);border-color:oklch(.80 .08 245)}
.ret-cell.disponible{background:var(--card);color:var(--text-mid);border-color:var(--border)}
.ret-cell.disponible:hover{border-color:var(--blue);background:var(--blue-dim);color:var(--blue)}
.ret-cell.bloqueada{background:var(--bg);color:var(--text-muted);border-color:transparent;cursor:not-allowed;opacity:.6}
.ret-cell.seleccionada{background:var(--blue);color:#fff;border-color:var(--blue)}
.ret-code{font-size:9px;opacity:.7;margin-top:2px}
/* Step tracker */
.steps{display:flex;flex-direction:column;gap:0}
.step{display:flex;gap:14px;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;left:15px;top:32px;bottom:0;width:2px;background:var(--border)}
.step.done::after{background:var(--green)}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:600;border:2px solid var(--border);background:var(--card);position:relative;z-index:1}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.active .step-dot{background:var(--blue);border-color:var(--blue);color:#fff}
.step-body{padding:4px 0 20px}
.step-title{font-size:13px;font-weight:600;margin-bottom:2px}
.step-desc{font-size:12px;color:var(--text-muted)}
/* Stars */
.stars{display:flex;gap:3px}
.star{font-size:20px;cursor:pointer;transition:var(--t);color:var(--border)}
.star.on{color:var(--amber)}
/* Asistencia grid */
.asist-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.asist-cell{width:100%;aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;cursor:pointer;transition:var(--t)}
.asist-p{background:var(--green-dim);color:var(--green)}
.asist-a{background:var(--red-dim);color:var(--red)}
.asist-j{background:var(--amber-dim);color:oklch(.50 .16 65)}
.asist-n{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}
/* Tabs */
.tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--border)}
.tab{padding:8px 16px;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:var(--t)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.active){color:var(--text)}
/* doc chip */
.doc-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--card);transition:var(--t)}
.doc-item:hover{border-color:var(--blue);background:var(--blue-dim)}
/* constancia */
.const-item{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);margin-bottom:8px;transition:var(--t)}
.const-item:hover{border-color:oklch(.80 .08 245);box-shadow:var(--shadow)}
/* risk bar */
.risk-bar{height:4px;border-radius:99px}
.section-title svg{width:14px;height:14px;flex-shrink:0}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
@keyframes countUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.count-anim{animation:countUp .6s cubic-bezier(0.4,0,0.2,1) forwards}
</style>
</head>

/* ── HOOKS ────────────────────────────────────────────── */
function useCounter(target,dur=1200,delay=0){
  const [v,setV]=useState(0);
  useEffect(()=>{
    const t=setTimeout(()=>{
      const s=performance.now();
      const f=(n)=>{const p=Math.min((n-s)/dur,1),e=1-Math.pow(1-p,3);setV(Math.round(e*target));if(p<1)requestAnimationFrame(f);};
      requestAnimationFrame(f);
    },delay);
    return()=>clearTimeout(t);
  },[target]);
  return v;
}

/* ── RETÍCULA ─────────────────────────────────────────── */
function Reticula(){
  const [sel,setSel]=useState([]);
  const [grupos,setGrupos]=useState([]);
  const [inscMsg,setInscMsg]=useState('');
  const [inscLoading,setInscLoading]=useState(false);

  useEffect(()=>{
    (async()=>{
      const {data}=await sb.from('v_grupos_disponibles').select('*');
      if(data) setGrupos(data);
    })();
  },[]);

  async function inscribir(){
    setInscLoading(true); setInscMsg('');
    const {data:user}=await sb.auth.getUser();
    if(!user?.user){setInscMsg('Sesión expirada.');setInscLoading(false);return;}
    const {data:u}=await sb.from('usuarios').select('id_usuario').eq('email',user.user.email).single();
    const {data:a}=await sb.from('alumnos').select('id_alumno').eq('id_usuario',u.id_usuario).single();
    if(!a){setInscMsg('Perfil de alumno no encontrado.');setInscLoading(false);return;}
    const resultados=[];
    for(const idGrupo of sel){
      const {data:r}=await sb.rpc('inscribir_alumno',{p_id_alumno:a.id_alumno,p_id_grupo:idGrupo});
      resultados.push(r?.resultado||'ERROR');
    }
    const ok=resultados.filter(r=>r==='OK').length;
    setInscMsg(`${ok} de ${sel.length} inscripción(es) procesada(s) correctamente.`);
    setSel([]);
    // Refrescar grupos
    const {data}=await sb.from('v_grupos_disponibles').select('*');
    if(data) setGrupos(data);
    setInscLoading(false);
  }

  const toggle=(code,status)=>{
    if(status==='aprobada'||status==='en-curso'||status==='bloqueada') return;
    setSel(p=>p.includes(code)?p.filter(x=>x!==code):[...p,code]);
  };
  const labels={'aprobada':'Aprobada','en-curso':'En curso','disponible':'Disponible','bloqueada':'Prerrequisito pendiente','seleccionada':'Seleccionada'};
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <div style={{fontWeight:600,fontSize:14.5}}>Retícula — Inscripción por Paquetes</div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>ISC · Plan 2023 · Selecciona materias disponibles para inscribirte</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {inscMsg&&<span style={{fontSize:12,color:'var(--green)'}}>{inscMsg}</span>}
          {sel.length>0&&<span className="chip chip-blue">{sel.length} seleccionadas</span>}
          <button className="btn btn-primary" disabled={sel.length===0||inscLoading} onClick={inscribir} style={{opacity:sel.length?1:.5}}>{inscLoading?'Procesando…':'Inscribir seleccionadas'}</button>
        </div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        {Object.entries(labels).map(([k,v])=>(
          <span key={k} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--text-muted)'}}>

/* ── INSCRIPCIÓN ──────────────────────────────────────── */
function Inscripcion(){
  const [enrolled,setEnrolled]=useState([2]);
  const toggle=(id)=>{
    const s=SUBJECTS.find(x=>x.id===id);
    if(s.inscritos>=s.cupo&&!enrolled.includes(id)) return;
    setEnrolled(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  };
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
        <div><div style={{fontWeight:600,fontSize:14.5}}>Inscripción por Materia</div><div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>Ciclo 2025-A · Cupos en tiempo real</div></div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span className="chip chip-green">{ic.check} {enrolled.length} inscritas</span>
          <button className="btn btn-primary">Confirmar inscripción</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {SUBJECTS.map(s=>{
          const pct=(s.inscritos/s.cupo)*100,full=s.inscritos>=s.cupo,isE=enrolled.includes(s.id);
          return(
            <div key={s.id} onClick={()=>toggle(s.id)} style={{background:isE?'var(--green-dim)':full&&!isE?'var(--bg)':'var(--card)',border:`1.5px solid ${isE?'var(--green)':full&&!isE?'var(--border)':'var(--border)'}`,borderRadius:10,padding:14,cursor:full&&!isE?'not-allowed':'pointer',transition:'var(--t)',opacity:full&&!isE?.5:1,position:'relative'}}>
              {isE&&<div style={{position:'absolute',top:10,right:10,color:'var(--green)',width:15,height:15}}>{ic.check}</div>}
              {full&&!isE&&<span className="chip chip-red" style={{position:'absolute',top:10,right:10,fontSize:10}}>LLENO</span>}
              <div style={{fontWeight:600,fontSize:13,marginBottom:3}}>{s.name}</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>{s.code} · {s.credits} créditos</div>
              <div style={{fontSize:11,color:'var(--text-mid)',marginBottom:6}}>👤 {s.teacher}</div>
              <div style={{fontSize:11,color:'var(--text-mid)',marginBottom:8}}>🕐 {s.horario}</div>
              <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`,background:full?'var(--red)':pct>70?'var(--amber)':'var(--green)'}}></div></div>
              <div style={{fontSize:10.5,color:'var(--text-muted)',marginTop:3,textAlign:'right'}}>{s.inscritos}/{s.cupo} cupos</div>

/* ── KÁRDEX ───────────────────────────────────────────── */
function Kardex(){
  const [kardexData,setKardexData]=useState(null);
  const [resumen,setResumen]=useState(null);
  const GC=c=>!c?'':c>=9?'grade-a':c>=7.5?'grade-b':c>=6?'grade-c':'grade-f';

  useEffect(()=>{
    let ok=true;
    (async()=>{
      const {data:user}=await sb.auth.getUser();
      if(!user?.user) return;
      const {data:u}=await sb.from('usuarios').select('id_usuario').eq('email',user.user.email).single();
      if(!u) return;
      const {data:a}=await sb.from('alumnos').select('id_alumno').eq('id_usuario',u.id_usuario).single();
      if(!a||!ok) return;
      const [{data:k},{data:r}]=await Promise.all([
        sb.from('v_kardex_alumno').select('*').eq('id_alumno',a.id_alumno).order('semestre_sug'),
        sb.from('v_alumno_resumen').select('*').eq('id_alumno',a.id_alumno).single(),
      ]);
      if(ok){
        if(k) setKardexData(k);
        if(r) setResumen(r);
      }
    })();
    return()=>{ok=false;};
  },[]);

  // Agrupar por período si hay datos de BD, si no usar datos mock
  const allCal=kardexData||KARDEX.flatMap(s=>s.materias).filter(m=>m.cal!==null).map(m=>({calificacion:m.cal,creditos:m.credits||4}));
  const avg=resumen?.promedio_gral||(allCal.length?(allCal.reduce((a,m)=>a+(parseFloat(m.calificacion)||m.cal||0),0)/allCal.length).toFixed(2):0);
  const credits=resumen?.creditos_acum||allCal.reduce((a,m)=>a+(m.creditos||m.credits||0),0);
  return(
    <div className="page-enter">
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {[{l:'Promedio general',v:avg,c:'var(--blue)'},{l:'Créditos aprobados',v:`${credits}/250`,c:'var(--green)'},{l:'Avance de carrera',v:`${Math.round(credits/250*100)}%`,c:'var(--amber)'},{l:'Materias aprobadas',v:allCal.length,c:'var(--purple)'}].map((s,i)=>(
          <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-serif)',fontSize:24,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{marginBottom:12,padding:'12px 14px',background:'var(--card)'}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:5,color:'var(--text-mid)'}}><span>Progreso de créditos</span><span>{credits}/250</span></div>
        <div className="progress-bar" style={{height:7}}><div className="progress-fill" style={{width:`${credits/250*100}%`,background:'var(--green)'}}></div></div>
      </div>
      {KARDEX.map((sem,si)=>(
        <div key={si} className="card" style={{marginBottom:10}}>
          <div style={{padding:'12px 14px 8px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontWeight:600,fontSize:13}}>{sem.sem}</span>
            <span className={`chip ${sem.materias[0].cal!==null?'chip-green':'chip-amber'}`}>{sem.materias[0].cal!==null?'Concluido':'En curso'}</span>
          </div>
          <table>
            <thead><tr><th>Materia</th><th>Créditos</th><th>Calificación</th><th>Estado</th></tr></thead>
            <tbody>{sem.materias.map((m,mi)=>(
              <tr key={mi}>
                <td>{m.name}</td><td>{m.credits}</td>
                <td>{m.cal!==null?<span className={`grade-badge ${GC(m.cal)}`}>{m.cal}</span>:<span style={{color:'var(--text-muted)'}}>—</span>}</td>
                <td>{m.cal===null?<span className="chip chip-amber" style={{fontSize:10}}>Pendiente</span>:m.cal>=6?<span className="chip chip-green" style={{fontSize:10}}>Aprobada</span>:<span className="chip chip-red" style={{fontSize:10}}>Reprobada</span>}</td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      ))}
    </div>
  );
}

/* ── ASISTENCIAS ──────────────────────────────────────── */
function Asistencias({role}){
  const days=['L','M','X','J','V','S','D'];
  const [records,setRecords]=useState(()=>{
    const r={};
    LISTA.forEach(a=>{r[a.id]=Array(28).fill(null).map((_,i)=>i%7>4?null:i<14?'P':i===17?'F':i===20?'J':'P');});
    return r;
  });
  const cycle=(st)=>st==='P'?'F':st==='F'?'J':'P';
  const toggle=(aid,idx)=>{
    if(role!=='docente') return;
    setRecords(r=>({...r,[aid]:r[aid].map((v,i)=>i===idx?cycle(v):v)}));
  };
  const colors={P:'asist-p',F:'asist-a',J:'asist-j'};
  if(role==='alumno'){
    const myRecord=records[1];
    const total=myRecord.filter(v=>v!==null).length;
    const pres=myRecord.filter(v=>v==='P').length;
    const pct=Math.round(pres/total*100);
    return(
      <div className="page-enter">
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          {[{l:'% Asistencia',v:`${pct}%`,c:pct>=85?'var(--green)':pct>=70?'var(--amber)':'var(--red)'},{l:'Clases asistidas',v:`${pres}/${total}`,c:'var(--blue)'},{l:'Faltas',v:myRecord.filter(v=>v==='F').length,c:'var(--red)'},{l:'Justificadas',v:myRecord.filter(v=>v==='J').length,c:'var(--amber)'}].map((s,i)=>(
            <div key={i} className="card card-pad" style={{flex:1,textAlign:'center'}}>
              <div style={{fontFamily:'var(--font-serif)',fontSize:24,color:s.c}}>{s.v}</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:3}}>{s.l}</div>
            </div>
          ))}
        </div>
        {SUBJECTS.slice(0,4).map((s,si)=>{
          const myR=Object.values(records)[si%Object.keys(records).length];
          const tot=myR.filter(v=>v!==null).length;
          const pr=myR.filter(v=>v==='P').length;
          const pt=Math.round(pr/tot*100);
          return(
            <div key={s.id} className="card card-pad" style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <div><div style={{fontWeight:600,fontSize:13}}>{s.name}</div><div style={{fontSize:11,color:'var(--text-muted)'}}>{s.teacher}</div></div>
                <span className={`chip ${pt>=85?'chip-green':pt>=70?'chip-amber':'chip-red'}`}>{pt}%</span>
              </div>
              <div className="progress-bar" style={{height:5}}><div className="progress-fill" style={{width:`${pt}%`,background:pt>=85?'var(--green)':pt>=70?'var(--amber)':'var(--red)'}}></div></div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>{pr}/{tot} clases · Mínimo requerido: 85%</div>
            </div>
          );
        })}
      </div>
    );
  }
  // Docente view
  const [selMat,setSelMat]=useState('BDT-201');
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <select className="input" style={{maxWidth:220}} value={selMat} onChange={e=>setSelMat(e.target.value)}>
          {['BDT-201','INF-305','ING-401'].map(m=><option key={m}>{m}</option>)}
        </select>
        <span className="chip chip-blue">28 sesiones registradas</span>
        <button className="btn btn-ghost btn-sm">Exportar lista</button>
      </div>
      <div className="card" style={{overflowX:'auto'}}>
        <table>
          <thead>
            <tr>
              <th style={{minWidth:160}}>Alumno</th>
              {Array(28).fill(0).map((_,i)=>(<th key={i} style={{textAlign:'center',minWidth:30,padding:'8px 3px',fontSize:9}}>{i+1}</th>))}
              <th>% Asist.</th>
            </tr>
          </thead>
          <tbody>
            {LISTA.map(a=>{
              const rec=records[a.id];
              const tot=rec.filter(v=>v!==null).length;
              const pr=rec.filter(v=>v==='P').length;
              const pct=Math.round(pr/tot*100);
              return(
                <tr key={a.id}>
                  <td style={{fontWeight:500,fontSize:12}}>{a.nombre.split(',')[0]}</td>
                  {rec.map((v,i)=>(
                    <td key={i} style={{padding:'4px 2px',textAlign:'center'}}>
                      {v===null?<span style={{color:'var(--border)',fontSize:9}}>—</span>:
                      <span className={`asist-cell ${colors[v]}`} style={{display:'inline-flex',width:20,height:20,fontSize:8,borderRadius:3,alignItems:'center',justifyContent:'center',cursor:'pointer'}} onClick={()=>toggle(a.id,i)}>{v}</span>}
                    </td>
                  ))}
                  <td><span className={`chip ${pct>=85?'chip-green':pct>=70?'chip-amber':'chip-red'}`} style={{fontSize:10}}>{pct}%</span></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── HORARIO ──────────────────────────────────────────── */
function Horario(){
  const days=['Lunes','Martes','Miércoles','Jueves','Viernes'];
  const times=['07:00','08:00','09:00','10:00','11:00','12:00','13:00'];
  const getB=(d,t)=>HORARIO_BLOCKS.find(b=>b.day===d&&b.start===t);
  const isOcc=(d,t)=>HORARIO_BLOCKS.some(b=>b.day===d&&t>b.start&&t<b.start+b.span);
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:14.5}}>Horario de clases</div>
        <span className="chip chip-blue">Ciclo 2025-A</span>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'55px repeat(5,1fr)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',background:'var(--card)'}}>
          <div style={{background:'var(--bg)',padding:8,fontSize:10.5,fontWeight:600,textAlign:'center',color:'var(--text-mid)',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)'}}></div>
          {days.map(d=><div key={d} style={{background:'var(--bg)',padding:8,fontSize:10.5,fontWeight:600,textAlign:'center',color:'var(--text-mid)',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)'}}>{d}</div>)}
          {times.map((t,ti)=>(
            <React.Fragment key={ti}>
              <div style={{padding:'7px 5px',fontSize:9.5,color:'var(--text-muted)',textAlign:'center',borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)',background:'var(--bg)'}}>{t}</div>
              {days.map((_,di)=>{
                if(isOcc(di,ti)) return null;
                const block=getB(di,ti);
                return(
                  <div key={di} style={{borderBottom:'1px solid var(--border)',borderRight:'1px solid var(--border)',padding:3,minHeight:42,...(block?{gridRow:`span ${block.span}`,padding:4}:{})}}>
                    {block&&<div style={{borderRadius:6,padding:'5px 7px',fontSize:10,fontWeight:500,height:'100%',display:'flex',flexDirection:'column',gap:2,background:`${block.color}22`,borderLeft:`3px solid ${block.color}`}}>
                      <div style={{fontWeight:600,fontSize:10.5,color:block.color}}>{block.name}</div>
                      <div style={{opacity:.75,color:block.color}}>{block.room}</div>
                    </div>}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

            ))}

        </div>
      </div>
    </div>
  );
}

/* ── LISTA + CALIFICACIONES (fusionado) ───────────────── */
function Lista(){
  const [tab,setTab]=useState(0);
  const [search,setSearch]=useState('');
  const [grades,setGrades]=useState(LISTA.map(a=>({...a,final:'',id_inscripcion:null})));
  const [saved,setSaved]=useState(false);
  const [saveMsg,setSaveMsg]=useState('');
  const [grupos,setGrupos]=useState([]);
  const [grupoSel,setGrupoSel]=useState(null);
  const GC=c=>!c&&c!==0?'':parseFloat(c)>=9?'grade-a':parseFloat(c)>=7.5?'grade-b':parseFloat(c)>=6?'grade-c':'grade-f';
  const prom=(a)=>{const p1=parseFloat(a.p1||a.cal_p1)||0;const p2=parseFloat(a.p2||a.cal_p2)||0;return((p1+p2)/2).toFixed(1);};

  // Cargar grupos del docente
  useEffect(()=>{
    (async()=>{
      const {data:user}=await sb.auth.getUser();
      if(!user?.user) return;
      const {data:u}=await sb.from('usuarios').select('id_usuario').eq('email',user.user.email).single();
      if(!u) return;
      const {data:d}=await sb.from('docentes').select('id_docente').eq('id_usuario',u.id_usuario).single();
      if(!d) return;
      const {data:g}=await sb.from('grupos')
        .select('id_grupo,clave_grupo,materias(nombre),periodos(clave)')
        .eq('id_docente',d.id_docente).order('id_grupo',{ascending:false}).limit(10);
      if(g&&g.length){setGrupos(g);setGrupoSel(g[0].id_grupo);}
    })();
  },[]);

  // Cargar lista del grupo seleccionado
  useEffect(()=>{
    if(!grupoSel) return;
    (async()=>{
      const {data}=await sb.from('v_lista_grupo_docente').select('*').eq('id_grupo',grupoSel);
      if(data) setGrades(data.map(a=>({
        id:a.id_inscripcion,id_inscripcion:a.id_inscripcion,
        mat:a.matricula,nombre:a.nombre_completo,
        p1:parseFloat(a.cal_p1)||null,p2:parseFloat(a.cal_p2)||null,
        cal_p1:a.cal_p1,cal_p2:a.cal_p2,
        final:a.cal_final!==null?a.cal_final:'',
        estado:a.estado,porc_asistencia:a.porc_asistencia
      })));
    })();
  },[grupoSel]);

  async function guardarCalificaciones(){
    setSaveMsg('Guardando…');
    const {data:user}=await sb.auth.getUser();
    const {data:u}=await sb.from('usuarios').select('id_usuario').eq('email',user.user.email).single();
    const {data:d}=await sb.from('docentes').select('id_docente').eq('id_usuario',u.id_usuario).single();
    let ok=0;
    for(const a of grades){
      if(a.final===''||a.final===null||!a.id_inscripcion) continue;
      const {data:r}=await sb.rpc('capturar_calificacion_final',{
        p_id_inscripcion:a.id_inscripcion,
        p_calificacion:parseFloat(a.final),
        p_id_docente:d?.id_docente||1
      });
      if(r?.resultado==='OK') ok++;
    }
    setSaveMsg(`${ok} calificación(es) guardada(s).`);
    setSaved(true);
  }

  const complete=grades.filter(a=>a.final!=='').length;
  const filtered=grades.filter(a=>(a.nombre||'').toLowerCase().includes(search.toLowerCase())||(a.mat||'').includes(search));
  const grupoInfo=grupos.find(g=>g.id_grupo===grupoSel);
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontWeight:600,fontSize:14.5}}>Lista de Clase</div>
            {grupos.length>0&&(
              <select value={grupoSel||''} onChange={e=>setGrupoSel(Number(e.target.value))}
                style={{fontSize:12.5,padding:'3px 8px',border:'1px solid var(--border)',borderRadius:6,background:'var(--card)',fontFamily:'var(--font)',color:'var(--text)',cursor:'pointer'}}>
                {grupos.map(g=>(
                  <option key={g.id_grupo} value={g.id_grupo}>{g.clave_grupo} – {g.materias?.nombre||''} ({g.periodos?.clave||''})</option>
                ))}
              </select>
            )}
          </div>
          <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{grupoInfo?.materias?.nombre||'Base de Datos'} · {grupoInfo?.periodos?.clave||'Ciclo 2025-A'}</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {saveMsg&&<span className="chip chip-green">{saveMsg}</span>}
          {tab===1&&<button className="btn btn-primary btn-sm" onClick={guardarCalificaciones}>Guardar y firmar acta</button>}
          <button className="btn btn-ghost btn-sm">Exportar PDF</button>
        </div>
      </div>
      <div className="tabs">
        {['Vista general','Captura de calificaciones'].map((t,i)=>(
          <div key={i} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>{t}</div>
        ))}
      </div>
      {tab===0&&(
        <>
          <div style={{display:'flex',gap:10,marginBottom:12}}>
            <div style={{position:'relative',flex:1,maxWidth:300}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)',pointerEvents:'none',width:14,height:14}}>{ic.search}</span>
              <input className="input" style={{paddingLeft:30}} placeholder="Buscar alumno…" value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <span className="chip chip-blue">{grades.length} alumnos inscritos</span>
          </div>
          <div className="card"><table>
            <thead><tr><th>Matrícula</th><th>Nombre</th><th>Parcial 1</th><th>Parcial 2</th><th>Promedio</th><th>Estado</th></tr></thead>
            <tbody>{filtered.map(a=>{
              const p=parseFloat(prom(a));
              return(
                <tr key={a.id}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{a.mat}</td>
                  <td style={{fontWeight:500}}>{a.nombre}</td>
                  <td><span className={`grade-badge ${GC(a.p1)}`}>{a.p1}</span></td>
                  <td><span className={`grade-badge ${GC(a.p2)}`}>{a.p2}</span></td>
                  <td><span className={`grade-badge ${GC(p)}`}>{p}</span></td>
                  <td>{p<6.5?<span className="chip chip-red" style={{fontSize:10}}>⚠ Riesgo</span>:<span className="chip chip-green" style={{fontSize:10}}>Regular</span>}</td>
                </tr>
              );
            })}</tbody>
          </table></div>
        </>
      )}
      {tab===1&&(
        <>
          <div style={{marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,marginBottom:5,color:'var(--text-mid)'}}><span>Calificaciones capturadas</span><span>{complete}/{grades.length}</span></div>
            <div className="progress-bar" style={{height:5}}><div className="progress-fill" style={{width:`${complete/grades.length*100}%`,background:'var(--blue)'}}></div></div>
          </div>
          <div className="card"><table>
            <thead><tr><th>Matrícula</th><th>Nombre</th><th>Parcial 1</th><th>Parcial 2</th><th>Calificación Final</th><th>Resultado</th></tr></thead>
            <tbody>{grades.map(a=>{
              const fin=parseFloat(a.final);
              return(
                <tr key={a.id}>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{a.mat}</td>
                  <td style={{fontWeight:500}}>{a.nombre}</td>
                  <td><span className={`grade-badge ${GC(a.p1)}`}>{a.p1}</span></td>
                  <td><span className={`grade-badge ${GC(a.p2)}`}>{a.p2}</span></td>
                  <td><input type="number" min="0" max="10" step=".1" value={a.final} onChange={e=>setGrades(g=>g.map(x=>x.id===a.id?{...x,final:e.target.value}:x))} placeholder="—" style={{width:65,textAlign:'center',padding:'5px 7px',border:'1px solid var(--border)',borderRadius:6,fontSize:12.5,fontFamily:'var(--font)',outline:'none',background:a.final!==''&&!isNaN(fin)?`var(--${GC(fin).replace('grade-','')==='a'?'green':GC(fin).replace('grade-','')==='b'?'blue':GC(fin).replace('grade-','')==='c'?'amber':'red'}-dim)`:'var(--card)'}}/></td>
                  <td>{a.final===''?<span style={{color:'var(--text-muted)',fontSize:12}}>—</span>:fin>=6?<span className="chip chip-green" style={{fontSize:10}}>Aprobado</span>:<span className="chip chip-red" style={{fontSize:10}}>Reprobado</span>}</td>
                </tr>
              );
            })}</tbody>
          </table></div>
        </>
      )}
    </div>
  );
}

/* ── NOTIFICACIONES ───────────────────────────────────── */
function Notificaciones(){
  const [notifs,setNotifs]=useState(NOTIFS.map((n,i)=>({id:i,type:n.type,titulo:n.title,mensaje:n.desc,fecha:n.time,leida:false})));
  const [loading,setLoading]=useState(false);
  const colors={warn:'var(--amber)',info:'var(--blue)',danger:'var(--red)',success:'var(--green)'};
  const bgs={warn:'var(--amber-dim)',info:'var(--blue-dim)',danger:'var(--red-dim)',success:'var(--green-dim)'};
  const labels={warn:'Aviso',info:'Info',danger:'Alerta',success:'Éxito'};

  useEffect(()=>{
    let ok=true;
    (async()=>{
      setLoading(true);
      const {data:user}=await sb.auth.getUser();
      if(!user?.user) return;
      const {data:u}=await sb.from('usuarios').select('id_usuario').eq('email',user.user.email).single();
      if(!u||!ok) return;
      const {data}=await sb.from('notificaciones')
        .select('*').eq('id_usuario',u.id_usuario)
        .order('fecha',{ascending:false}).limit(30);
      if(data&&ok) setNotifs(data);
      setLoading(false);
    })();
    return()=>{ok=false;};
  },[]);

  async function marcarLeida(id,dbId){
    setNotifs(n=>n.map(x=>x.id===id||x.id_notif===id?{...x,leida:true}:x));
    if(dbId) await sb.from('notificaciones').update({leida:true,fecha_lectura:new Date().toISOString()}).eq('id_notif',dbId);
  }
  async function marcarTodas(){
    const ids=notifs.filter(n=>!n.leida).map(n=>n.id_notif).filter(Boolean);
    setNotifs(n=>n.map(x=>({...x,leida:true})));
    if(ids.length) await sb.from('notificaciones').update({leida:true}).in('id_notif',ids);
  }
  const visible=notifs.filter(n=>!n.leida);
  return(
    <div className="page-enter">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div style={{fontWeight:600,fontSize:14.5}}>Notificaciones {loading&&<span style={{fontSize:11,color:'var(--text-muted)',fontWeight:400}}>Cargando…</span>}</div>
        {visible.length>0&&<button className="btn btn-ghost btn-sm" onClick={marcarTodas}>Marcar todo leído</button>}
      </div>
      {visible.length===0&&<div className="card card-pad" style={{textAlign:'center',padding:48,color:'var(--text-muted)'}}><div style={{fontSize:28,marginBottom:10}}>✓</div><div style={{fontWeight:600}}>Sin notificaciones pendientes</div></div>}
      {visible.map((n,i)=>{
        const type=n.tipo||n.type;
        return(
          <div key={n.id_notif||i} className="card" style={{marginBottom:8,padding:'14px 16px',display:'flex',gap:12,alignItems:'flex-start'}}>
            <div style={{width:34,height:34,borderRadius:9,background:bgs[type]||bgs.info,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{color:colors[type]||colors.info,width:15,height:15}}>{ic.bell}</span>
            </div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:2}}>
                <span style={{fontWeight:600,fontSize:13}}>{n.titulo||n.title}</span>
                <span className="chip" style={{background:bgs[type]||bgs.info,color:colors[type]||colors.info,borderColor:'transparent',fontSize:10,padding:'1px 7px'}}>{labels[type]||type}</span>
              </div>
              <div style={{fontSize:12,color:'var(--text-mid)'}}>{n.mensaje||n.desc}</div>
              <div style={{fontSize:11,color:'var(--text-muted)',marginTop:5}}>{n.fecha||n.time}</div>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>marcarLeida(n.id_notif||i,n.id_notif)}>Descartar</button>
          </div>
        );
      })}
    </div>
  );
}

                <div className="progress-bar" style={{width:80}}><div className="progress-fill" style={{width:`${a.horas/a.max*100}%`,background:a.status==='liberado'?'var(--green)':'var(--blue)'}}></div></div>
              </div>
            </td>
            <td><span className={`chip ${a.status==='liberado'?'chip-green':a.status==='activo'?'chip-blue':'chip-amber'}`} style={{fontSize:10}}>{a.status==='liberado'?'Liberado':a.status==='activo'?'En curso':'Pendiente'}</span></td>
            <td style={{display:'flex',gap:5}}>
              {a.status==='activo'&&<button className="btn btn-ghost btn-sm">Actualizar horas</button>}
              {a.status==='activo'&&a.horas>=480&&<button className="btn btn-primary btn-sm" onClick={()=>setAlumnos(x=>x.map(b=>b.mat===a.mat?{...b,status:'liberado'}:b))}>Liberar</button>}
              {a.status==='pendiente'&&<button className="btn btn-primary btn-sm">Asignar</button>}
            </td>
          </tr>
        ))}</tbody>
      </table></div>
    </div>
  );
}

/* ── LOGIN ────────────────────────────────────────────── */
function Login({onLogin}){
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  async function handleSubmit(e){
    e.preventDefault();
    setErr(''); setLoading(true);
    try{
      const {data:authData,error:authErr}=await sb.auth.signInWithPassword({email,password:pass});
      if(authErr) throw authErr;
      const {data:perfil,error:pErr}=await sb
        .from('usuarios').select('*,roles(nombre)')
        .eq('email',email).single();
      if(pErr) throw new Error('Usuario no encontrado en el sistema escolar.');
      // Actualizar último acceso
      await sb.from('usuarios').update({ultimo_acceso:new Date().toISOString()}).eq('email',email);
      onLogin(perfil,authData.session);
    }catch(e){
      setErr(e.message||'Error al iniciar sesión.');
    }finally{setLoading(false);}
  }

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{display:'flex',borderRadius:16,overflow:'hidden',boxShadow:'0 8px 40px oklch(0 0 0/0.18)',width:'min(860px,96vw)',minHeight:480}}>
        {/* Panel izquierdo */}
        <div style={{width:300,background:'var(--navy)',flexShrink:0,padding:'48px 32px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
          <div>
            <div style={{width:44,height:44,background:'var(--blue)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-serif)',color:'#fff',fontSize:22,marginBottom:20}}>T</div>
            <div style={{color:'#fff',fontWeight:700,fontSize:18,lineHeight:1.3,marginBottom:8}}>TECNM<br/>Campus Mazatlán</div>
            <div style={{color:'oklch(0.6 0.03 250)',fontSize:12,lineHeight:1.6}}>Sistema Integral<br/>AMBAR / SII</div>
          </div>
          <div style={{color:'oklch(0.45 0.03 250)',fontSize:11}}>
            <div style={{marginBottom:6}}>Acceso restringido al personal y alumnos autorizados del Instituto.</div>
            <div>© 2025 TECNM · Todos los derechos reservados.</div>
          </div>
        </div>
        {/* Panel derecho */}
        <div style={{flex:1,background:'var(--card)',padding:'48px 40px',display:'flex',flexDirection:'column',justifyContent:'center'}}>
          <div style={{marginBottom:32}}>
            <div style={{fontSize:22,fontWeight:700,color:'var(--text)',marginBottom:6}}>Iniciar sesión</div>
            <div style={{fontSize:13,color:'var(--text-muted)'}}>Ingresa con tu correo institucional</div>
          </div>
          <form onSubmit={handleSubmit}>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,fontWeight:600,color:'var(--text-mid)',display:'block',marginBottom:6}}>Correo institucional</label>
              <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="usuario@mazatlan.tecnm.mx"
                style={{width:'100%',padding:'10px 14px',border:'1px solid var(--border)',borderRadius:8,fontSize:14,fontFamily:'var(--font)',color:'var(--text)',background:'var(--bg)',outline:'none',transition:'border-color .2s'}}
                onFocus={e=>e.target.style.borderColor='var(--blue)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}/>
            </div>
            <div style={{marginBottom:24}}>
              <label style={{fontSize:12,fontWeight:600,color:'var(--text-mid)',display:'block',marginBottom:6}}>Contraseña</label>
              <input type="password" required value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
                style={{width:'100%',padding:'10px 14px',border:'1px solid var(--border)',borderRadius:8,fontSize:14,fontFamily:'var(--font)',color:'var(--text)',background:'var(--bg)',outline:'none',transition:'border-color .2s'}}
                onFocus={e=>e.target.style.borderColor='var(--blue)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}/>
            </div>
            {err&&<div style={{marginBottom:16,padding:'10px 14px',background:'var(--red-dim,oklch(0.95 0.05 20))',border:'1px solid var(--red)',borderRadius:8,fontSize:13,color:'var(--red)'}}>{err}</div>}
            <button type="submit" disabled={loading}
              style={{width:'100%',padding:'11px',background:loading?'oklch(0.65 0.12 245)':'var(--blue)',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:600,fontFamily:'var(--font)',cursor:loading?'not-allowed':'pointer',transition:'background .2s'}}>
              {loading?'Verificando...':'Entrar al sistema'}
            </button>
          </form>
          <div style={{marginTop:24,fontSize:11,color:'var(--text-muted)',textAlign:'center'}}>
            ¿Olvidaste tu contraseña? Contacta a Servicios Escolares.
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── TITLES MAP ───────────────────────────────────────── */
const TITLES={
  dashboard:'Panel Principal',reticula:'Inscripción / Retícula',
  kardex:'Kárdex Académico',asistencias:'Control de Asistencias',
  horario:'Horario de Clases',constancias:'Constancias en Línea',
  adeudos:'Adeudos y Pagos',evalDocente:'Evaluación del Desempeño Docente',
  titulacion:'Proceso de Titulación',notificaciones:'Notificaciones',
  perfil:'Mi Perfil',lista:'Lista y Calificaciones',
  tutorias:'Módulo de Tutorías',instrumentacion:'Instrumentación Didáctica',
  alumnos:'Directorio de Alumnos',grupos:'Grupos y Cupos',
  pagos:'Módulo de Pagos',reportes:'Reportes y Estadísticas',
  egresados:'Seguimiento de Egresados',
  cola_constancias:'Cola de Constancias',inscripciones_ctrl:'Control de Inscripciones',
  bajas:'Bajas de Alumnos',expedientes:'Expedientes de Alumnos',
  reticula_admin:'Administrar Retícula',equivalencias:'Equivalencias y Revalidaciones',
  carga_creditos:'Carga de Créditos Extracurriculares',
  servicio_social:'Servicio Social',residencias:'Residencias Profesionales',
  empresas:'Empresas Convenio',
};

/* ── APP ──────────────────────────────────────────────── */
function App(){
  const [authLoading,setAuthLoading]=useState(true);
  const [session,setSession]=useState(null);
  const [perfil,setPerfil]=useState(null);         // fila de usuarios + roles
  const [role,setRole]=useState('alumno');          // nombre del rol activo
  const [view,setView]=useState('dashboard');
  const [key,setKey]=useState(0);
  const go=(v)=>{setView(v);setKey(k=>k+1);};
  const goRole=(r)=>{setRole(r);setView('dashboard');setKey(k=>k+1);};

  // Cargar perfil desde la tabla usuarios usando el email del auth
  const loadPerfil=useCallback(async(user)=>{
    if(!user){setPerfil(null);setAuthLoading(false);return;}
    const {data,error}=await sb.from('usuarios').select('*,roles(nombre)').eq('email',user.email).single();
    if(data){
      setPerfil(data);
      setRole(data.roles?.nombre||'alumno');
    }
    setAuthLoading(false);
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session) loadPerfil(session.user); else setAuthLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>{
      setSession(s);
      if(s) loadPerfil(s.user); else {setPerfil(null);setAuthLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[loadPerfil]);

  async function handleLogin(p,s){setPerfil(p);setSession(s);setRole(p.roles?.nombre||'alumno');}
  async function handleLogout(){await sb.auth.signOut();setPerfil(null);setSession(null);}

  if(authLoading) return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:44,height:44,background:'var(--navy)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-serif)',color:'#fff',fontSize:22,margin:'0 auto 16px'}}>T</div>
        <div style={{color:'var(--text-muted)',fontSize:13}}>Verificando sesión…</div>
      </div>
    </div>
  );
  if(!session||!perfil) return <Login onLogin={handleLogin}/>;

  // Datos del usuario para la sidebar
  const userDisplay={
    name:`${perfil.nombres} ${perfil.apellido_pat}`,
    role:USERS[role]?.role||perfil.roles?.nombre||role,
    init:(perfil.nombres[0]||'')+(perfil.apellido_pat[0]||''),
  };

  const goRole2=(r)=>{setRole(r);setView('dashboard');setKey(k=>k+1);};


  const render=()=>{
    switch(view){
      case 'dashboard': return <Dashboard role={role}/>;
      case 'reticula': return <Reticula/>;

      case 'kardex': return <Kardex/>;
      case 'asistencias': return <Asistencias role={role}/>;
      case 'horario': return <Horario/>;
      case 'constancias': return <Constancias/>;
      case 'adeudos': return <Adeudos/>;
      case 'evalDocente': return <EvalDocente/>;
      case 'titulacion': return <Titulacion role={role}/>;
      case 'notificaciones': return <Notificaciones/>;
      case 'perfil': return <Perfil/>;
      case 'lista': return <Lista/>;

      case 'tutorias': return <Tutorias/>;
      case 'instrumentacion': return <Instrumentacion/>;
      case 'alumnos': return <Alumnos/>;
      case 'grupos': return <Grupos/>;
      case 'pagos': return <Pagos/>;
      case 'reportes': return <Reportes/>;
      case 'egresados': return <Egresados/>;
      case 'cola_constancias': return <ColaConstancias/>;
      case 'inscripciones_ctrl': return <InscripcionesCtrl/>;
      case 'bajas': return <Bajas/>;
      case 'expedientes': return <Expedientes/>;
      case 'reticula_admin': return <ReticulaAdmin/>;
      case 'equivalencias': return <Equivalencias/>;
      case 'carga_creditos': return <CargaCreditos/>;
      case 'servicio_social': return <ServicioSocial/>;
      case 'residencias': return <Residencias/>;
      case 'empresas': return <Empresas/>;
      default: return <Dashboard role={role}/>;
    }
  };

  return(
    <React.Fragment>
      <SidebarConAuth role={role} setRole={goRole2} view={view} setView={go} user={userDisplay} onLogout={handleLogout}/>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{TITLES[view]||view}</div>
          <div className="topbar-sub">TECNM Campus Mazatlán · ITMAZ</div>
          <div className="topbar-right">
            <button className="icon-btn" title="Buscar">{ic.search}</button>
            <button className="icon-btn" title="Notificaciones" onClick={()=>go('notificaciones')}>{ic.bell}</button>
            <div className="avatar" title={userDisplay.name}
                 style={{width:30,height:30,fontSize:11,cursor:'pointer'}} onClick={()=>go('perfil')}>
              {userDisplay.init}
            </div>
          </div>
        </div>
        <div className="content" key={key}>{render()}</div>
      </div>
    </React.Fragment>
  );
}

/* Sidebar con datos reales del usuario y botón logout */
function SidebarConAuth({role,setRole,view,setView,user,onLogout}){
  const nav=NAV[role]||NAV.alumno;
  return(
    <div className="sidebar">
      <div className="sidebar-logo">
        <div className="logo-mark">T</div>
        <div className="logo-name">TECNM Campus</div>
        <div className="logo-sub">Sistema Integral AMBAR</div>
      </div>
      <div style={{margin:'12px 12px 2px'}}>
        <div style={{fontSize:9.5,letterSpacing:'.07em',textTransform:'uppercase',color:'oklch(0.45 0.03 250)',fontWeight:500,marginBottom:6,padding:'0 2px'}}>Rol activo</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:3}}>
          {[{id:'alumno',label:'Alumno'},{id:'docente',label:'Docente'},{id:'admin',label:'Admin'},
            {id:'serv_escolares',label:'Serv. Esc.'},{id:'coordinador',label:'Coord.'},{id:'vinculacion',label:'Vinc.'},
          ].map(r=>(
            <button key={r.id} className={`role-btn${role===r.id?' active':''}`}
              onClick={()=>{setRole(r.id);setView('dashboard');}}>
              {r.label}
            </button>
          ))}
        </div>
      </div>
      <div className="nav-section">
        <div className="nav-label">Navegación</div>
        {nav.map(item=>(
          <div key={item.id} className={`nav-item${view===item.id?' active':''}`} onClick={()=>setView(item.id)}>
            <span className="nav-icon">{ic[item.icon]}</span>
            {item.label}
            {item.badge&&<span className="nav-badge">{item.badge}</span>}
          </div>
        ))}
      </div>
      <div className="sidebar-footer">
        <div className="user-card" onClick={()=>setView('perfil')}>
          <div className="avatar">{user.init}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="user-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
            <div className="user-role">{user.role}</div>
          </div>
        </div>
        <button onClick={onLogout}
          style={{width:'100%',marginTop:8,padding:'7px',border:'1px solid oklch(0.30 0.04 250)',borderRadius:8,background:'transparent',color:'oklch(0.55 0.03 250)',fontSize:12,fontFamily:'var(--font)',cursor:'pointer',transition:'var(--t)'}}>
          Cerrar sesión
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
